# Account baseline exceptions for Oracle 19c database hosts on OL9.
allowed_unmanaged_accounts:
  - oracle

# Oracle 19c Database configuration for dev environment
oracle_allow_destructive: true

oracle_servers:
  public-database19c-ol9-01:
    oracle_hostname: "public-database19c-ol9-02.example.internal"

    # Define listeners required on this host.
    oracle_listeners:
      - name: "LISTENER"
        port: 1521
        host: "public-database19c-ol9-02.example.internal"

    # Define CDBs that should exist on this host.
    oracle_cdbs:
      - global_db_name: "cdb1.example.internal"
        sid: "cdb1"
        data_dir: "/u02/oradata"
        listener_name: "LISTENER"
        listener_port: 1521
        pdb_name: "pdb1"

    # Define PDBs mapped to the CDBs above.
    oracle_pdbs:
      - cdb_sid: "cdb1"
        global_db_name: "cdb1.example.internal"
        pdb_name: "pdb1"
        pdb_data_dir: "/u02/oradata/pdb1"
        cdb_data_dir: "/u02/oradata/cdb1"
        service_name: "pdb1"
        pdb_admin_user: "PDBADMIN"
        pdb_admin_password: "{{ oracle_db_admin_password }}"
        listener_name: "LISTENER"
        listener_port: 1521
        open_state: "OPEN"
        save_state: true

    # Optional app bootstrap SQL targets per host.
    oracle_app_sql_enabled: true
    oracle_app_sql_force: false
    oracle_app_sql_targets:
      - cdb_sid: "cdb1"
        pdb_name: "pdb1"
        database_name: "pdb1"
        sql_id: "tq_app_bootstrap"
        sql_template: "tq_app_bootstrap_full.sql.j2"
