# Ansible inventory for dev
# Generated by Proxmox tfvars

# Global Ansible variables
[all:vars]
ansible_user=ansible
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_ssh_common_args='-o StrictHostKeyChecking=accept-new -o ControlMaster=auto -o ControlPersist=60s'
ansible_python_interpreter=/usr/bin/python3
ansible_become=yes
ansible_become_method=sudo
ansible_ssh_timeout=30
ansible_gather_timeout=30

# Environment and cluster metadata
cluster_environment=dev
cluster_name=public-stack
# Cluster tags from Proxmox
cluster_tag_costcenter="engineering"
cluster_tag_createdby="terraform-proxmox"
cluster_tag_environment="dev"
cluster_tag_managedby="terraform"
cluster_tag_owner="platform-team"
cluster_tag_project="automated-infra"
cluster_tag_workspace="dev"

