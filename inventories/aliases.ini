[ntp_servers]
# Ansible control node (this machine) used as fallback NTP server.
# Leave ansible_host unset so clients can resolve from gathered facts,
# or set time_sync_server_advertise_ip in ansible/time_sync/group_vars/ntp_servers.yml.
ansible-control-node ansible_connection=local ansible_python_interpreter=/usr/bin/python3

