# Inventory group aliases for playbooks that expect logical groups

[oracle_servers:children]
database19c
database21c

[database19c]

[database21c]

[weblogic_servers:children]
weblogic12c
weblogic14c

[weblogic12c]

[weblogic14c]

[ntp_servers]
# Ansible control node (this machine) used as fallback NTP server.
# Leave ansible_host unset so clients can resolve from gathered facts,
# or set time_sync_server_advertise_ip in time_sync/group_vars/ntp_servers.yml.
ansible-control-node ansible_connection=local ansible_python_interpreter=/usr/bin/python3

[ntp_clients:children]
oracle_servers
weblogic_servers

[ntp_clients:vars]
ansible_python_interpreter=/usr/bin/python3
