---
# roles/common/tasks/main.yml

- name: PRECHECK | Assert minimum RAM (2GB)
  ansible.builtin.assert:
    that:
      - ansible_memtotal_mb >= 2048 # 2GB in MB
    fail_msg: "Minimum 2GB RAM is required. Found {{ ansible_memtotal_mb }} MB."
  tags: [precheck]

- name: PRECHECK | Calculate required swap (min(RAM/2, 16GB), never below 4GB)
  ansible.builtin.set_fact:
    required_swap_mb: >-
      {{
        [
          [ (ansible_memtotal_mb | float / 2) | round(0, 'ceil'), 16384 ] | min,
          4096
        ] | max | int
      }}
  tags: [precheck]

- name: PRECHECK | Assert sufficient swap space
  ansible.builtin.assert:
    that:
      - (ansible_swaptotal_mb | int) >= (required_swap_mb | int)
    fail_msg: "Insufficient swap space. Required at least {{ ((required_swap_mb | int) / 1024) | round(1) }} GB. Found {{ ((ansible_swaptotal_mb | int) / 1024) | round(1) }} GB."
  tags: [precheck]

- name: PRECHECK | Assert supported OS distribution and version
  ansible.builtin.assert:
    that:
      - ansible_distribution_major_version in supported_major_versions
    fail_msg: "Unsupported OS: {{ ansible_distribution }} {{ ansible_distribution_version }}. Supported: {{ oracle_supported_distros }}"
  vars:
    supported_major_versions: "{{ oracle_supported_distros | selectattr('name', 'equalto', ansible_distribution) | map(attribute='major_versions') | first | default([]) }}"
  tags: [precheck]

- name: PRECHECK | Assert kernel version meets minimum
  ansible.builtin.assert:
    that:
      - ansible_kernel is version(oracle_min_kernel_version, '>=')
    fail_msg: "Kernel {{ ansible_kernel }} is below required {{ oracle_min_kernel_version }}."
  tags: [precheck]

- name: PRECHECK | Assert oracle_hostname is a FQDN
  ansible.builtin.assert:
    that:
      - oracle_hostname is search('\\.')
    fail_msg: "oracle_hostname must be a FQDN (include a dot). Found: {{ oracle_hostname }}"
  tags: [precheck]

- name: OS | Set Hostname
  ansible.builtin.hostname:
    name: "{{ oracle_hostname }}"
  tags: [precheck, os_prep, hostname]

- name: OS | Update /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ ansible_host }} {{ oracle_hostname }} {{ oracle_hostname.split('.')[0] }}"
    regexp: "^{{ ansible_host }}"
    state: present
  tags: [precheck, os_prep, hostname]

- name: PRECHECK | Validate FQDN resolves via DNS/hosts
  ansible.builtin.command:
    cmd: "getent ahostsv4 {{ oracle_hostname_absolute }}"
  register: fqdn_lookup
  changed_when: false
  failed_when: fqdn_lookup.rc != 0
  tags: [precheck]

- name: PRECHECK | Extract primary IPv4 from FQDN lookup
  ansible.builtin.set_fact:
    fqdn_ipv4: "{{ (fqdn_lookup.stdout_lines | select('match', '^[0-9]') | list | first | default('')) | regex_replace('\\s+.*$', '') }}"
  tags: [precheck]

- name: PRECHECK | Assert FQDN resolves to ansible_host IP (if set)
  ansible.builtin.assert:
    that:
      - fqdn_ipv4 == ansible_host
    fail_msg: "FQDN {{ oracle_hostname }} resolves to {{ fqdn_ipv4 }}, expected {{ ansible_host }}."
  when: ansible_host is defined and ansible_host is match('^[0-9.]+$')
  tags: [precheck]

- name: PRECHECK | Stat oracle base parent
  ansible.builtin.stat:
    path: "{{ oracle_base_parent }}"
  register: oracle_base_parent_stat
  tags: [precheck]

- name: PRECHECK | Stat Oracle installer completion marker
  ansible.builtin.stat:
    path: "{{ oracle_installer_run_marker }}"
  register: oracle_installer_marker_stat
  tags: [precheck]

- name: PRECHECK | Set /u01 free-space requirement
  ansible.builtin.set_fact:
    oracle_u01_required_gb: "{{ oracle_u01_postinstall_min_gb if oracle_installer_marker_stat.stat.exists else oracle_u01_min_gb }}"
    oracle_home_required_gb: "{{ oracle_home_postinstall_min_gb if oracle_installer_marker_stat.stat.exists else oracle_home_min_gb }}"
  tags: [precheck]

- name: PRECHECK | Set oracle base parent df path
  ansible.builtin.set_fact:
    oracle_base_parent_df_path: "{{ oracle_base_parent if oracle_base_parent_stat.stat.exists else (oracle_base_parent | dirname) }}"
  tags: [precheck]

- name: PRECHECK | Assert oracle base parent has free space
  ansible.builtin.shell: "df -P {{ oracle_base_parent_df_path }} | awk 'NR==2 {print $4}'"
  register: base_parent_df
  changed_when: false
  tags: [precheck]

- name: PRECHECK | Verify oracle base parent free space
  ansible.builtin.assert:
    that:
      - (base_parent_df.stdout | int) * 1024 >= (oracle_u01_required_gb | int) * 1024 * 1024 * 1024
    fail_msg: "Insufficient space on {{ oracle_base_parent_df_path }}. Required at least {{ oracle_u01_required_gb }}GB."
  tags: [precheck]

- name: PRECHECK | Determine /tmp and /dev/shm mounts
  ansible.builtin.set_fact:
    tmp_mount_item: "{{ (ansible_mounts | selectattr('mount', 'equalto', '/tmp') | list | first) | default(ansible_mounts | selectattr('mount', 'equalto', '/') | list | first, true) | default({}, true) }}"
    dev_shm_mount_item: "{{ (ansible_mounts | selectattr('mount', 'equalto', '/dev/shm') | list | first) | default({}, true) }}"
  tags: [precheck]

- name: PRECHECK | Assert /tmp has at least 1GB free space
  ansible.builtin.assert:
    that:
      - tmp_mount_item | length > 0
      - (tmp_mount_item.size_available | default(0) | int) >= oracle_tmp_min_gb * 1024 * 1024 * 1024
    fail_msg: "Insufficient space on /tmp (or /). Required at least {{ oracle_tmp_min_gb }}GB free."
  tags: [precheck]

- name: PRECHECK | Fallback lookup for /dev/shm mount details
  ansible.builtin.shell: "findmnt -no SIZE,OPTIONS -b /dev/shm"
  register: dev_shm_findmnt
  changed_when: false
  when: dev_shm_mount_item | length == 0
  tags: [precheck]

- name: PRECHECK | Normalize /dev/shm mount info
  ansible.builtin.set_fact:
    dev_shm_size_total: >-
      {{
        (dev_shm_mount_item.size_total | default(0) | int)
        if (dev_shm_mount_item | length > 0)
        else (dev_shm_findmnt.stdout.split()[0] | default(0) | int)
      }}
    dev_shm_options: >-
      {{
        (dev_shm_mount_item.options | default(''))
        if (dev_shm_mount_item | length > 0)
        else (dev_shm_findmnt.stdout.split()[1:] | join(' '))
      }}
  tags: [precheck]

- name: PRECHECK | Assert /dev/shm is mounted and executable
  ansible.builtin.assert:
    that:
      - (dev_shm_size_total | int) > 0
      - (dev_shm_size_total | int) >= oracle_dev_shm_min_gb * 1024 * 1024 * 1024
      - (oracle_dev_shm_disallowed_options | select('search', dev_shm_options) | list | length) == 0
    fail_msg: "/dev/shm must be tmpfs with >={{ oracle_dev_shm_min_gb }}GB and without options: {{ oracle_dev_shm_disallowed_options }}."
  tags: [precheck]

- name: PRECHECK | Assert /tmp mount options
  ansible.builtin.assert:
    that:
      - (oracle_tmp_disallowed_options | select('search', (tmp_mount_item.options | default(''))) | list | length) == 0
    fail_msg: "/tmp (or /) has disallowed mount options: {{ oracle_tmp_disallowed_options }}."
  tags: [precheck]

- name: PRECHECK | Assert Oracle paths are not symlinks
  ansible.builtin.stat:
    path: "{{ item }}"
    follow: false
  register: oracle_path_stats
  loop:
    - "{{ oracle_base_parent }}"
    - "{{ oracle_inventory_loc }}"
    - "{{ oracle_home }}"
  tags: [precheck]

- name: SECURITY | Collect DB admin passwords for policy checks
  ansible.builtin.set_fact:
    oracle_passwords: >-
      {{
        (
          (oracle_cdbs | default([]) | map(attribute='db_admin_password') | list) +
          (oracle_pdbs | default([]) | map(attribute='pdb_admin_password') | list)
        )
        | select('defined') | select('string') | list
      }}
  tags: [precheck, security]

- name: SECURITY | Enforce DB password policy
  ansible.builtin.assert:
    that:
      - item | length >= oracle_password_min_length
      - (not oracle_password_require_upper) or (item is search('[A-Z]'))
      - (not oracle_password_require_lower) or (item is search('[a-z]'))
      - (not oracle_password_require_digit) or (item is search('[0-9]'))
      - (not oracle_password_require_special) or (item is search('[^A-Za-z0-9]'))
    fail_msg: "Password policy violation for DB admin password (min {{ oracle_password_min_length }} chars; upper/lower/digit/special as configured)."
  loop: "{{ oracle_passwords }}"
  when: oracle_password_policy_enforce
  tags: [precheck, security]

- name: PRECHECK | Fail if Oracle paths are symlinks
  ansible.builtin.assert:
    that:
      - not item.stat.islnk | default(false)
    fail_msg: "Oracle path {{ item.item }} must not be a symlink."
  loop: "{{ oracle_path_stats.results }}"
  tags: [precheck]

- name: PRECHECK | Collect Oracle data directories to validate
  ansible.builtin.set_fact:
    oracle_cdbs_effective: "{{ oracle_cdbs if (oracle_cdbs | length > 0) else oracle_databases }}"
    oracle_data_dirs: "{{ (oracle_cdbs if (oracle_cdbs | length > 0) else oracle_databases) | map(attribute='data_dir') | select('defined') | select('string') | unique | list }}"
  tags: [precheck]

- name: PRECHECK | Build storage check list
  ansible.builtin.set_fact:
    oracle_storage_checks:
      - name: "ORACLE_HOME"
        path: "{{ oracle_home }}"
        min_gb: "{{ oracle_home_required_gb }}"
      - name: "FRA"
        path: "{{ oracle_fra_dir }}"
        min_gb: "{{ oracle_fra_min_gb }}"
  tags: [precheck]

- name: PRECHECK | Add data directories to storage checks
  ansible.builtin.set_fact:
    oracle_storage_checks: "{{ oracle_storage_checks + [ {'name': 'DATA', 'path': item, 'min_gb': oracle_data_dir_min_gb} ] }}"
  loop: "{{ oracle_data_dirs }}"
  when: oracle_data_dirs | length > 0
  tags: [precheck]

- name: PRECHECK | Check storage capacity for Oracle paths
  ansible.builtin.shell: |
    set -eu
    df_path="{{ item.path }}"
    while [ ! -e "$df_path" ] && [ "$df_path" != "/" ]; do
      df_path="$(dirname "$df_path")"
    done
    df -P "$df_path" | awk 'NR==2 {print $4}'
  register: storage_df
  changed_when: false
  loop: "{{ oracle_storage_checks }}"
  tags: [precheck]

- name: PRECHECK | Assert storage capacity for Oracle paths
  ansible.builtin.assert:
    that:
      - (item.stdout | int) * 1024 >= (item.item.min_gb | int) * 1024 * 1024 * 1024
    fail_msg: "Insufficient space for {{ item.item.name }} at {{ item.item.path | dirname }}. Required at least {{ item.item.min_gb }}GB free."
  loop: "{{ storage_df.results }}"
  when: item.stdout | length > 0
  tags: [precheck]

- name: PRECHECK | Stat Oracle paths for ownership validation
  ansible.builtin.stat:
    path: "{{ item.path }}"
  register: oracle_path_ownership_stats
  loop: "{{ oracle_storage_checks }}"
  tags: [precheck]

- name: PRECHECK | Assert Oracle path ownership when paths exist
  ansible.builtin.assert:
    that:
      - item.stat.pw_name == oracle_user
      - item.stat.gr_name == oracle_group_inventory
    fail_msg: "Ownership mismatch on {{ item.item.path }}. Expected {{ oracle_user }}:{{ oracle_group_inventory }}."
  loop: "{{ oracle_path_ownership_stats.results }}"
  when: item.stat.exists
  tags: [precheck]

- name: PRECHECK | Get oracle user and group entries
  ansible.builtin.getent:
    database: "{{ item.database }}"
    key: "{{ item.key }}"
  loop:
    - { database: "passwd", key: "{{ oracle_user }}" }
    - { database: "group", key: "{{ oracle_group_inventory }}" }
    - { database: "group", key: "{{ oracle_group_dba }}" }
    - { database: "group", key: "{{ oracle_group_oper }}" }
  register: oracle_getent
  failed_when: false
  tags: [precheck, manifest]

- name: PRECHECK | Consolidate oracle getent lookup results
  ansible.builtin.set_fact:
    oracle_getent_passwd: "{{ (oracle_getent_passwd | default({})) | combine(item.ansible_facts.getent_passwd | default({})) }}"
    oracle_getent_group: "{{ (oracle_getent_group | default({})) | combine(item.ansible_facts.getent_group | default({})) }}"
  loop: "{{ oracle_getent.results }}"
  tags: [precheck, manifest]

- name: PRECHECK | Determine oracle identity state
  ansible.builtin.set_fact:
    oracle_identity_user_present: "{{ (oracle_getent_passwd | default({})).get(oracle_user) is not none }}"
    oracle_identity_group_present: "{{ (oracle_getent_group | default({})).get(oracle_group_inventory) is not none }}"
  tags: [precheck, manifest]

- name: PRECHECK | Enforce oracle UID/GID policy
  ansible.builtin.assert:
    that:
      - oracle_getent_passwd[oracle_user] is defined
      - (oracle_getent_passwd[oracle_user][1] | int) == (oracle_identity_policy_uid | int)
      - oracle_getent_group[oracle_group_inventory] is defined
      - (oracle_getent_group[oracle_group_inventory][1] | int) == (oracle_identity_policy_gid | int)
    fail_msg: >-
      Oracle OS identity policy violation: expected {{ oracle_user }} UID {{ oracle_identity_policy_uid }}
      and {{ oracle_group_inventory }} GID {{ oracle_identity_policy_gid }}.
  when: oracle_identity_user_present | bool or oracle_identity_group_present | bool
  tags: [precheck]

- name: PRECHECK | Read /etc/oratab if present
  ansible.builtin.slurp:
    src: /etc/oratab
  register: oratab_slurp
  ignore_errors: true
  tags: [precheck, manifest]

- name: PRECHECK | Build host manifest data
  ansible.builtin.set_fact:
    oracle_host_manifest:
      host: "{{ inventory_hostname }}"
      fqdn: "{{ ansible_fqdn }}"
      distribution: "{{ ansible_distribution }} {{ ansible_distribution_version }}"
      kernel: "{{ ansible_kernel }}"
      mounts: "{{ ansible_mounts | map('dict2items') | map('rejectattr', 'key', 'in', ['free_size', 'size_available']) | map('items2dict') | list }}"
      oracle_home: "{{ oracle_home }}"
      oracle_base: "{{ oracle_base }}"
      oracle_inventory: "{{ oracle_inventory_loc }}"
      oracle_user: "{{ oracle_getent_passwd[oracle_user] | default('absent') }}"
      oracle_homes_discovered: "{{ oracle_homes_discovered | default([]) }}"
      oracle_cdbs_existing: "{{ oracle_cdbs_existing | default([]) }}"
      oracle_pdbs_existing: "{{ oracle_pdbs_existing | default([]) }}"
      oracle_groups:
        inventory: "{{ oracle_getent_group[oracle_group_inventory] | default('absent') }}"
        dba: "{{ oracle_getent_group[oracle_group_dba] | default('absent') }}"
        oper: "{{ oracle_getent_group[oracle_group_oper] | default('absent') }}"
      oratab: "{{ (oratab_slurp.content | default('') | b64decode).splitlines() | reject('match', '^#') | reject('match', '^$') | list }}"
  tags: [precheck, manifest]

- name: PRECHECK | Ensure manifest directory exists on controller
  ansible.builtin.file:
    path: "{{ oracle_manifest_dir }}"
    state: directory
    mode: '0755'
  delegate_to: localhost
  become: no
  run_once: true
  tags: [precheck, manifest]

- name: PRECHECK | Write per-host manifest on controller
  ansible.builtin.copy:
    dest: "{{ oracle_manifest_dir }}/{{ inventory_hostname }}.yml"
    content: "{{ oracle_host_manifest | to_nice_yaml }}"
    mode: '0644'
  delegate_to: localhost
  become: no
  changed_when: false
  tags: [precheck, manifest]

- name: OS | Install Oracle Preinstall, expect, and other utilities
  ansible.builtin.shell: |
    if ! rpm -q {{ item }}; then
      dnf install -y {{ item }}
    fi
  loop:
    - oracle-database-preinstall-19c
    - ksh
    - unzip
    - libaio
    - firewalld
    - expect
  register: dnf_result
  changed_when: "'Installing' in dnf_result.stdout"
  tags: [os_prep, packages]

- name: OS | Ensure firewalld service is enabled and running
  ansible.builtin.systemd:
    name: firewalld
    state: started
    enabled: yes
  when: oracle_manage_firewalld | default(true)
  tags: [os_prep, firewall]

- name: OS | Build firewalld TCP port allowlist from listeners
  ansible.builtin.set_fact:
    oracle_firewall_tcp_ports: >-
      {{
        (
          (oracle_listeners | default([]) | selectattr('port', 'defined') | map(attribute='port') | map('string') | list) +
          [oracle_listener_port | string] +
          [oracle_zabbix_agent_port | string]
        )
        | reject('equalto', '')
        | unique
        | list
      }}
  when: oracle_manage_firewalld | default(true)
  tags: [os_prep, firewall]

- name: OS | Get existing permanent firewalld TCP ports
  ansible.builtin.command: firewall-cmd --permanent --list-ports
  register: firewalld_existing_ports
  changed_when: false
  when: oracle_manage_firewalld | default(true)
  tags: [os_prep, firewall]

- name: OS | Normalize existing firewalld TCP ports
  ansible.builtin.set_fact:
    oracle_firewall_existing_tcp_ports: "{{ firewalld_existing_ports.stdout.split() | select('search', '/tcp$') | map('regex_replace', '/tcp$', '') | list }}"
  when: oracle_manage_firewalld | default(true)
  tags: [os_prep, firewall]

- name: OS | Compute missing and stale firewalld TCP ports
  ansible.builtin.set_fact:
    oracle_firewall_missing_tcp_ports: "{{ oracle_firewall_tcp_ports | difference(oracle_firewall_existing_tcp_ports | default([])) }}"
    oracle_firewall_stale_tcp_ports: >-
      {{
        (oracle_firewall_existing_tcp_ports | default([]))
        | difference(oracle_firewall_tcp_ports | default([]))
        | difference((oracle_firewall_protected_tcp_ports | default([]) | map('string') | list))
      }}
  when: oracle_manage_firewalld | default(true)
  tags: [os_prep, firewall]

- name: OS | Check if ssh service is already allowed in firewalld
  ansible.builtin.command: firewall-cmd --permanent --query-service=ssh
  register: firewalld_ssh_query
  changed_when: false
  failed_when: firewalld_ssh_query.rc not in [0, 1]
  when:
    - oracle_manage_firewalld | default(true)
    - oracle_firewall_allow_ssh | default(true)
  tags: [os_prep, firewall]

- name: OS | Add ssh service to firewalld when missing
  ansible.builtin.command: firewall-cmd --permanent --add-service=ssh
  register: firewalld_add_ssh
  changed_when: firewalld_add_ssh.rc == 0
  when:
    - oracle_manage_firewalld | default(true)
    - oracle_firewall_allow_ssh | default(true)
    - firewalld_ssh_query.rc == 1
  tags: [os_prep, firewall]

- name: OS | Add missing listener TCP ports to firewalld
  ansible.builtin.command: "firewall-cmd --permanent --add-port={{ item }}/tcp"
  loop: "{{ oracle_firewall_missing_tcp_ports }}"
  register: firewalld_add_ports
  changed_when: >-
    'ALREADY_ENABLED' not in (firewalld_add_ports.stdout | default('')) and
    'ALREADY_ENABLED' not in (firewalld_add_ports.stderr | default(''))
  when:
    - oracle_manage_firewalld | default(true)
    - oracle_firewall_missing_tcp_ports | length > 0
  tags: [os_prep, firewall]

- name: OS | Remove stale listener TCP ports from firewalld
  ansible.builtin.command: "firewall-cmd --permanent --remove-port={{ item }}/tcp"
  loop: "{{ oracle_firewall_stale_tcp_ports | default([]) }}"
  register: firewalld_remove_ports
  changed_when: >-
    'NOT_ENABLED' not in (firewalld_remove_ports.stdout | default('')) and
    'NOT_ENABLED' not in (firewalld_remove_ports.stderr | default(''))
  when:
    - oracle_manage_firewalld | default(true)
    - oracle_firewall_prune_stale_tcp_ports | default(true)
    - (oracle_firewall_stale_tcp_ports | default([])) | length > 0
  tags: [os_prep, firewall]

- name: OS | Reload firewalld when rules changed
  ansible.builtin.command: firewall-cmd --reload
  changed_when: true
  when:
    - oracle_manage_firewalld | default(true)
    - (firewalld_add_ssh is defined and firewalld_add_ssh is changed) or
      (firewalld_add_ports is defined and firewalld_add_ports is changed) or
      (firewalld_remove_ports is defined and firewalld_remove_ports is changed)
  tags: [os_prep, firewall]

- name: OS | Set SELinux to permissive
  ansible.builtin.shell: |
    set -eo pipefail
    changed=0
    if [ "$(getenforce)" != "Permissive" ] && [ "$(getenforce)" != "Disabled" ]; then
      setenforce 0
      changed=1
    fi
    if ! grep -q '^SELINUX=permissive' /etc/selinux/config; then
      sed -i 's/^SELINUX=.*/SELINUX=permissive/' /etc/selinux/config
      changed=1
    fi
    if [ "$changed" -eq 1 ]; then
      echo "SELINUX_CHANGED"
    fi
  register: selinux_shell
  changed_when: "'SELINUX_CHANGED' in selinux_shell.stdout"
  tags: [os_prep, selinux]

- name: USERS | Verify Oracle Inventory group (oinstall) exists
  ansible.builtin.group:
    name: "{{ oracle_group_inventory }}"
    gid: >-
      {{
        (oracle_identity_policy_gid | int)
        if (not (oracle_identity_group_present | default(false) | bool))
        else omit
      }}
    state: present
  tags: [users]

- name: USERS | Verify Oracle DBA group (dba) exists
  ansible.builtin.group:
    name: "{{ oracle_group_dba }}"
    state: present
  tags: [users]

- name: USERS | Verify Oracle OPER group (oper) exists
  ansible.builtin.group:
    name: "{{ oracle_group_oper }}"
    state: present
  tags: [users]

- name: USERS | Verify Oracle BACKUPDBA group (backupdba) exists
  ansible.builtin.group:
    name: "{{ oracle_group_backupdba }}"
    state: present
  tags: [users]

- name: USERS | Verify Oracle DGDBA group (dgdba) exists
  ansible.builtin.group:
    name: "{{ oracle_group_dgdba }}"
    state: present
  tags: [users]

- name: USERS | Verify Oracle KMDBA group (kmdba) exists
  ansible.builtin.group:
    name: "{{ oracle_group_kmdba }}"
    state: present
  tags: [users]

- name: USERS | Verify Oracle software owner (oracle) user exists
  ansible.builtin.user:
    name: "{{ oracle_user }}"
    uid: >-
      {{
        (oracle_identity_policy_uid | int)
        if (not (oracle_identity_user_present | default(false) | bool))
        else omit
      }}
    group: "{{ oracle_group_inventory }}"
    groups: "{{ oracle_group_dba }},{{ oracle_group_oper }},{{ oracle_group_backupdba }},{{ oracle_group_dgdba }},{{ oracle_group_kmdba }}"
    append: yes
    state: present
  tags: [users]

- name: DIRS | Create Oracle base parent directory
  ansible.builtin.file:
    path: "{{ oracle_base_parent }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags: [dirs]

- name: DIRS | Create Oracle base directory
  ansible.builtin.file:
    path: "{{ oracle_base }}"
    state: directory
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group_inventory }}"
    mode: '0775'
  tags: [dirs]

- name: DIRS | Create Oracle inventory directory
  ansible.builtin.file:
    path: "{{ oracle_inventory_loc }}"
    state: directory
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group_inventory }}"
    mode: '0770'
  tags: [dirs]

- name: DIRS | Create Oracle Data Directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group_inventory }}"
    mode: '0775'
  loop: "{{ (oracle_cdbs if (oracle_cdbs | length > 0) else oracle_databases) | map(attribute='data_dir') | unique | list }}"
  tags: [dirs]

- include_tasks: scripts.yml
  tags: [scripts]

- name: OPS | Template systemd unit for Oracle service
  ansible.builtin.template:
    src: oracle-db.service.j2
    dest: "/etc/systemd/system/{{ oracle_systemd_service_name }}.service"
    owner: root
    group: root
    mode: '0644'
  when: oracle_manage_systemd
  tags: [ops, systemd]

- name: OPS | Reload systemd
  ansible.builtin.systemd:
    daemon_reload: yes
  when: oracle_manage_systemd
  tags: [ops, systemd]

- name: OPS | Enable and set Oracle systemd service state
  ansible.builtin.systemd:
    name: "{{ oracle_systemd_service_name }}"
    enabled: yes
    state: "{{ oracle_systemd_state }}"
  when: oracle_manage_systemd
  tags: [ops, systemd]

- name: DISCOVERY | Read /etc/oratab if present
  ansible.builtin.slurp:
    src: /etc/oratab
  register: oratab_discovery
  ignore_errors: true
  tags: [discovery]

- name: DISCOVERY | Parse oratab SIDs
  ansible.builtin.set_fact:
    oracle_oratab_sids: "{{ (oratab_discovery.content | default('') | b64decode).splitlines() | reject('match', '^#') | reject('match', '^$') | map('regex_replace', '^([^:]+):.*', '\\1') | list }}"
  tags: [discovery]

- name: DISCOVERY | Check if sqlplus is available
  ansible.builtin.stat:
    path: "{{ oracle_home }}/bin/sqlplus"
  register: oracle_sqlplus_stat
  tags: [discovery]

- name: DISCOVERY | Set sqlplus availability and discovered homes
  ansible.builtin.set_fact:
    oracle_sqlplus_available: "{{ oracle_sqlplus_stat.stat.exists and oracle_sqlplus_stat.stat.executable | default(false) }}"
    oracle_homes_discovered: "{{ (oracle_sqlplus_stat.stat.exists | default(false)) | ternary([{'path': oracle_home, 'version': '21.0.0', 'inventory': oracle_inventory_loc}], []) }}"
  tags: [discovery]

- name: DISCOVERY | Map existing CDBs from oratab
  ansible.builtin.set_fact:
    oracle_cdbs_existing: "{{ (oracle_oratab_sids | map('upper') | list) | intersect((oracle_cdbs | map(attribute='sid') | map('upper') | list)) }}"
  tags: [discovery]

- name: DISCOVERY | Query existing PDBs per CDB
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ item }}
    export PATH=$ORACLE_HOME/bin:$PATH
    sqlplus -s / as sysdba <<'EOF'
    set heading off feedback off pagesize 0 verify off echo off
    select name from v$pdbs where name not in ('CDB$ROOT','PDB$SEED');
    exit;
    EOF
  register: pdb_discovery
  changed_when: false
  failed_when: false
  loop: "{{ oracle_cdbs_existing | default([]) }}"
  when: oracle_sqlplus_available
  become: yes
  become_user: "{{ oracle_user }}"
  tags: [discovery]

- name: DISCOVERY | Build existing PDB map
  ansible.builtin.set_fact:
    oracle_pdbs_existing: "{{ oracle_pdbs_existing | default([]) + [ {'cdb_sid': item.item, 'pdbs': (item.stdout_lines | reject('match', '^$') | list)} ] }}"
  loop: "{{ pdb_discovery.results | default([]) }}"
  when:
    - oracle_sqlplus_available
    - item.rc == 0
    - item.stdout is not search('ORA-')
    - item.stdout is not search('ERROR')
  tags: [discovery]

- name: DISCOVERY | Capture PDB discovery errors
  ansible.builtin.set_fact:
    oracle_pdbs_discovery_errors: "{{ oracle_pdbs_discovery_errors | default([]) + [ {'cdb_sid': item.item, 'error': item.stdout_lines | list} ] }}"
  loop: "{{ pdb_discovery.results | default([]) }}"
  when:
    - oracle_sqlplus_available
    - item.stdout is search('ORA-') or item.stdout is search('ERROR')
  tags: [discovery]

- name: DISCOVERY | Summary
  ansible.builtin.debug:
    msg:
      - "Discovered Oracle homes: {{ oracle_homes_discovered | default([]) }}"
      - "Desired CDBs: {{ oracle_cdbs | map(attribute='sid') | list }}"
      - "Existing CDBs: {{ oracle_cdbs_existing | default([]) }}"
      - "Desired PDBs: {{ oracle_pdbs | map(attribute='pdb_name') | list }}"
      - "Existing PDBs: {{ oracle_pdbs_existing | default([]) }}"
      - "PDB discovery errors: {{ oracle_pdbs_discovery_errors | default([]) }}"
  tags: [discovery]
