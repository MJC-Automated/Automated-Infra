---
- name: Install Oracle Database 21c on Oracle Linux 8
  hosts: oracle_servers
  become: yes
  gather_facts: yes

  # --- Autoload .env file ---
  pre_tasks:
    - name: PRELOAD | Scope play to database21c hosts when group exists
      ansible.builtin.meta: end_host
      when:
        - "'database21c' in groups"
        - "'database21c' not in group_names"
      tags: [always]

    - name: Read .env file from controller
      ansible.builtin.shell: "cat .env"
      delegate_to: localhost
      become: no
      run_once: true
      register: env_content
      ignore_errors: true
      changed_when: false
      tags: [always]

    - name: Parse and set .env variables
      ansible.builtin.set_fact:
        "{{ item.split('=', 1)[0] }}": "{{ item.split('=', 1)[1] | regex_replace('^[\"\\x27]|[\"\\x27]$', '') }}"
      loop: "{{ env_content.stdout_lines | default([]) }}"
      when:
        - env_content.rc == 0
        - (item | trim | length) > 0
        - not (item | trim | regex_search('^#'))
        - "'=' in item"
      delegate_to: localhost
      become: no
      run_once: true
      no_log: true
      tags: [always]

    - name: Validate required Oracle DB admin password input
      ansible.builtin.assert:
        that:
          - oracle_db_admin_password | string | trim | length >= 12
        fail_msg: >-
          Set ORACLE_DB_ADMIN_PASSWORD in .env/environment (or vault_oracle_db_admin_password)
          with at least 12 characters.
      no_log: true
      tags: [always]

    - name: Initialize desired-state lists
      ansible.builtin.set_fact:
        oracle_cdbs: "{{ oracle_cdbs | default([]) }}"
        oracle_pdbs: "{{ oracle_pdbs | default([]) }}"
        oracle_listeners: "{{ oracle_listeners | default([]) }}"
      tags: [always]

    - name: PRELOAD | Load host-specific desired state from oracle_servers map
      ansible.builtin.set_fact:
        oracle_server_definition: "{{ oracle_servers[inventory_hostname] | default({}) }}"
      tags: [always]

    - name: PRELOAD | Apply per-host overrides
      ansible.builtin.set_fact:
        oracle_hostname: "{{ oracle_server_definition.oracle_hostname | default(oracle_hostname) }}"
        oracle_listeners: "{{ oracle_server_definition.oracle_listeners | default(oracle_listeners) }}"
        oracle_cdbs: "{{ oracle_server_definition.oracle_cdbs | default(oracle_cdbs) }}"
        oracle_pdbs: "{{ oracle_server_definition.oracle_pdbs | default(oracle_pdbs) }}"
        oracle_cdbs_delete: "{{ oracle_server_definition.oracle_cdbs_delete | default(oracle_cdbs_delete) }}"
        oracle_pdbs_delete: "{{ oracle_server_definition.oracle_pdbs_delete | default(oracle_pdbs_delete) }}"
        oracle_app_sql_enabled: "{{ oracle_server_definition.oracle_app_sql_enabled | default(oracle_app_sql_enabled) }}"
        oracle_app_sql_force: "{{ oracle_server_definition.oracle_app_sql_force | default(oracle_app_sql_force) }}"
        oracle_app_sql_targets: "{{ oracle_server_definition.oracle_app_sql_targets | default(oracle_app_sql_targets) }}"
        oracle_app_sql_defaults_from_pdbs: "{{ oracle_server_definition.oracle_app_sql_defaults_from_pdbs | default(oracle_app_sql_defaults_from_pdbs) }}"
      tags: [always]

    - name: PRELOAD | Normalize oracle_hostname to absolute FQDN for lookups
      ansible.builtin.set_fact:
        oracle_hostname_absolute: "{{ (oracle_hostname | regex_replace('\\.?$','')) + '.' }}"
      tags: [always]

    - name: PRELOAD | Capture fallback flags for oracle_databases projection
      ansible.builtin.set_fact:
        fallback_build_cdbs_from_oracle_databases: "{{ (oracle_cdbs | length) == 0 }}"
        fallback_build_listeners_from_oracle_databases: "{{ (oracle_listeners | length) == 0 }}"
        fallback_build_pdbs_from_oracle_databases: "{{ (oracle_pdbs | length) == 0 }}"
      tags: [always]

    - name: Build desired-state CDBs from oracle_databases
      ansible.builtin.set_fact:
        oracle_cdbs: "{{ oracle_cdbs + [ item ] }}"
      when:
        - item.sid is defined
        - item.sid | string | length > 0
        - not ((item.sid | string) is search('__omit_place_holder__'))
        - fallback_build_cdbs_from_oracle_databases | bool
        - (oracle_cdbs | selectattr('sid', 'equalto', item.sid) | list | length) == 0
      loop: "{{ oracle_databases }}"
      tags: [always]

    - name: Build desired-state listeners from oracle_databases
      ansible.builtin.set_fact:
        oracle_listeners: "{{ oracle_listeners + [ {'name': item.listener_name, 'port': (item.listener_port | default(oracle_listener_port)), 'host': oracle_hostname } ] }}"
      when:
        - item.sid is defined
        - item.sid | string | length > 0
        - not ((item.sid | string) is search('__omit_place_holder__'))
        - item.listener_name is defined
        - item.listener_name | string | length > 0
        - not ((item.listener_name | string) is search('__omit_place_holder__'))
        - fallback_build_listeners_from_oracle_databases | bool
        - item.listener_name not in (oracle_listeners | map(attribute='name') | list)
      loop: "{{ oracle_databases }}"
      tags: [always]

    - name: Build desired-state PDBs from oracle_databases
      ansible.builtin.set_fact:
        oracle_pdbs: "{{ oracle_pdbs + [ {'cdb_sid': item.sid, 'global_db_name': item.global_db_name, 'pdb_name': item.pdb_name, 'pdb_admin_user': (item.pdb_admin_user | default('PDBADMIN')), 'pdb_admin_password': item.db_admin_password, 'listener_port': (item.listener_port | default(oracle_listener_port)), 'data_dir': item.data_dir, 'cdb_data_dir': (item.data_dir ~ '/' ~ (item.sid | upper)), 'pdb_data_dir': (item.pdb_data_dir | default(item.data_dir ~ '/' ~ (item.pdb_name | upper))), 'open_state': (item.open_state | default('OPEN')), 'save_state': (item.save_state | default(true)), 'service_name': (item.service_name | default(item.pdb_name)) } ] }}"
      when:
        - item.sid is defined
        - item.sid | string | length > 0
        - not ((item.sid | string) is search('__omit_place_holder__'))
        - item.pdb_name is defined
        - item.pdb_name | string | length > 0
        - not ((item.pdb_name | string) is search('__omit_place_holder__'))
        - fallback_build_pdbs_from_oracle_databases | bool
        - (oracle_pdbs | selectattr('cdb_sid', 'equalto', item.sid) | selectattr('pdb_name', 'equalto', item.pdb_name) | list | length) == 0
      loop: "{{ oracle_databases }}"
      tags: [always]

  vars_files:
    - vars/main.yml

  vars:
    # --- Oracle Hostname ---
    oracle_hostname: "{{ ORACLE_HOSTNAME | default(lookup('env', 'ORACLE_HOSTNAME')) | default('oracle21c.example.internal', true) }}"

    # --- Oracle User and Group Configuration ---
    oracle_user: "{{ ORACLE_USER | default(lookup('env', 'ORACLE_USER')) | default('oracle', true) }}"
    oracle_group_inventory: "oinstall"
    oracle_group_dba: "dba"
    oracle_group_oper: "oper"
    oracle_group_backupdba: "backupdba"
    oracle_group_dgdba: "dgdba"
    oracle_group_kmdba: "kmdba"
    oracle_user_home: "/home/{{ oracle_user }}"
    oracle_scripts_dir: "{{ oracle_user_home }}/scripts"

    # --- Oracle Directories ---
    oracle_base_parent: "{{ ORACLE_BASE_PARENT | default(lookup('env', 'ORACLE_BASE_PARENT')) | default('/u01/app', true) }}"
    oracle_base: "{{ oracle_base_parent }}/{{ oracle_user }}"
    oracle_inventory_loc: "{{ oracle_base_parent }}/oraInventory"
    oracle_home_name: "dbhome_1"
    oracle_product_version_dir: "product/21.0.0"
    oracle_home: "{{ oracle_base }}/{{ oracle_product_version_dir }}/{{ oracle_home_name }}"
    oracle_stage_dir: "/u01/stage/oracle21c"
    oracle_data_dir: "{{ ORACLE_DATA_DIR | default(lookup('env', 'ORACLE_DATA_DIR')) | default('/u02/oradata', true) }}"
    oracle_data_dir_min_gb: 15

    # --- Oracle Software Details ---
    oracle_software_zip_filename: "LINUX.X64_213000_db_home.zip"
    oracle_db_install_rsp_template: "db_install_21c.rsp.j2"
    db_install_rsp_dest_path: "{{ oracle_stage_dir }}/db_install_21c.rsp"
    oracle_installer_expect_template: "oracle_runinstaller.exp.j2"
    oracle_installer_expect_dest_path: "{{ oracle_stage_dir }}/run_oracle_installer.exp"

    # --- Listener Configuration ---
    oracle_listener_name: "LISTENER"
    oracle_listener_port: 1521

    # --- Idempotency Markers ---
    oracle_software_unzipped_marker: "{{ oracle_home }}/runInstaller"
    oracle_installer_run_marker: "{{ oracle_inventory_loc }}/ContentsXML/inventory.xml"
    orainst_root_sh_done_flag: "{{ oracle_inventory_loc }}/.orainstRoot_completed"
    root_sh_done_flag: "{{ oracle_home }}/.rootsh_completed"

    oracle_cv_assume_distid: "OEL7.6" # Workaround for OUI supportedOSCheck on OL8
    oracle_root_password: "{{ ansible_become_password | default(ansible_become_pass | default('', true), true) }}"

  roles:
    - role: common
    - role: oracle_install
    - role: listener
    - role: database_creation
    - role: pluggable_database
    - role: custom_sql
    - role: backup

  handlers:
    - name: Create orainstRoot.sh done flag
      ansible.builtin.file:
        path: "{{ orainst_root_sh_done_flag }}"
        state: touch
        owner: root
        group: root
        mode: '0644'
      listen: "orainstRoot.sh script executed"

    - name: Create root.sh done flag
      ansible.builtin.file:
        path: "{{ root_sh_done_flag }}"
        state: touch
        owner: root
        group: root
        mode: '0644'
      listen: "root.sh script executed"

  post_tasks:
    - name: ARTIFACTS | Ensure artifacts base dir is writable on controller
      ansible.builtin.shell: "mkdir -p {{ oracle_artifacts_dir }} && test -w {{ oracle_artifacts_dir }}"
      delegate_to: localhost
      become: false
      register: artifacts_dir_check
      changed_when: false
      failed_when: false
      tags: [artifacts]

    - name: ARTIFACTS | Fallback to /tmp when artifacts dir is not writable
      ansible.builtin.set_fact:
        oracle_artifacts_dir: "/tmp/oracle_artifacts"
      when: artifacts_dir_check.rc != 0
      tags: [artifacts]

    - name: ARTIFACTS | Set per-run artifact directory
      ansible.builtin.set_fact:
        oracle_artifacts_run_dir: "{{ oracle_artifacts_dir }}/logs/{{ inventory_hostname }}/run-{{ ansible_date_time.epoch }}"
      tags: [artifacts]

    - name: ARTIFACTS | Ensure artifact directory exists on controller
      ansible.builtin.file:
        path: "{{ oracle_artifacts_run_dir }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      become: false
      changed_when: false
      tags: [artifacts]

    - name: ARTIFACTS | Stat installer and opatch logs
      ansible.builtin.stat:
        path: "{{ item }}"
      register: artifact_stats
      loop:
        - "{{ oracle_install_log }}"
        - "{{ oracle_opatch_inventory_log }}"
      tags: [artifacts]

    - name: ARTIFACTS | Read logs from target
      ansible.builtin.slurp:
        src: "{{ item.item }}"
      register: artifact_slurp
      loop: "{{ artifact_stats.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: item.stat.exists
      no_log: true
      tags: [artifacts]

    - name: ARTIFACTS | Write logs to controller
      ansible.builtin.copy:
        content: "{{ item.content | b64decode }}"
        dest: "{{ oracle_artifacts_run_dir }}/{{ item.source | basename }}"
        mode: '0644'
      delegate_to: localhost
      become: false
      changed_when: false
      loop: "{{ artifact_slurp.results | default([]) }}"
      loop_control:
        label: "{{ item.source | default('artifact') }}"
      when:
        - item is mapping
        - (item.failed | default(false)) == false
        - item.content is defined
      no_log: true
      tags: [artifacts]

    - name: VERIFY | Listener status
      ansible.builtin.shell: |
        set -eo pipefail
        export ORACLE_HOME={{ oracle_home }}
        export PATH=$ORACLE_HOME/bin:$PATH
        listener_name="{{ item.name }}"
        listener_port="{{ item.port | default(oracle_listener_port) }}"
        status_log="/tmp/lsnr_verify_${listener_name}.log"

        if timeout 20 lsnrctl status "$listener_name" >"$status_log" 2>&1; then
          cat "$status_log"
          exit 0
        fi

        cat "$status_log" || true
        if ss -ltnp "( sport = :${listener_port} )" | tail -n +2 | grep -q tnslsnr; then
          echo "LISTENER_PORT_OK:${listener_name}:${listener_port}"
          exit 0
        fi

        exit 1
      become: yes
      become_user: "{{ oracle_user }}"
      register: listener_status
      changed_when: false
      failed_when: listener_status.rc != 0
      loop: "{{ oracle_listeners | unique }}"
      when: item.name is defined and item.name
      tags: [verify]

    - name: VERIFY | Listener services
      ansible.builtin.shell: |
        set -eo pipefail
        export ORACLE_HOME={{ oracle_home }}
        export PATH=$ORACLE_HOME/bin:$PATH
        timeout 20 lsnrctl services {{ item.name }}
      become: yes
      become_user: "{{ oracle_user }}"
      register: listener_services
      changed_when: false
      failed_when: false
      loop: "{{ oracle_listeners | unique }}"
      when: item.name is defined and item.name
      tags: [verify]

    - name: VERIFY | Ensure CDB is running for checks
      ansible.builtin.shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ item.sid }}
        export PATH=$ORACLE_HOME/bin:$PATH
        if {{ oracle_home }}/bin/sqlplus -s / as sysdba <<'EOF'
        whenever sqlerror exit 1
        select status from v$instance;
        exit;
        EOF
        then
          exit 0
        fi
        {{ oracle_home }}/bin/sqlplus -s / as sysdba <<'EOF'
        whenever sqlerror exit 1
        startup;
        exit;
        EOF
      become: yes
      become_user: "{{ oracle_user }}"
      register: verify_startup
      changed_when: "'ORACLE instance started' in verify_startup.stdout"
      failed_when: verify_startup.rc != 0
      loop: "{{ oracle_cdbs }}"
      tags: [verify]

    - name: VERIFY | CDB/PDB open modes and services
      ansible.builtin.shell: |
        export ORACLE_HOME={{ oracle_home }}
        export ORACLE_SID={{ item.sid }}
        export PATH=$ORACLE_HOME/bin:$PATH
        sqlplus -s / as sysdba <<'EOF'
        set heading off feedback off pagesize 200 linesize 200 trimspool on
        prompt CDB={{ item.sid }} OPEN_MODE:
        select open_mode from v$database;
        prompt PDBS:
        select name || ':' || open_mode from v$pdbs order by name;
        prompt SERVICES:
        select name from v$services order by name;
        exit;
        EOF
      become: yes
      become_user: "{{ oracle_user }}"
      register: db_state
      changed_when: false
      failed_when: "db_state.rc != 0 or (db_state.stdout is search('ORA-') or db_state.stdout is search('ERROR'))"
      loop: "{{ oracle_cdbs }}"
      tags: [verify]

    - name: VERIFY | Build verification context
      ansible.builtin.set_fact:
        verify_listeners_running: "{{ listener_status.results | default([]) | selectattr('rc', 'equalto', 0) | map(attribute='item.name') | list }}"
        verify_listeners_failed: "{{ listener_status.results | default([]) | rejectattr('rc', 'equalto', 0) | map(attribute='item.name') | list }}"
        verify_cdb_checked: "{{ oracle_cdbs | map(attribute='sid') | list }}"
        verify_cdb_started_during_verify: "{{ verify_startup.results | default([]) | selectattr('changed', 'equalto', true) | map(attribute='item.sid') | list }}"
      tags: [verify]

    - name: VERIFY | Summary
      ansible.builtin.debug:
        msg: |
          =======================================================
          Oracle Verification Summary
          =======================================================
          Host: {{ ansible_hostname }} ({{ ansible_default_ipv4.address }})
          Oracle Home: {{ oracle_home }}
          Listener(s) Requested: {{ oracle_listeners | map(attribute='name') | list | join(', ') }}
          Listener(s) Running: {{ verify_listeners_running | join(', ') if (verify_listeners_running | length) > 0 else 'none' }}
          Listener(s) Not Running: {{ verify_listeners_failed | join(', ') if (verify_listeners_failed | length) > 0 else 'none' }}
          CDB(s) Checked: {{ verify_cdb_checked | join(', ') if (verify_cdb_checked | length) > 0 else 'none' }}
          CDB(s) Started During Verify: {{ verify_cdb_started_during_verify | join(', ') if (verify_cdb_started_during_verify | length) > 0 else 'none' }}
          CDB/PDB Open Mode Probe Executed: {{ (db_state.results | default([]) | length) }} CDB(s)
          =======================================================
      tags: [verify]

    - name: RECAP | Desired-state summary
      ansible.builtin.debug:
        msg: |
          =======================================================
          Oracle Desired-State Recap
          =======================================================
          CDB Targets ({{ oracle_cdbs | length }}): {{ oracle_cdbs | map(attribute='sid') | list | join(', ') if (oracle_cdbs | length) > 0 else 'none' }}
          PDB Targets ({{ oracle_pdbs | length }}): {{ oracle_pdbs | map(attribute='pdb_name') | list | join(', ') if (oracle_pdbs | length) > 0 else 'none' }}
          Listener Targets: {{ oracle_listeners | map(attribute='name') | list | join(', ') if (oracle_listeners | length) > 0 else 'none' }}
          oratab autostart: {{ oracle_oratab_autostart }}
          systemd managed: {{ oracle_manage_systemd }}
          =======================================================
      tags: [recap]

    - name: INFO | Display Oracle CDB environment settings
      ansible.builtin.debug:
        msg: |
          =======================================================
          Oracle Runtime Context
          =======================================================
          ORACLE_BASE: {{ oracle_base }}
          ORACLE_HOME: {{ oracle_home }}
          Listener Port: {{ oracle_listener_port }}
          CDB Data Directories: {{ oracle_cdbs | map(attribute='data_dir') | list | join(', ') if (oracle_cdbs | length) > 0 else 'none' }}
          =======================================================
      tags: [post_install_info]

    - name: INFO | Display Oracle PDB environment settings
      ansible.builtin.debug:
        msg: |
          =======================================================
          Oracle PDB Connectivity Context
          =======================================================
          PDB Targets: {{ oracle_pdbs | map(attribute='pdb_name') | list | join(', ') }}
          Example Connect String:
          sqlplus system@//{{ oracle_hostname }}:{{ oracle_listener_port }}/{{ oracle_pdbs[0].pdb_name }}{{ ('.' ~ (oracle_post_pdb_db_domain | trim)) if ((oracle_post_pdb_db_domain | default('') | trim | length) > 0) else '' }}
          =======================================================
      when: oracle_pdbs | length > 0
      tags: [post_install_info]
