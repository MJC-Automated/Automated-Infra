---
# Artifact + staging
zimbra_artifact_path: "/resources/zcs-10.1.15_GA_4200001.RHEL9_64.20260110181427.tgz"
zimbra_install_base_dir: "/zimbra/zimbra-installer"
zimbra_install_dir_name: "{{ zimbra_artifact_path | basename | regex_replace('\\.tgz$', '') }}"
zimbra_install_dir: "{{ zimbra_install_base_dir }}/{{ zimbra_install_dir_name }}"
zimbra_autoinstall_file: "{{ zimbra_install_dir }}/zimbra-autoinstall.cfg"
zimbra_use_mounted_data_dir: true
zimbra_data_mount_path: "/zimbra"
zimbra_data_root: "{{ zimbra_data_mount_path }}/opt-zimbra"

# Installer behavior
zimbra_skip_space_check: true
zimbra_platform_override: false
zimbra_manage_hostname: true
zimbra_manage_hosts_file: true
zimbra_disable_selinux: true
zimbra_manage_postfix_conflicts: true
zimbra_install_oracle_epel: true
zimbra_install_timeout: 7200
zimbra_verify_timeout: 600
zimbra_manage_firewall: true
zimbra_firewall_allowed_ports:
  - 25/tcp
  - 80/tcp
  - 110/tcp
  - 143/tcp
  - 443/tcp
  - 465/tcp
  - 587/tcp
  - 993/tcp
  - 995/tcp
  - 7071/tcp

# Host preparation
zimbra_required_packages:
  - perl
  - rsyslog
  - wget
  - tar
  - sudo
  - net-tools
  - which
  - openssl
  - nmap-ncat
  - libidn2
  - p7zip-plugins

# Zimbra package selection from local artifact
zimbra_install_packages:
  - zimbra-core
  - zimbra-ldap
  - zimbra-logger
  - zimbra-mta
  - zimbra-dnscache
  - zimbra-snmp
  - zimbra-store
  - zimbra-apache
  - zimbra-spell
  - zimbra-proxy

zimbra_webapps:
  - service
  - admin
  - zimlet

zimbra_service_mode: "http"
zimbra_allow_self_signed: "yes"
zimbra_start_servers: "yes"
zimbra_enable_av: "yes"
zimbra_enable_sa: "yes"

# Deterministic random-like defaults per host
zimbra_seed: "{{ inventory_hostname | hash('sha1') }}"
zimbra_password_seed: "{{ inventory_hostname | hash('sha256') }}"

zimbra_mail_domain: "mail-{{ zimbra_seed[0:8] }}.lab"
zimbra_short_hostname: "mx-{{ zimbra_seed[8:14] }}"
zimbra_hostname: "{{ zimbra_short_hostname }}.{{ zimbra_mail_domain }}"

zimbra_admin_email: "admin@{{ zimbra_mail_domain }}"
zimbra_av_notify_email: "notify-{{ zimbra_seed[14:20] }}@{{ zimbra_mail_domain }}"
zimbra_smtp_source_email: "smtp-src-{{ zimbra_seed[20:26] }}@{{ zimbra_mail_domain }}"
zimbra_smtp_dest_email: "smtp-dst-{{ zimbra_seed[26:32] }}@{{ zimbra_mail_domain }}"

zimbra_admin_password: "Adm!{{ zimbra_password_seed[0:16] }}"
zimbra_ldap_root_password: "Ldr!{{ zimbra_password_seed[16:32] }}"
zimbra_ldap_zimbra_password: "Ldz!{{ zimbra_password_seed[32:48] }}"
zimbra_ldap_postfix_password: "Ldp!{{ zimbra_password_seed[48:60] }}"
zimbra_ldap_replication_password: "Ldrp!{{ zimbra_password_seed[4:20] }}"
zimbra_ldap_amavis_password: "Lda!{{ zimbra_password_seed[20:36] }}"
zimbra_ldap_nginx_password: "Ldn!{{ zimbra_password_seed[36:52] }}"

zimbra_snmp_notify: 0
zimbra_smtp_notify: 0

# Resolve missing component packages from Zimbra repositories.
zimbra_use_zimbra_package_server: "yes"
zimbra_package_server: ""

# Explicitly disable `imapd` (legacy compatibility toggle).
zimbra_disable_imapd_when_mailbox: false

# If `zmcontrol status` fails and the output points to `imapd`, disable it as a
# fallback on single-node mailbox deployments.
zimbra_imapd_auto_disable_on_failure: true
