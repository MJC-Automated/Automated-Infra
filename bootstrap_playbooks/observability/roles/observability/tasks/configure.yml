---
- name: Ensure observability directory structure exists
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ observability_stack_dir }}", owner: "root", group: "root", mode: "0755" }
    - { path: "{{ observability_stack_dir }}/grafana", owner: "root", group: "root", mode: "0755" }
    - { path: "{{ observability_stack_dir }}/grafana/provisioning", owner: "root", group: "root", mode: "0755" }
    - { path: "{{ observability_stack_dir }}/grafana/provisioning/datasources", owner: "root", group: "root", mode: "0755" }
    - { path: "{{ observability_stack_dir }}/prometheus", owner: "root", group: "root", mode: "0755" }
    - { path: "{{ observability_stack_dir }}/loki", owner: "root", group: "root", mode: "0755" }
    - { path: "{{ observability_stack_dir }}/otel", owner: "root", group: "root", mode: "0755" }
    - { path: "{{ observability_stack_dir }}/tempo", owner: "root", group: "root", mode: "0755" }
    - { path: "/var/lib/prometheus", owner: "65534", group: "65534", mode: "0755" }
    - { path: "/var/lib/loki", owner: "10001", group: "10001", mode: "0755" }
    - { path: "/var/lib/grafana", owner: "472", group: "472", mode: "0755" }
    - { path: "/var/lib/tempo", owner: "10001", group: "10001", mode: "0755" }

- name: Render docker compose stack
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ observability_stack_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
  register: observability_compose_template

- name: Render observability runtime environment file
  ansible.builtin.template:
    src: runtime.env.j2
    dest: "{{ observability_stack_dir }}/.env"
    owner: root
    group: root
    mode: "0600"
  register: observability_runtime_env_template
  no_log: true

- name: Render Prometheus configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ observability_stack_dir }}/prometheus/prometheus.yml"
    owner: root
    group: root
    mode: "0644"
  register: observability_prometheus_config

- name: Render Loki configuration
  ansible.builtin.template:
    src: loki-config.yml.j2
    dest: "{{ observability_stack_dir }}/loki/loki-config.yml"
    owner: root
    group: root
    mode: "0644"
  register: observability_loki_config

- name: Render OpenTelemetry collector configuration
  ansible.builtin.template:
    src: otel-collector-config.yml.j2
    dest: "{{ observability_stack_dir }}/otel/otel-collector-config.yml"
    owner: root
    group: root
    mode: "0644"
  register: observability_otel_config

- name: Render Tempo configuration
  ansible.builtin.template:
    src: tempo-config.yml.j2
    dest: "{{ observability_stack_dir }}/tempo/tempo.yml"
    owner: root
    group: root
    mode: "0644"
  register: observability_tempo_config

- name: Render Grafana datasource provisioning
  ansible.builtin.template:
    src: grafana-datasources.yml.j2
    dest: "{{ observability_stack_dir }}/grafana/provisioning/datasources/datasources.yml"
    owner: root
    group: root
    mode: "0644"
  register: observability_grafana_datasources_config
