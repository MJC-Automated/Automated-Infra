---
- name: Determine whether observability containers need forced recreation
  ansible.builtin.set_fact:
    observability_force_recreate: >-
      {{
        observability_compose_template.changed or
        observability_runtime_env_template.changed or
        observability_prometheus_config.changed or
        observability_loki_config.changed or
        observability_otel_config.changed or
        observability_tempo_config.changed or
        observability_grafana_datasources_config.changed
      }}
  changed_when: false

- name: Deploy or update observability stack
  ansible.builtin.shell: |
    set -euo pipefail
    compose_args=(up -d)
    if {{ observability_force_recreate | bool | ternary('true', 'false') }}; then
      compose_args+=(--force-recreate)
    fi
    if command -v docker-compose >/dev/null 2>&1; then
      docker-compose -f {{ observability_stack_dir }}/docker-compose.yml "${compose_args[@]}"
    else
      docker compose -f {{ observability_stack_dir }}/docker-compose.yml "${compose_args[@]}"
    fi
  args:
    chdir: "{{ observability_stack_dir }}"
    executable: /bin/bash
  register: observability_compose_up
  changed_when: >-
    observability_force_recreate or
    ('Creating' in observability_compose_up.stdout) or
    ('Recreating' in observability_compose_up.stdout) or
    ('Recreated' in observability_compose_up.stdout) or
    ('Starting' in observability_compose_up.stdout) or
    ('Started' in observability_compose_up.stdout) or
    ('Pulling' in observability_compose_up.stdout)
