---
# roles/listener/tasks/main.yml

- name: LISTENER | Check if listener.ora exists
  ansible.builtin.stat:
    path: "{{ oracle_home }}/network/admin/listener.ora"
  register: listener_ora_stat
  tags: [oracle_listener_config]

- name: LISTENER | Create network/admin directory if it doesn't exist
  ansible.builtin.file:
    path: "{{ oracle_home }}/network/admin"
    state: directory
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group_inventory }}"
    mode: '0775'
  tags: [oracle_listener_config]

- name: LISTENER | Create fallback network/admin directory under ORACLE_BASE
  ansible.builtin.file:
    path: "{{ oracle_base }}/network/admin"
    state: directory
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group_inventory }}"
    mode: '0775'
  tags: [oracle_listener_config]

- name: LISTENER | Ensure listener hostnames resolve in /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: "^{{ ansible_host }}\\s+{{ item.host }}(\\s|$)"
    line: "{{ ansible_host }} {{ item.host }} {{ item.host.split('.')[0] }}"
    state: present
  loop: "{{ oracle_listeners | default([]) }}"
  when:
    - ansible_host is defined
    - ansible_host is match('^[0-9.]+$')
    - item.host is defined
    - item.host | string | length > 0
  tags: [oracle_listener_config]

- name: LISTENER | Template listener.ora file
  ansible.builtin.template:
    src: listener.ora.j2
    dest: "{{ oracle_home }}/network/admin/listener.ora"
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group_inventory }}"
    mode: '0644'
  register: listener_ora_home_template
  tags: [oracle_listener_config]

- name: LISTENER | Mirror listener.ora under ORACLE_BASE network/admin
  ansible.builtin.template:
    src: listener.ora.j2
    dest: "{{ oracle_base }}/network/admin/listener.ora"
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group_inventory }}"
    mode: '0644'
  register: listener_ora_base_template
  tags: [oracle_listener_config]

- name: LISTENER | Flag when listener.ora changed
  ansible.builtin.set_fact:
    oracle_listener_config_changed: "{{ (listener_ora_home_template.changed | default(false)) or (listener_ora_base_template.changed | default(false)) }}"
  tags: [oracle_listener_config]

- name: LISTENER | Template sqlnet.ora file
  ansible.builtin.template:
    src: sqlnet.ora.j2
    dest: "{{ oracle_home }}/network/admin/sqlnet.ora"
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group_inventory }}"
    mode: '0644'
  tags: [oracle_listener_config]

- name: LISTENER | Mirror sqlnet.ora under ORACLE_BASE network/admin
  ansible.builtin.template:
    src: sqlnet.ora.j2
    dest: "{{ oracle_base }}/network/admin/sqlnet.ora"
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group_inventory }}"
    mode: '0644'
  tags: [oracle_listener_config]

- name: LISTENER | Template tnsnames.ora file
  ansible.builtin.template:
    src: tnsnames.ora.j2
    dest: "{{ oracle_home }}/network/admin/tnsnames.ora"
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group_inventory }}"
    mode: '0644'
  when: oracle_manage_tnsnames | default(true)
  changed_when: false
  tags: [oracle_listener_config]

- name: LISTENER | Mirror tnsnames.ora under ORACLE_BASE network/admin
  ansible.builtin.template:
    src: tnsnames.ora.j2
    dest: "{{ oracle_base }}/network/admin/tnsnames.ora"
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group_inventory }}"
    mode: '0644'
  when: oracle_manage_tnsnames | default(true)
  changed_when: false
  tags: [oracle_listener_config]

- name: LISTENER | Normalize desired listener names
  ansible.builtin.set_fact:
    oracle_defined_listener_names: "{{ oracle_listeners | default([]) | selectattr('name', 'defined') | map(attribute='name') | map('trim') | reject('equalto', '') | map('upper') | unique | list }}"
  tags: [oracle_listener_config]

- name: LISTENER | Discover running listener names
  ansible.builtin.shell: |
    pgrep -a -x tnslsnr 2>/dev/null | awk '{ if (NF >= 3) print $3 }' | tr '[:lower:]' '[:upper:]' | sort -u
  register: oracle_running_listener_names
  changed_when: false
  failed_when: false
  become: yes
  become_user: "{{ oracle_user }}"
  tags: [oracle_listener_config]

- name: LISTENER | Calculate unmanaged listener names
  ansible.builtin.set_fact:
    oracle_unmanaged_listener_names: "{{ (oracle_running_listener_names.stdout_lines | default([])) | difference(oracle_defined_listener_names | default([])) }}"
  tags: [oracle_listener_config]

- name: LISTENER | Stop unmanaged listeners and clear stale processes
  ansible.builtin.shell: |
    set -e
    export ORACLE_HOME={{ oracle_home }}
    export PATH=$ORACLE_HOME/bin:$PATH
    export TNS_ADMIN={{ oracle_home }}/network/admin
    listener_name="{{ item }}"

    lsnrctl stop "$listener_name" >/dev/null 2>&1 || true

    pids="$(pgrep -a -x tnslsnr 2>/dev/null | awk -v l="$listener_name" '$0 ~ (" " l " -inherit$") {print $1}' || true)"
    if [ -z "$pids" ]; then
      echo "NO_CHANGE: $listener_name is not running"
      exit 0
    fi

    kill $pids
    sleep 2

    remaining="$(pgrep -a -x tnslsnr 2>/dev/null | awk -v l="$listener_name" '$0 ~ (" " l " -inherit$") {print $1}' || true)"
    if [ -n "$remaining" ]; then
      kill -9 $remaining
    fi

    echo "STOPPED_UNMANAGED_LISTENER: $listener_name"
  become: yes
  become_user: "{{ oracle_user }}"
  register: lsnrctl_cleanup_unmanaged
  changed_when: "'STOPPED_UNMANAGED_LISTENER' in lsnrctl_cleanup_unmanaged.stdout"
  loop: "{{ oracle_unmanaged_listener_names }}"
  when:
    - oracle_listener_cleanup_unmanaged | default(true)
    - oracle_defined_listener_names | length > 0
    - oracle_unmanaged_listener_names | length > 0
  tags: [oracle_listener_config]

- name: LISTENER | Check listener port availability
  ansible.builtin.shell: "ss -ltnp '( sport = :{{ item.port }} )' | tail -n +2"
  register: listener_port_check
  changed_when: false
  failed_when:
    - listener_port_check.rc == 0
    - listener_port_check.stdout | length > 0
    - listener_port_check.stdout is not search('tnslsnr')
  become: yes
  loop: "{{ oracle_listeners | unique }}"
  when: item.port is defined and item.port
  tags: [oracle_listener_config]

- name: LISTENER | Restart Oracle Listener when listener.ora changed
  ansible.builtin.shell: |
    set -eo pipefail
    export ORACLE_HOME={{ oracle_home }}
    export PATH=$ORACLE_HOME/bin:$PATH
    export TNS_ADMIN={{ oracle_home }}/network/admin
    listener_name="{{ item.name }}"
    listener_port="{{ item.port | default('') }}"
    restart_log="/tmp/lsnrctl_restart_${listener_name}.log"
    status_log="/tmp/lsnrctl_status_${listener_name}.log"

    ss_has_listener_port() {
      if [ -z "$listener_port" ]; then
        return 1
      fi
      if command -v ss >/dev/null 2>&1; then
        ss -ltn "sport = :${listener_port}" | tail -n +2 | grep -q LISTEN
        return $?
      fi
      if [ -x /usr/sbin/ss ]; then
        /usr/sbin/ss -ltn "sport = :${listener_port}" | tail -n +2 | grep -q LISTEN
        return $?
      fi
      return 1
    }

    listener_ready() {
      if timeout 25 lsnrctl status "$listener_name" >"$status_log" 2>&1; then
        return 0
      fi
      if ss_has_listener_port; then
        return 0
      fi
      return 1
    }

    if ! timeout 30 lsnrctl stop "$listener_name" >/dev/null 2>&1; then
      pids="$(pgrep -a -x tnslsnr 2>/dev/null | awk -v l="$listener_name" '$0 ~ (" " l " -inherit$") {print $1}' || true)"
      if [ -n "$pids" ]; then
        kill $pids || true
        sleep 2
        remaining="$(pgrep -a -x tnslsnr 2>/dev/null | awk -v l="$listener_name" '$0 ~ (" " l " -inherit$") {print $1}' || true)"
        if [ -n "$remaining" ]; then
          kill -9 $remaining || true
        fi
      fi
    fi

    sleep 2
    timeout 45 lsnrctl start "$listener_name" >"$restart_log" 2>&1 || true

    for _ in $(seq 1 15); do
      if listener_ready; then
        cat "$restart_log" || true
        exit 0
      fi
      sleep 2
    done

    cat "$restart_log" || true
    cat "$status_log" || true
    pgrep -a -x tnslsnr || true
    if command -v ss >/dev/null 2>&1; then
      ss -ltn "sport = :${listener_port}" || true
    elif [ -x /usr/sbin/ss ]; then
      /usr/sbin/ss -ltn "sport = :${listener_port}" || true
    fi
    exit 1
  become: yes
  become_user: "{{ oracle_user }}"
  register: lsnrctl_restart_on_config_change
  changed_when: true
  failed_when: lsnrctl_restart_on_config_change.rc != 0
  loop: "{{ oracle_listeners | unique }}"
  when:
    - item.name is defined and item.name
    - oracle_listener_config_changed | default(false)
  tags: [oracle_listener_config]

- name: LISTENER | Start Oracle Listener
  ansible.builtin.shell: |
    set -eo pipefail
    export ORACLE_HOME={{ oracle_home }}
    export PATH=$ORACLE_HOME/bin:$PATH
    export TNS_ADMIN={{ oracle_home }}/network/admin
    listener_name="{{ item.name }}"
    listener_port="{{ item.port | default('') }}"
    status_log="/tmp/lsnrctl_status_${listener_name}.log"
    start_log="/tmp/lsnrctl_start_${listener_name}.log"

    ss_has_listener_port() {
      if [ -z "$listener_port" ]; then
        return 1
      fi
      if command -v ss >/dev/null 2>&1; then
        ss -ltn "sport = :${listener_port}" | tail -n +2 | grep -q LISTEN
        return $?
      fi
      if [ -x /usr/sbin/ss ]; then
        /usr/sbin/ss -ltn "sport = :${listener_port}" | tail -n +2 | grep -q LISTEN
        return $?
      fi
      return 1
    }

    listener_ready() {
      if timeout 25 lsnrctl status "$listener_name" >"$status_log" 2>&1; then
        return 0
      fi
      if ss_has_listener_port; then
        return 0
      fi
      return 1
    }

    if listener_ready; then
      echo "LISTENER_ALREADY_RUNNING: $listener_name"
      exit 0
    fi

    timeout 45 lsnrctl start "$listener_name" >"$start_log" 2>&1 || true

    for _ in $(seq 1 15); do
      if listener_ready; then
        cat "$start_log" || true
        exit 0
      fi
      sleep 2
    done

    cat "$start_log" || true
    cat "$status_log" || true
    pgrep -a -x tnslsnr || true
    if command -v ss >/dev/null 2>&1; then
      ss -ltn "sport = :${listener_port}" || true
    elif [ -x /usr/sbin/ss ]; then
      /usr/sbin/ss -ltn "sport = :${listener_port}" || true
    fi
    exit 1
  become: yes
  become_user: "{{ oracle_user }}"
  register: lsnrctl_start
  changed_when: >-
    not (
      'already been started' in lsnrctl_start.stdout or
      'already running' in lsnrctl_start.stdout or
      'LISTENER_ALREADY_RUNNING' in lsnrctl_start.stdout or
      'LISTENER_PORT_ALREADY_BOUND_BY_TNSLSNR' in lsnrctl_start.stdout or
      'Address already in use' in lsnrctl_start.stdout
    )
  failed_when: >-
    lsnrctl_start.rc != 0 and not (
      'already been started' in lsnrctl_start.stdout or
      'already running' in lsnrctl_start.stdout or
      'LISTENER_ALREADY_RUNNING' in lsnrctl_start.stdout or
      'LISTENER_PORT_ALREADY_BOUND_BY_TNSLSNR' in lsnrctl_start.stdout or
      'Address already in use' in lsnrctl_start.stdout
    )
  loop: "{{ oracle_listeners | unique }}"
  when:
    - item.name is defined and item.name
    - not (oracle_listener_config_changed | default(false))
  tags: [oracle_listener_config]
