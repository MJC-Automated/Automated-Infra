# roles/database_creation/tasks/main.yml

- name: DBCA | Template DBCA response file (dbca.rsp)
  ansible.builtin.template:
    src: dbca_19c.rsp.j2
    dest: "{{ oracle_stage_dir }}/dbca_{{ item.sid }}.rsp"
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group_inventory }}"
    mode: '0640'
  loop: "{{ oracle_cdbs }}"
  tags: [oracle_db_creation]

- name: DBCA | Build SYSDBA args for delete
  ansible.builtin.set_fact:
    dbca_sysdba_args: "-sysDBAUserName {{ oracle_sysdba_user }} -sysDBAPassword {{ oracle_sysdba_password }}"
  when:
    - oracle_sysdba_user | default('') | length > 0
    - oracle_sysdba_password | default('') | length > 0
  tags: [oracle_db_delete, cdb_delete, destroy]

- name: DBCA | Skip CDB delete when PDB deletes are pending
  ansible.builtin.debug:
    msg: "PDB deletes are configured; run --tags pdb_delete first, then --tags cdb_delete."
  when:
    - oracle_allow_destructive | bool
    - oracle_pdbs_delete | default([]) | length > 0
    - oracle_cdbs_delete | default([]) | length > 0
  tags: [oracle_db_delete, cdb_delete, destroy]

- name: DBCA | Check if CDB exists for delete
  ansible.builtin.shell: |
    if grep -q '^{{ item.sid }}:' /etc/oratab 2>/dev/null; then
      echo oratab
      exit 0
    fi
    if pgrep -f "ora_pmon_{{ item.sid }}$" >/dev/null 2>&1; then
      echo pmon
      exit 0
    fi
    echo missing
  register: cdb_delete_exists
  changed_when: false
  failed_when: false
  loop: "{{ oracle_cdbs_delete | default([]) }}"
  tags: [oracle_db_delete, cdb_delete, destroy]

- name: DBCA | Delete CDB via DBCA (destructive)
  ansible.builtin.shell: |
    set -eo pipefail
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_BASE={{ oracle_base }}
    export ORACLE_SID={{ item.sid }}
    export PATH=$ORACLE_HOME/bin:$PATH
    {{ oracle_home }}/bin/dbca -silent -deleteDatabase \
    -sourceDB {{ item.sid }} \
    {{ dbca_sysdba_args | default('') }}
  become: yes
  become_user: "{{ oracle_user }}"
  register: cdb_delete
  changed_when: cdb_delete.rc == 0
  failed_when: cdb_delete.rc != 0
  loop: "{{ oracle_cdbs_delete | default([]) }}"
  loop_control:
    index_var: cdb_delete_index
  when:
    - oracle_allow_destructive | bool
    - oracle_pdbs_delete | default([]) | length == 0
    - (cdb_delete_exists.results[cdb_delete_index].stdout | default('missing')) != 'missing'
  tags: [oracle_db_delete, cdb_delete, destroy]

- name: DBCA | Remove oratab entry after CDB delete
  ansible.builtin.lineinfile:
    path: /etc/oratab
    regexp: "^{{ item.sid }}:"
    state: absent
  become: yes
  when:
    - oracle_allow_destructive | bool
    - oracle_pdbs_delete | default([]) | length == 0
  loop: "{{ oracle_cdbs_delete | default([]) }}"
  tags: [oracle_db_delete, cdb_delete, cdb_cleanup, destroy]

- name: DBCA | Cleanup CDB data directory
  ansible.builtin.file:
    path: "{{ cdb_delete_data_dir_resolved }}"
    state: absent
  become: yes
  when:
    - oracle_allow_destructive | bool
    - oracle_pdbs_delete | default([]) | length == 0
    - cdb_delete_data_dir_resolved | length > 0
  loop: "{{ oracle_cdbs_delete | default([]) }}"
  loop_control:
    index_var: cdb_delete_index
  vars:
    cdb_delete_base_dir_resolved: >-
      {{
        (oracle_cdbs | selectattr('sid','equalto',item.sid)
                     | map(attribute='data_dir')
                     | list
                     | first)
          | default(item.data_dir | default('', true), true)
      }}
    cdb_delete_data_dir_resolved: >-
      {{
        item.cdb_data_dir
          | default(
              (cdb_delete_base_dir_resolved ~ '/' ~ (item.sid | upper))
              if (cdb_delete_base_dir_resolved | length > 0)
              else '',
              true
            )
      }}
  tags: [oracle_db_delete, cdb_delete, cdb_cleanup, destroy]

- name: DBCA | Verify CDB is removed
  ansible.builtin.shell: |
    if grep -q '^{{ item.sid }}:' /etc/oratab 2>/dev/null; then
      exit 1
    fi
    if pgrep -f "ora_pmon_{{ item.sid }}$" >/dev/null 2>&1; then
      exit 1
    fi
    exit 0
  register: cdb_delete_verify
  changed_when: false
  failed_when: cdb_delete_verify.rc != 0
  when:
    - oracle_allow_destructive | bool
    - oracle_pdbs_delete | default([]) | length == 0
  loop: "{{ oracle_cdbs_delete | default([]) }}"
  tags: [oracle_db_delete, cdb_delete, cdb_verify, destroy]

- name: DBCA | Clean temp CVU files
  ansible.builtin.file:
    path: "/tmp/CVU_19.0.0.0.0_oracle"
    state: absent
  changed_when: false
  tags: [oracle_db_creation]

- name: DBCA | Check if CDB already exists
  ansible.builtin.shell: |
    if grep -q '^{{ item.sid }}:' /etc/oratab 2>/dev/null; then
      echo oratab
      exit 0
    fi
    if pgrep -f "ora_pmon_{{ item.sid }}$" >/dev/null 2>&1; then
      echo pmon
      exit 0
    fi
    echo missing
  register: cdb_exists
  changed_when: false
  loop: "{{ oracle_cdbs }}"
  tags: [oracle_db_creation, discovery]

- name: DBCA | Check control file presence
  ansible.builtin.stat:
    path: "{{ item.cdb_data_dir | default(item.data_dir ~ '/' ~ (item.sid | upper), true) }}/control01.ctl"
  register: cdb_controlfile
  loop: "{{ oracle_cdbs }}"
  tags: [oracle_db_creation, discovery]

- name: DBCA | Check system datafile presence
  ansible.builtin.stat:
    path: "{{ item.cdb_data_dir | default(item.data_dir ~ '/' ~ (item.sid | upper), true) }}/system01.dbf"
  register: cdb_systemfile
  loop: "{{ oracle_cdbs }}"
  tags: [oracle_db_creation, discovery]

- name: DBCA | Remove stale oratab entry when control file missing
  ansible.builtin.lineinfile:
    path: /etc/oratab
    regexp: "^{{ item.sid }}:"
    state: absent
    backup: false
  become: yes
  loop: "{{ oracle_cdbs }}"
  loop_control:
    index_var: cdb_index
  when:
    - not cdb_controlfile.results[cdb_index].stat.exists
    - not cdb_systemfile.results[cdb_index].stat.exists
  tags: [oracle_db_creation]

- name: DBCA | Stop orphaned instance when no control file
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ item.sid }}
    {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOF
    shutdown abort;
    exit;
    EOF
  become: yes
  become_user: "{{ oracle_user }}"
  register: cdb_shutdown
  changed_when: "'ORACLE instance shut down' in cdb_shutdown.stdout"
  failed_when: false
  loop: "{{ oracle_cdbs }}"
  loop_control:
    index_var: cdb_index
  when:
    - not cdb_controlfile.results[cdb_index].stat.exists
    - not cdb_systemfile.results[cdb_index].stat.exists
    - cdb_exists.results[cdb_index].stdout | default('missing') != 'missing'
  tags: [oracle_db_creation]

- name: DBCA | Re-check if CDB already exists after cleanup
  ansible.builtin.shell: |
    if grep -q '^{{ item.sid }}:' /etc/oratab 2>/dev/null; then
      echo oratab
      exit 0
    fi
    if pgrep -f "ora_pmon_{{ item.sid }}$" >/dev/null 2>&1; then
      echo pmon
      exit 0
    fi
    echo missing
  register: cdb_exists_post_cleanup
  changed_when: false
  loop: "{{ oracle_cdbs }}"
  tags: [oracle_db_creation, discovery]

- name: DBCA | Ensure selected listener is running before DBCA
  ansible.builtin.shell: |
    set -eo pipefail
    export ORACLE_HOME={{ oracle_home }}
    export PATH=$ORACLE_HOME/bin:$PATH
    export TNS_ADMIN={{ oracle_home }}/network/admin
    listener_name="{{ item.listener_name | default(oracle_listener_name) }}"
    listener_port="{{ item.listener_port | default(oracle_listener_port) }}"

    status_log="/tmp/lsnr_status_{{ item.sid }}.log"
    start_log="/tmp/lsnr_start_{{ item.sid }}.log"

    if timeout 20 lsnrctl status "$listener_name" >"$status_log" 2>&1; then
      echo "LISTENER_READY:${listener_name}:${listener_port}"
      exit 0
    fi

    # Accept pre-existing tnslsnr bind even when lsnrctl status cannot attach.
    if ss -ltnp "( sport = :${listener_port} )" | tail -n +2 | grep -q tnslsnr; then
      echo "LISTENER_READY_BY_PORT:${listener_name}:${listener_port}"
      exit 0
    fi

    timeout 25 lsnrctl start "$listener_name" >"$start_log" 2>&1 || true
    if timeout 20 lsnrctl status "$listener_name" >"$status_log" 2>&1; then
      echo "LISTENER_READY:${listener_name}:${listener_port}"
      cat "$start_log" 2>/dev/null || true
      exit 0
    fi

    if ss -ltnp "( sport = :${listener_port} )" | tail -n +2 | grep -q tnslsnr; then
      echo "LISTENER_READY_BY_PORT:${listener_name}:${listener_port}"
      cat "$start_log" 2>/dev/null || true
      exit 0
    fi

    if [ "$listener_name" = "LISTENER" ]; then
      timeout 25 lsnrctl start >"$start_log" 2>&1 || true
      if timeout 20 lsnrctl status LISTENER >"$status_log" 2>&1; then
        echo "LISTENER_READY:LISTENER:${listener_port}"
        cat "$start_log" 2>/dev/null || true
        exit 0
      fi
      if ss -ltnp "( sport = :${listener_port} )" | tail -n +2 | grep -q tnslsnr; then
        echo "LISTENER_READY_BY_PORT:LISTENER:${listener_port}"
        cat "$start_log" 2>/dev/null || true
        exit 0
      fi
    fi

    echo "LISTENER_NOT_READY:${listener_name}:${listener_port}"
    cat "$start_log" 2>/dev/null || true
    cat "$status_log" 2>/dev/null || true
    exit 1
  become: yes
  become_user: "{{ oracle_user }}"
  register: dbca_listener_ready
  changed_when: "'Starting' in (dbca_listener_ready.stdout | default(''))"
  failed_when: dbca_listener_ready.rc != 0
  loop: "{{ oracle_cdbs }}"
  loop_control:
    index_var: cdb_index
  when:
    - not cdb_controlfile.results[cdb_index].stat.exists
    - not cdb_systemfile.results[cdb_index].stat.exists
    - cdb_exists_post_cleanup.results[cdb_index].stdout | default('missing') != 'pmon'
  tags: [oracle_db_creation]

- name: DBCA | Create database using DBCA silently
  ansible.builtin.shell: |
    set -eo pipefail
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_BASE={{ oracle_base }}
    export ORACLE_SID={{ item.sid }}
    export PATH=$ORACLE_HOME/bin:$PATH
    export TNS_ADMIN={{ oracle_home }}/network/admin
    export TMPDIR=/tmp
    {{ oracle_home }}/bin/dbca -silent -createDatabase \
    -ignorePrereqs \
    -responseFile {{ oracle_stage_dir }}/dbca_{{ item.sid }}.rsp
  args:
    creates: "{{ item.cdb_data_dir | default(item.data_dir ~ '/' ~ (item.sid | upper), true) }}/control01.ctl"
  become: yes
  become_user: "{{ oracle_user }}"
  async: "{{ oracle_dbca_async_timeout | int }}" # Default in vars/main.yml (seconds).
  poll: "{{ oracle_dbca_poll_interval | int }}" # Poll interval in seconds.
  register: dbca_execution
  changed_when: >
    'Database creation complete' in (dbca_execution.stdout | default('')) or
    (
      (dbca_execution.rc | default(1)) == 0 and
      not ((dbca_execution.stdout | default('')) is search('PRCR-1001'))
    )
  failed_when: >
    (dbca_execution.rc | default(1)) != 0 and
    not (
      ((dbca_execution.stdout | default('')) is search('PRCR-1001')) or
      ((dbca_execution.stdout | default('')) is search('DBT-10317'))
    )
  loop: "{{ oracle_cdbs }}"
  loop_control:
    index_var: cdb_index
  when:
    - not cdb_controlfile.results[cdb_index].stat.exists
    - not cdb_systemfile.results[cdb_index].stat.exists
    - cdb_exists_post_cleanup.results[cdb_index].stdout | default('missing') != 'pmon'
  tags: [oracle_db_creation]

- name: DBCA | Ensure oratab entry exists for the database
  ansible.builtin.lineinfile:
    path: /etc/oratab
    regexp: "^{{ item.sid }}:"
    line: "{{ item.sid }}:{{ oracle_home }}:{{ oracle_oratab_autostart }}"
    owner: root
    group: "{{ oracle_group_inventory }}"
    mode: '0664'
    create: yes
  loop: "{{ oracle_cdbs }}"
  tags: [oracle_db_creation]

- name: DB | Check PMON for CDB
  ansible.builtin.shell: |
    pgrep -f "ora_pmon_{{ item.sid }}$" >/dev/null 2>&1
  register: cdb_pmon
  changed_when: false
  failed_when: false
  loop: "{{ oracle_cdbs }}"
  tags: [oracle_db_creation, discovery]

- name: DB | Start CDB when datafiles exist but instance is down
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_BASE={{ oracle_base }}
    sid_cfg="{{ item.sid }}"
    sid_cfg_lower="{{ item.sid | lower }}"
    sid="$sid_cfg"
    if [ -r /etc/oratab ]; then
      oratab_sid="$(awk -F: -v target="$sid_cfg_lower" 'BEGIN{IGNORECASE=1} $1 !~ /^[[:space:]]*#/ && NF >= 2 { if (tolower($1)==target) { print $1; exit } }' /etc/oratab 2>/dev/null)"
      if [ -n "$oratab_sid" ]; then
        sid="$oratab_sid"
      fi
    fi
    sid_upper="$(printf '%s' "$sid" | tr '[:lower:]' '[:upper:]')"
    sid_lower="$(printf '%s' "$sid" | tr '[:upper:]' '[:lower:]')"
    export ORACLE_SID="$sid"
    init_home_lower="{{ oracle_home }}/dbs/init${sid_lower}.ora"
    init_home_upper="{{ oracle_home }}/dbs/init${sid_upper}.ora"
    init_base_lower="{{ oracle_base }}/dbs/init${sid_lower}.ora"
    init_base_upper="{{ oracle_base }}/dbs/init${sid_upper}.ora"
    spfile_home="{{ oracle_home }}/dbs/spfile${sid_lower}.ora"
    spfile_home_upper="{{ oracle_home }}/dbs/spfile${sid_upper}.ora"
    spfile_base="{{ oracle_base }}/dbs/spfile${sid_lower}.ora"
    spfile_base_upper="{{ oracle_base }}/dbs/spfile${sid_upper}.ora"
    data_dir="{{ item.data_dir }}"
    cdb_data_dir="{{ item.cdb_data_dir | default(item.data_dir ~ '/' ~ (item.sid | upper), true) }}"
    cdb_data_dir_sid="{{ item.data_dir ~ '/' ~ item.sid }}"
    cdb_data_dir_lower="{{ item.data_dir ~ '/' ~ (item.sid | lower) }}"
    cdb_data_dir_upper="{{ item.data_dir ~ '/' ~ (item.sid | upper) }}"
    cdb_data_dir_sid_runtime="{{ item.data_dir }}/$sid"
    cdb_data_dir_sid_runtime_lower="{{ item.data_dir }}/$sid_lower"
    cdb_data_dir_sid_runtime_upper="{{ item.data_dir }}/$sid_upper"

    find_spfile_in_dir() {
      dir="$1"
      [ -n "$dir" ] || return 1
      for cand in \
        "$dir/spfile${sid}.ora" \
        "$dir/spfile${sid_upper}.ora" \
        "$dir/spfile.ora"; do
        if [ -f "$cand" ]; then
          printf '%s\n' "$cand"
          return 0
        fi
      done
      for cand in "$dir"/spfile*.ora; do
        [ -f "$cand" ] || continue
        printf '%s\n' "$cand"
        return 0
      done
      return 1
    }

    mkdir -p "$(dirname "$init_home_lower")" "$(dirname "$init_base_lower")"
    if [ -f "$init_home_lower" ]; then
      START_CMD="startup pfile='$init_home_lower';"
    elif [ -f "$init_home_upper" ]; then
      START_CMD="startup pfile='$init_home_upper';"
    elif [ -f "$init_base_lower" ]; then
      START_CMD="startup pfile='$init_base_lower';"
    elif [ -f "$init_base_upper" ]; then
      START_CMD="startup pfile='$init_base_upper';"
    else
      SPFILE_PATH=""
      for cand in \
        "$spfile_home" \
        "$spfile_home_upper" \
        "$spfile_base" \
        "$spfile_base_upper"; do
        if [ -f "$cand" ]; then
          SPFILE_PATH="$cand"
          break
        fi
      done
      if [ -z "$SPFILE_PATH" ]; then
        for dir in \
          "$cdb_data_dir" \
          "$cdb_data_dir_sid" \
          "$cdb_data_dir_lower" \
          "$cdb_data_dir_upper" \
          "$cdb_data_dir_sid_runtime" \
          "$cdb_data_dir_sid_runtime_lower" \
          "$cdb_data_dir_sid_runtime_upper"; do
          SPFILE_PATH="$(find_spfile_in_dir "$dir" || true)"
          if [ -n "$SPFILE_PATH" ]; then
            break
          fi
        done
      fi
      if [ -z "$SPFILE_PATH" ] && [ -d "$data_dir" ]; then
        SPFILE_PATH="$(find "$data_dir" -maxdepth 3 -type f \( -iname "spfile${sid}.ora" -o -iname "spfile${sid_upper}.ora" \) 2>/dev/null | head -n 1 || true)"
      fi
      if [ -n "$SPFILE_PATH" ]; then
        if [ ! -f "$init_home_lower" ]; then
          printf "SPFILE='%s'\n" "$SPFILE_PATH" > "$init_home_lower"
          chmod 0640 "$init_home_lower"
        fi
        if [ ! -f "$init_base_lower" ]; then
          printf "SPFILE='%s'\n" "$SPFILE_PATH" > "$init_base_lower"
          chmod 0640 "$init_base_lower"
        fi
        START_CMD="startup spfile='$SPFILE_PATH';"
      else
        START_CMD="startup;"
      fi
    fi
    {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOF
    whenever sqlerror exit failure rollback
    ${START_CMD}
    exit;
    EOF
  become: yes
  become_user: "{{ oracle_user }}"
  register: cdb_startup
  changed_when: "'ORACLE instance started' in cdb_startup.stdout"
  failed_when: cdb_startup.rc != 0
  loop: "{{ oracle_cdbs }}"
  loop_control:
    index_var: cdb_index
  when:
    - (cdb_controlfile.results[cdb_index].stat.exists) or (cdb_systemfile.results[cdb_index].stat.exists)
    - cdb_pmon.results[cdb_index].rc != 0
  tags: [oracle_db_creation]

- name: DBCA | Ensure local_listener parameter matches configured host and port
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export PATH=$ORACLE_HOME/bin:$PATH
    export ORACLE_SID={{ item.sid }}
    desired_local_listener="(ADDRESS=(PROTOCOL=TCP)(HOST={{ oracle_hostname }})(PORT={{ item.listener_port | default(oracle_listener_port) }}))"
    local_listener_result="$({{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOF
    whenever sqlerror exit failure rollback
    set heading off feedback off pagesize 0 verify off echo off
    set serveroutput on
    declare
      v_current varchar2(4000);
      v_desired varchar2(4000) := q'[${desired_local_listener}]';
    begin
      select value into v_current from v\$parameter where name = 'local_listener';
      if nvl(trim(v_current), ' ') <> nvl(trim(v_desired), ' ') then
        execute immediate 'alter system set local_listener=''' || replace(v_desired, '''', '''''') || ''' scope=both';
        dbms_output.put_line('UPDATED_LOCAL_LISTENER');
      else
        dbms_output.put_line('NO_CHANGE_LOCAL_LISTENER');
      end if;
      execute immediate 'alter system register';
    end;
    /
    exit;
    EOF
    )"
    printf '%s\n' "$local_listener_result"
    if ! printf '%s\n' "$local_listener_result" | grep -qE 'UPDATED_LOCAL_LISTENER|NO_CHANGE_LOCAL_LISTENER'; then
      echo "ERROR: unable to determine local_listener status for {{ item.sid }}" >&2
      exit 1
    fi
  become: yes
  become_user: "{{ oracle_user }}"
  register: local_listener_fix
  changed_when: "'UPDATED_LOCAL_LISTENER' in local_listener_fix.stdout"
  failed_when: local_listener_fix.rc != 0
  loop: "{{ oracle_cdbs }}"
  loop_control:
    index_var: cdb_index
  when:
    - item.listener_port is defined
    - cdb_controlfile.results[cdb_index].stat.exists
  tags: [oracle_db_creation]
