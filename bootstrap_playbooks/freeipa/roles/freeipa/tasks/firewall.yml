---
- name: Ensure firewalld is installed
  ansible.builtin.package:
    name: firewalld
    state: present
  when: freeipa_manage_firewall | bool

- name: Ensure firewalld is running
  ansible.builtin.systemd:
    name: firewalld
    enabled: true
    state: started
  when: freeipa_manage_firewall | bool

- name: Open required FreeIPA services in firewall
  ansible.posix.firewalld:
    service: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop: >-
    {{
      freeipa_firewall_services
      + (['dns'] if (freeipa_setup_dns | bool) else [])
    }}
  when: freeipa_manage_firewall | bool

- name: Close FreeIPA DNS service in firewall when integrated DNS is disabled
  ansible.posix.firewalld:
    service: dns
    permanent: true
    state: disabled
    immediate: true
  when:
    - freeipa_manage_firewall | bool
    - not freeipa_setup_dns | bool
