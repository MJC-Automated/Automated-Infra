# vars/weblogic_vars.yml
# This file contains all variables for the WebLogic 12c setup.
# It is designed to be included in the main Ansible playbook.

# --- General Paths and User/Group Configuration ---
weblogic_user: oracle
weblogic_group: oinstall
# User and Group IDs for idempotency if needed, but Ansible handles it.
weblogic_user_uid: 54321
weblogic_group_gid: 54321

oracle_base: /u01/app/oracle
oracle_middleware_home: "{{ oracle_base }}/product/12.2.1"
weblogic_install_dir: "{{ oracle_middleware_home }}/wlserver"
scripts_dir: "/home/{{ weblogic_user }}/scripts"
logs_base_dir: "/Logs"

# --- Operational Toggles ---
firewall_manage_enabled: true
firewall_extra_ports: []
crontab_enabled: true
dangerous_pkill_enabled: true
managed_server_enable: true
crontab_pkill_hour: "23"
crontab_pkill_minute: "53"
crontab_stop_hour: "23"
crontab_stop_minute: "55"
crontab_start_hour: "00"
crontab_start_minute: "02"

# --- Node Manager (optional) ---
nodemanager_enabled: false
nodemanager_machine_name: "LocalMachine"
nodemanager_listen_address: ""
nodemanager_listen_port: 5556
nodemanager_secure_listener: true
domain_service_key: "{{ domain_name | upper | regex_replace('[^A-Z0-9]', '') }}"
nodemanager_systemd_service_name: "wls{{ domain_service_key }}NM.service"
nodemanager_start_script_name: "start_nodemanager.sh"
nodemanager_stop_script_name: "stop_nodemanager.sh"
nodemanager_logs_dir: "{{ logs_base_dir }}/{{ domain_name | upper }}_LOGS/nodemanager"

# --- Prechecks ---
precheck_mounts_enabled: true
min_free_gb_u01: 20
min_free_gb_logs: 5

# --- JDK Configuration (compressed installer on control node) ---
jdk_version: "jdk1.8.0_411"
jdk_installer_src: "/resources/jdk-8u411-linux-x64.tar.gz"
jdk_dest_dir: "/u01"
java_home: "{{ jdk_dest_dir }}/{{ jdk_version }}"

# --- FMW (WebLogic Server) Configuration (compressed installer on control node) ---
fmw_installer_src: "/resources/fmw_12.2.1.4.0_infrastructure_Disk1_1of1.zip"
fmw_installer_jar_name: "fmw_12.2.1.4.0_infrastructure.jar"
fmw_installer_dest: "/tmp/{{ fmw_installer_jar_name }}"
fmw_response_file_name: "wls_install.rsp"
fmw_response_file_path: "/tmp/{{ fmw_response_file_name }}"

# --- WebLogic Domain Configuration ---
domain_name: GIS_domain
domain_home: "{{ oracle_middleware_home }}/user_projects/domains/{{ domain_name }}"
weblogic_admin_user: weblogic
admin_server_name: AdminServer
admin_port: 8006
# !!! IMPORTANT: SECURELY MANAGE THIS PASSWORD WITH ANSIBLE VAULT !!!
weblogic_password: "{{ vault_weblogic_password | default(WLS_ADMIN_PASSWORD | default(lookup('env', 'WLS_ADMIN_PASSWORD', default=''), true), true) }}"
weblogic_console_port: 7001
managed_servers:
  - name: ms1
    listen_port: 8001
managed_logs_dir_base: "{{ logs_base_dir }}/{{ domain_name | upper }}_LOGS/managed"

# Optional: additional domains to manage on the same host (service/scripts/cron/firewall).
# Domain creation remains driven by the primary domain_* variables above.
additional_weblogic_domains:
  - domain_name: FMSCRM_domain
    domain_home: "{{ oracle_middleware_home }}/user_projects/domains/FMSCRM_domain"
    admin_port: 8106
    managed_servers:
      - name: ms2
        listen_port: 8101

# --- RCU (Repository Creation Utility) Configuration ---
rcu_enabled: false
rcu_connect_string: "host:1521/PDB1"
rcu_db_user: SYS
rcu_schema_prefix: ABD
rcu_component_list: "STB,OPSS,IAU,IAU_APPEND,IAU_VIEWER,WLS"
rcu_response_file_name: "rcu.rsp"
rcu_response_file_path: "/tmp/{{ rcu_response_file_name }}"
# !!! IMPORTANT: SECURELY MANAGE THIS PASSWORD WITH ANSIBLE VAULT !!!
rcu_schema_password: "{{ vault_rcu_schema_password | default(RCU_SCHEMA_PASSWORD | default(lookup('env', 'RCU_SCHEMA_PASSWORD', default=''), true), true) }}"
rcu_db_password: "{{ vault_rcu_db_password | default(RCU_DB_PASSWORD | default(lookup('env', 'RCU_DB_PASSWORD', default=''), true), true) }}"

# --- Systemd Service Configuration ---
service_description: "The {{ domain_name | upper | regex_replace('_', ' ') }} - {{ admin_port }} Weblogic Service"
start_script_name: "startWeblogic_{{ domain_service_key }}_{{ admin_port }}.sh"
stop_script_name: "stopWeblogic_{{ domain_service_key }}_{{ admin_port }}.sh"
systemd_service_name: "wls{{ domain_service_key }}{{ admin_port }}.service"
domain_logs_dir: "{{ logs_base_dir }}/{{ domain_name | upper }}_LOGS/{{ admin_port }}"

# --- OS Kernel Parameter Tuning (Best Practices for Oracle) ---
fs_file_max: 6815744
vm_max_map_count: 262144
net_ipv4_tcp_tw_reuse: 1
net_ipv4_ip_local_port_range: "9000 65500"
net_core_rmem_default: 262144
net_core_wmem_default: 262144
net_core_rmem_max: 4194304
net_core_wmem_max: 1048576

# --- JVM Memory/GC Runtime Args ---
weblogic_gc_log_dir: "{{ logs_base_dir }}/{{ domain_name | upper }}_LOGS/gc"
weblogic_gc_log_file: "{{ weblogic_gc_log_dir }}/{{ domain_service_key | lower }}.log"
weblogic_primary_gc_log_file: "{{ weblogic_gc_log_file }}"
weblogic_gc_logging_jvm_args: >-
  -Xloggc:{{ weblogic_gc_log_file }} -XX:+UseGCLogFileRotation -XX:NumberOfGCLogFiles=5 -XX:GCLogFileSize=5m -verbose:gc -XX:+PrintGCDetails -XX:+PrintGCTimeStamps -XX:+PrintHeapAtGC -XX:+PrintTenuringDistribution
weblogic_user_mem_args: >-
  -Xms6144m -Xmx6144m -XX:MetaspaceSize=512m -XX:MaxMetaspaceSize=1024m -XX:MaxGCPauseMillis=1000 -XX:ConcGCThreads=4 -XX:ParallelGCThreads=10 -XX:G1HeapWastePercent=2 -XX:G1ReservePercent=15 -XX:+UnlockExperimentalVMOptions -XX:G1OldCSetRegionThresholdPercent=15 -XX:G1MixedGCLiveThresholdPercent=90 -XX:G1NewSizePercent=20 -XX:G1MaxNewSizePercent=25 -XX:+UseG1GC -XX:+PrintFlagsFinal -XX:+PrintReferenceGC -XX:+PrintAdaptiveSizePolicy -XX:+UnlockDiagnosticVMOptions -XX:+G1SummarizeConcMark {{ weblogic_gc_logging_jvm_args }} -XX:+UseCompressedOops

# --- WebLogic Tunneling ---
weblogic_tunneling_enabled: true

# --- Compact Domain / ADF Template Profile ---
# Equivalent to selecting in config wizard:
# - Oracle Enterprise Manager [em]
# - Oracle JRF SOAPS/JMS Web Services [oracle_common] (auto-selects Oracle JRF)
compact_domain_profile_enabled: true
compact_domain_enable_soapjms: false
compact_domain_jrf_templates:
  - "{{ oracle_middleware_home }}/oracle_common/common/templates/wls/oracle.jrf_restricted_template.jar"
  - "{{ oracle_middleware_home }}/oracle_common/common/templates/wls/oracle.jrf_cs_template.jar"
  - "{{ oracle_middleware_home }}/oracle_common/common/templates/wls/oracle.jrf_template.jar"
compact_domain_soapjms_templates:
  - "{{ oracle_middleware_home }}/oracle_common/common/templates/wls/oracle.jrf.ws.soapjms_template.jar"
  - "{{ oracle_middleware_home }}/oracle_common/common/templates/wls/oracle.jrf.ws.soapjms_cs_template.jar"
compact_domain_em_templates:
  - "{{ oracle_middleware_home }}/em/common/templates/wls/oracle.em_wls_restricted_template.jar"
  - "{{ oracle_middleware_home }}/em/common/templates/wls/oracle.emas_wls_restricted_template.jar"
  - "{{ oracle_middleware_home }}/em/common/templates/wls/oracle.em_wls_cs_template.jar"
  - "{{ oracle_middleware_home }}/em/common/templates/wls/oracle.emas_wls_cs_template.jar"
  - "{{ oracle_middleware_home }}/em/common/templates/wls/oracle.em_wls_template.jar"
  - "{{ oracle_middleware_home }}/em/common/templates/wls/oracle.emas_wls_template.jar"
compact_domain_set_default_jdbc_passwords: true
compact_domain_jdbc_password_datasources:
  - "fmwxa-data-source"
  - "fmw-data-source"
  - "WLSSchemaDataSource"
  - "opss-data-source"
  - "opss-audit-viewDS"
  - "opss-audit-DBDS"
compact_domain_jrf_template: "{{ compact_domain_jrf_templates[-1] }}"
compact_domain_soapjms_template: "{{ compact_domain_soapjms_templates[-1] }}"

# ---- Storage Cleanup ----
cleanup_enabled: true
cleanup_keep_count: 5
cleanup_keep_server_logs: 10
cleanup_log_dir: /var/log/cleanup
cleanup_script_dir: "/home/{{ weblogic_user }}/scripts"
cleanup_file_owner: "{{ weblogic_user }}"
cleanup_file_group: "{{ weblogic_group }}"
cleanup_disk_threshold_pct: 80
cleanup_disk_check_mounts:
  - /u01
  - /u02
  - /Logs
cleanup_wls_cron_minute: "0"
cleanup_wls_cron_hour: "0"
cleanup_disk_cron_minute: "0"
cleanup_disk_cron_hour: "6"
cleanup_journald_max_use: "500M"
cleanup_journald_max_retention: "7day"
# Cleanup paths (derived from domain vars; additional domains auto-included)
cleanup_weblogic_log_dirs:
  - "{{ logs_base_dir }}/{{ domain_name | upper }}_LOGS/{{ admin_port }}"
cleanup_weblogic_tmp_dirs:
  - "{{ domain_home }}/servers/{{ admin_server_name }}/tmp/_WL_user"
cleanup_weblogic_cache_dirs:
  - "{{ domain_home }}/servers/{{ admin_server_name }}/cache"
cleanup_weblogic_server_log_dirs:
  - "{{ domain_home }}/servers/{{ admin_server_name }}/logs"
cleanup_weblogic_domain_homes:
  - "{{ domain_home }}"
