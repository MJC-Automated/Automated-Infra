---
# main.yml
# This playbook automates the installation and configuration of WebLogic 12c
# on Oracle Linux 8, including JDK installation, FMW installation,
# WebLogic domain creation, systemd service setup, and crontab management.

- hosts: weblogic_servers
  become: true # Run all tasks with sudo privileges

  # Load variables from a separate file for better organization and security (e.g., Ansible Vault)
  vars_files:
    - vars/weblogic_vars.yml # Path to your external variables file

  pre_tasks:
    - name: Read .env file from controller (optional)
      ansible.builtin.shell: "cat .env"
      delegate_to: localhost
      become: false
      run_once: true
      register: env_content
      ignore_errors: true
      changed_when: false
      tags: [always]

    - name: Parse and set .env variables
      ansible.builtin.set_fact:
        "{{ item.split('=', 1)[0] }}": "{{ item.split('=', 1)[1] | regex_replace('^[\"\\x27]|[\"\\x27]$', '') }}"
      loop: "{{ env_content.stdout_lines | default([]) }}"
      when:
        - env_content.rc == 0
        - (item | trim | length) > 0
        - not (item | trim | regex_search('^#'))
        - "'=' in item"
      delegate_to: localhost
      become: false
      run_once: true
      no_log: true
      tags: [always]

    - name: Validate required WebLogic admin password input
      ansible.builtin.assert:
        that:
          - weblogic_password | string | trim | length >= 12
        fail_msg: >-
          Set WLS_ADMIN_PASSWORD in .env/environment (or vault_weblogic_password)
          with at least 12 characters.
#      no_log: true
      tags: [always]

    - name: Validate RCU password inputs when RCU is enabled
      ansible.builtin.assert:
        that:
          - rcu_schema_password | string | trim | length >= 12
          - rcu_db_password | string | trim | length >= 12
        fail_msg: >-
          rcu_enabled=true requires strong RCU_SCHEMA_PASSWORD and RCU_DB_PASSWORD
          from .env/environment or vaulted vars.
      when: rcu_enabled | bool
      no_log: true
      tags: [always]

    - name: Check JDK archive exists on control node
      ansible.builtin.stat:
        path: "{{ jdk_installer_src }}"
      register: jdk_src_stat
      delegate_to: localhost
      run_once: true

    - name: Fail if JDK archive is missing on control node
      ansible.builtin.fail:
        msg: "JDK archive not found at {{ jdk_installer_src }} on control node."
      when:
        - jdk_src_stat.stat is defined
        - not jdk_src_stat.stat.exists

    - name: Check FMW installer exists on control node
      ansible.builtin.stat:
        path: "{{ fmw_installer_src }}"
      register: fmw_src_stat
      delegate_to: localhost
      run_once: true

    - name: Fail if FMW installer is missing on control node
      ansible.builtin.fail:
        msg: "FMW installer not found at {{ fmw_installer_src }} on control node."
      when:
        - fmw_src_stat.stat is defined
        - not fmw_src_stat.stat.exists

    - name: PRECHECK | Define required mountpoints
      ansible.builtin.set_fact:
        required_mounts:
          - { path: "/u01", min_gb: "{{ min_free_gb_u01 }}" }
          - { path: "/Logs", min_gb: "{{ min_free_gb_logs }}" }
      when: precheck_mounts_enabled | bool

    - name: PRECHECK | Check mountpoints are present
      ansible.builtin.command: "mountpoint -q {{ item.path }}"
      loop: "{{ required_mounts }}"
      register: mountpoint_checks
      changed_when: false
      failed_when: false
      when: precheck_mounts_enabled | bool

    - name: PRECHECK | Assert required mountpoints are mounted
      ansible.builtin.assert:
        that:
          - item.rc == 0
        fail_msg: "Expected mountpoint {{ item.item.path }} is not mounted."
      loop: "{{ mountpoint_checks.results }}"
      when: precheck_mounts_enabled | bool

    - name: PRECHECK | Check free space on required mountpoints
      ansible.builtin.shell: "df -P {{ item.path }} | awk 'NR==2 {print $4}'"
      loop: "{{ required_mounts }}"
      register: free_space_checks
      changed_when: false
      when: precheck_mounts_enabled | bool

    - name: PRECHECK | Assert minimum free space on mountpoints
      ansible.builtin.assert:
        that:
          - (item.stdout | int) * 1024 >= (item.item.min_gb | int) * 1024 * 1024 * 1024
        fail_msg: "Insufficient free space on {{ item.item.path }}. Required {{ item.item.min_gb }}GB."
      loop: "{{ free_space_checks.results }}"
      when:
        - precheck_mounts_enabled | bool
        - (item.item.min_gb | int) > 0

  # Handlers are triggered only when a 'notify' event occurs (i.e., a task makes a change)
  handlers:
    - name: daemon_reload
      ansible.builtin.systemd:
        daemon_reload: true
      listen: "reload systemd"

    - name: start_weblogic_service
      ansible.builtin.systemd:
        name: "{{ systemd_service_name }}"
        state: started
        enabled: true
      listen: "start weblogic service"

    - name: restart_weblogic_service
      ansible.builtin.systemd:
        name: "{{ systemd_service_name }}"
        state: restarted
      listen: "restart weblogic service"

  tasks:
    - name: Determine FMW payload type flags and stage path
      ansible.builtin.set_fact:
        fmw_is_zip: "{{ (fmw_installer_src | regex_search('\\.zip$')) is not none }}"
        fmw_is_targz: "{{ (fmw_installer_src | regex_search('\\.tar\\.gz$')) is not none }}"
        fmw_is_jar: "{{ (fmw_installer_src | regex_search('\\.jar$')) is not none }}"
        fmw_is_archive: "{{ ((fmw_installer_src | regex_search('\\.zip$')) is not none) or ((fmw_installer_src | regex_search('\\.tar\\.gz$')) is not none) }}"
        fmw_stage_dir: "/tmp/fmw_stage_{{ domain_name | lower }}"
      tags:
        - fmw_install

    - name: Set FMW payload and installer paths
      ansible.builtin.set_fact:
        fmw_payload_dest: "{{ (fmw_is_jar | bool) | ternary(fmw_installer_dest, '/tmp/' + (fmw_installer_src | basename)) }}"
        fmw_installer_jar_path: "{{ (fmw_is_archive | bool) | ternary(fmw_stage_dir + '/' + fmw_installer_jar_name, fmw_installer_dest) }}"
      tags:
        - fmw_install

    - name: Detect existing JDK home
      ansible.builtin.stat:
        path: "{{ java_home }}"
      register: jdk_home_stat
      tags:
        - jdk_install

    - name: Detect existing FMW installation marker
      ansible.builtin.stat:
        path: "{{ oracle_middleware_home }}/oracle_common/bin/rcu"
      register: fmw_install_marker
      tags:
        - fmw_install

    # --- Task 1: WebLogic User and Group Creation ---
    - name: Create WebLogic group '{{ weblogic_group }}' with specified GID
      ansible.builtin.group:
        name: "{{ weblogic_group }}"
        gid: "{{ weblogic_group_gid | default(omit, true) }}"
        state: present

    - name: Create WebLogic user '{{ weblogic_user }}' with primary group '{{ weblogic_group }}' and specified UID
      ansible.builtin.user:
        name: "{{ weblogic_user }}"
        uid: "{{ weblogic_user_uid | default(omit, true) }}"
        group: "{{ weblogic_group }}"
        state: present
        create_home: true
        shell: /bin/bash # Ensure the user has a proper shell

    # --- Task 2: Directory Structure Creation and Ownership ---
    - name: Create base directory /u01 if it does not exist
      ansible.builtin.file:
        path: "/u01"
        state: directory
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0775'

    - name: Create Oracle and WebLogic related directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0775'
      loop:
        - "{{ oracle_base }}" # /u01/app/oracle
        - "{{ oracle_middleware_home }}" # /u01/app/oracle/product/12.2.1
        - "{{ oracle_base }}/config/domains" # New directory
        - "{{ oracle_base }}/config/applications" # New directory
        - "{{ logs_base_dir }}" # /Logs
        - "{{ scripts_dir }}" # /home/oracle/scripts
        - "{{ domain_logs_dir }}" # /Logs/CLIENT_A_DOMAIN_LOGS/8006
        - "{{ weblogic_gc_log_dir }}"
      tags:
        - directories
        - systemd_service

    - name: Ensure oraInventory directory exists
      ansible.builtin.file:
        path: "{{ oracle_base }}/oraInventory"
        state: directory
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0770'
      tags:
        - directories

    - name: Ensure GC log file exists
      ansible.builtin.copy:
        content: ""
        dest: "{{ weblogic_gc_log_file }}"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0664'
        force: no
      tags:
        - directories
        - systemd_service

    # --- Task 3: OS Kernel Parameter Tuning ---
    - name: Configure kernel parameters for WebLogic (sysctl)
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        sysctl_set: true
        reload: true
      loop:
        - { key: 'fs.file-max', value: "{{ fs_file_max }}" }
        - { key: 'vm.max_map_count', value: "{{ vm_max_map_count }}" }
        # net.ipv4.tcp_tw_recycle is removed as it's deprecated in modern Linux kernels (e.g., OL8)
        - { key: 'net.ipv4.tcp_tw_reuse', value: "{{ net_ipv4_tcp_tw_reuse }}" }
        - { key: 'net.ipv4.ip_local_port_range', value: "{{ net_ipv4_ip_local_port_range }}" }
        - { key: 'net.core.rmem_default', value: "{{ net_core_rmem_default }}" }
        - { key: 'net.core.wmem_default', value: "{{ net_core_wmem_default }}" }
        - { key: 'net.core.rmem_max', value: "{{ net_core_rmem_max }}" }
        - { key: 'net.core.wmem_max', value: "{{ net_core_wmem_max }}" }
      tags:
        - os_tune

    - name: Set general ulimits for the {{ weblogic_user }} user in /etc/security/limits.conf
      ansible.builtin.blockinfile:
        path: "/etc/security/limits.conf"
        block: |
          {{ weblogic_user }} soft nofile 65536
          {{ weblogic_user }} hard nofile 65536
          {{ weblogic_user }} soft nproc 16384
          {{ weblogic_user }} hard nproc 16384
          {{ weblogic_user }} soft stack 10240
          {{ weblogic_user }} hard stack 32768
        marker: "# {mark} ANSIBLE MANAGED BLOCK - WebLogic Ulimits for {{ weblogic_user }}"
        create: true
        mode: '0644'
      tags:
        - os_tune

    - name: Amend /etc/security/limits.d/90-nproc.conf for nproc limit
      ansible.builtin.lineinfile:
        path: "/etc/security/limits.d/90-nproc.conf"
        regexp: '^(\*|\%)?\s+soft\s+nproc\s+.*$' # Matches existing soft nproc lines for * or %
        line: '* - nproc 16384' # New line as requested
        state: present
        create: true # Create if it doesn't exist
        owner: root
        group: root
        mode: '0644'
      tags:
        - os_tune

    # --- Task 4: Firewall Allowlist (firewalld) ---
    - name: Check firewalld presence
      ansible.builtin.command: "systemctl show --property=LoadState --value firewalld.service"
      register: firewalld_enabled_check
      changed_when: false
      failed_when: false
      tags:
        - firewall

    - name: Set firewalld present fact
      ansible.builtin.set_fact:
        firewalld_present: >-
          {{
            firewalld_enabled_check.rc == 0
            and (firewalld_enabled_check.stdout | trim) not in ['', 'not-found']
          }}
      tags:
        - firewall

    - name: Ensure firewalld is running (if present)
      ansible.builtin.systemd:
        name: firewalld
        state: started
        enabled: true
      when:
        - firewalld_present | bool
        - firewall_manage_enabled | bool
      tags:
        - firewall

    - name: Detect additional domains with existing domain home
      ansible.builtin.stat:
        path: "{{ item.domain_home }}/bin/startWebLogic.sh"
      loop: "{{ additional_weblogic_domains | default([]) }}"
      register: additional_domain_home_checks
      changed_when: false
      tags:
        - firewall
        - systemd_service
        - crontab
        - summary

    - name: Build additional domain active/skip lists
      ansible.builtin.set_fact:
        additional_weblogic_domains_active: "{{ additional_domain_home_checks.results | default([]) | selectattr('stat.exists', 'equalto', true) | map(attribute='item') | list }}"
        additional_weblogic_domains_skipped: "{{ additional_domain_home_checks.results | default([]) | rejectattr('stat.exists', 'equalto', true) | map(attribute='item') | list }}"
      tags:
        - firewall
        - systemd_service
        - crontab
        - summary

    - name: Build firewall allowlist ports
      ansible.builtin.set_fact:
        firewall_allowlist_ports: >-
          {{
            (
              [admin_port, weblogic_console_port]
              + (
                (managed_server_enable | bool)
                | ternary(
                  (
                    managed_servers
                    | default([])
                    | selectattr('listen_port', 'defined')
                    | map(attribute='listen_port')
                    | list
                  ),
                  []
                )
              )
              + (additional_weblogic_domains | default([]) | map(attribute='admin_port') | list)
              + (
                additional_weblogic_domains
                | default([])
                | map(attribute='extra_ports')
                | map('default', [])
                | list
                | flatten
              )
              + (
                (managed_server_enable | bool)
                | ternary(
                  (
                    additional_weblogic_domains
                    | default([])
                    | map(attribute='managed_servers')
                    | map('default', [])
                    | list
                    | flatten
                    | selectattr('listen_port', 'defined')
                    | map(attribute='listen_port')
                    | list
                  ),
                  []
                )
              )
              + (nodemanager_enabled | bool | ternary([nodemanager_listen_port], []))
              + (firewall_extra_ports | default([])) + [zabbix_agent_port]
            )
            | map('int')
            | unique
            | list
          }}
      when:
        - firewalld_present | bool
        - firewall_manage_enabled | bool
      tags:
        - firewall

    - name: Query WebLogic ports in firewalld permanent config
      ansible.builtin.command: "firewall-cmd --permanent --query-port={{ item }}/tcp"
      loop: "{{ firewall_allowlist_ports }}"
      register: firewall_query_results
      changed_when: false
      failed_when: false
      when:
        - firewalld_present | bool
        - firewall_manage_enabled | bool
      tags:
        - firewall

    - name: Build list of missing firewalld ports
      ansible.builtin.set_fact:
        firewall_missing_ports: "{{ firewall_query_results.results | rejectattr('rc', 'equalto', 0) | map(attribute='item') | list }}"
      when:
        - firewalld_present | bool
        - firewall_manage_enabled | bool
      tags:
        - firewall

    - name: Add missing WebLogic ports in firewalld permanent config
      ansible.builtin.command: "firewall-cmd --permanent --add-port={{ item }}/tcp"
      loop: "{{ firewall_missing_ports }}"
      when:
        - firewalld_present | bool
        - firewall_manage_enabled | bool
        - firewall_missing_ports | length > 0
      tags:
        - firewall

    - name: Reload firewalld when allowlist changed
      ansible.builtin.command: "firewall-cmd --reload"
      changed_when: true
      when:
        - firewalld_present | bool
        - firewall_manage_enabled | bool
        - firewall_missing_ports | length > 0
      tags:
        - firewall

    - name: Warn when firewalld is not installed
      ansible.builtin.debug:
        msg: "firewalld not installed; skipping firewall allowlist."
      when:
        - not firewalld_present | bool
        - firewall_manage_enabled | bool
      tags:
        - firewall
    # --- Task 5: JDK Installation ---
    - name: Transfer JDK installer to target
      ansible.builtin.copy:
        src: "{{ jdk_installer_src }}"
        dest: "{{ jdk_dest_dir }}/{{ jdk_installer_src | basename }}"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0644'
      when: not (jdk_home_stat.stat.exists | default(false))
      tags:
        - jdk_install

    - name: Extract JDK installer
      ansible.builtin.unarchive:
        src: "{{ jdk_dest_dir }}/{{ jdk_installer_src | basename }}"
        dest: "{{ jdk_dest_dir }}" # Extract directly to /u01
        remote_src: true # Source is on the remote host
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        creates: "{{ java_home }}" # Idempotency check: only run if JAVA_HOME doesn't exist
      when: not (jdk_home_stat.stat.exists | default(false))
      tags:
        - jdk_install

    - name: Remove JDK installer after extraction
      ansible.builtin.file:
        path: "{{ jdk_dest_dir }}/{{ jdk_installer_src | basename }}"
        state: absent
      when: not (jdk_home_stat.stat.exists | default(false))
      tags:
        - jdk_install

    - name: Check JAVA binary execute permissions
      ansible.builtin.stat:
        path: "{{ java_home }}/bin/java"
      register: jdk_java_bin_stat
      tags:
        - jdk_install

    - name: Ensure JDK launchers are executable
      ansible.builtin.shell: |
        set -euo pipefail
        for dir in "{{ java_home }}/bin" "{{ java_home }}/jre/bin"; do
          if [ -d "${dir}" ]; then
            find "${dir}" -type d -exec chmod 0755 {} +
            find "${dir}" -type f -exec chmod 0755 {} +
          fi
        done
      args:
        executable: /bin/bash
      when:
        - jdk_java_bin_stat.stat.exists | default(false)
        - not (jdk_java_bin_stat.stat.executable | default(false))
      tags:
        - jdk_install

    - name: Set JAVA_HOME in /etc/profile.d
      ansible.builtin.template:
        src: templates/java.sh.j2
        dest: /etc/profile.d/java.sh
        owner: root
        group: root
        mode: '0644'
      tags:
        - jdk_install

    - name: Append environment variables to /home/{{ weblogic_user }}/.bash_profile
      ansible.builtin.template:
        src: templates/oracle_bash_profile.j2
        dest: "/home/{{ weblogic_user }}/.bash_profile"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0644'
        backup: true # Create a backup of the original file
      tags:
        - bash_profile

    # --- Task 6: FMW (WebLogic Server) Installation ---
    - name: Create oraInst.loc file
      ansible.builtin.template:
        src: templates/oraInst.loc.j2
        dest: "{{ oracle_base }}/oraInst.loc" # Path is correct
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0644'
      tags:
        - fmw_install

    - name: Transfer FMW installer to target
      ansible.builtin.copy:
        src: "{{ fmw_installer_src }}"
        dest: "{{ fmw_payload_dest }}"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0644'
      when: not (fmw_install_marker.stat.exists | default(false))
      tags:
        - fmw_install

    - name: Ensure FMW staging directory exists (when archive payload is used)
      ansible.builtin.file:
        path: "{{ fmw_stage_dir }}"
        state: directory
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0775'
      when:
        - fmw_is_archive | bool
        - not (fmw_install_marker.stat.exists | default(false))
      tags:
        - fmw_install

    - name: Ensure unzip package is installed (for zip payloads)
      ansible.builtin.package:
        name: unzip
        state: present
      when:
        - fmw_is_zip | bool
        - not (fmw_install_marker.stat.exists | default(false))
      tags:
        - fmw_install

    - name: Unarchive FMW installer payload (zip/tar.gz)
      ansible.builtin.unarchive:
        src: "{{ fmw_payload_dest }}"
        dest: "{{ fmw_stage_dir }}"
        remote_src: true
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        creates: "{{ fmw_stage_dir }}/.unpacked"
      when:
        - fmw_is_archive | bool
        - not (fmw_install_marker.stat.exists | default(false))
      tags:
        - fmw_install

    - name: Mark FMW archive extracted
      ansible.builtin.file:
        path: "{{ fmw_stage_dir }}/.unpacked"
        state: touch
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0644'
      when:
        - fmw_is_archive | bool
        - not (fmw_install_marker.stat.exists | default(false))
      tags:
        - fmw_install

    - name: Locate FMW installer jar in extracted payload
      ansible.builtin.find:
        paths: "{{ fmw_stage_dir }}"
        patterns: "{{ fmw_installer_jar_name }}"
        recurse: true
      register: fmw_jar_find
      when:
        - fmw_is_archive | bool
        - not (fmw_install_marker.stat.exists | default(false))
      tags:
        - fmw_install

    - name: Fail when FMW installer jar is not found in extracted payload
      ansible.builtin.fail:
        msg: "Unable to locate {{ fmw_installer_jar_name }} under {{ fmw_stage_dir }}."
      when:
        - fmw_is_archive | bool
        - not (fmw_install_marker.stat.exists | default(false))
        - fmw_jar_find.matched | int == 0
      tags:
        - fmw_install

    - name: Set FMW installer jar path from extracted payload
      ansible.builtin.set_fact:
        fmw_installer_jar_path: "{{ fmw_jar_find.files[0].path }}"
      when:
        - fmw_is_archive | bool
        - not (fmw_install_marker.stat.exists | default(false))
      tags:
        - fmw_install

    - name: Create FMW silent installation response file
      ansible.builtin.template:
        src: templates/wls_install.rsp.j2
        dest: "{{ fmw_response_file_path }}"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0644'
      when: not (fmw_install_marker.stat.exists | default(false))
      tags:
        - fmw_install

    - name: Run FMW silent installation
      ansible.builtin.command: "{{ java_home }}/bin/java -jar {{ fmw_installer_jar_path }} -silent -responseFile {{ fmw_response_file_path }} -invPtrLoc {{ oracle_base }}/oraInst.loc"
      args:
        # Changed 'creates' to specifically check for the RCU executable, ensuring infrastructure components are installed
        creates: "{{ oracle_middleware_home }}/oracle_common/bin/rcu"
      become: true # Run as root for installation (installer might need root privileges initially for inventory)
      become_user: "{{ weblogic_user }}" # Execute the command as the oracle user
      when: not (fmw_install_marker.stat.exists | default(false))
      tags:
        - fmw_install
      environment: # Set environment variables for the installation command
        JAVA_HOME: "{{ java_home }}"
        PATH: "{{ java_home }}/bin:{{ ansible_env.PATH }}"

    - name: Remove FMW installer and response file after installation
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ fmw_payload_dest }}"
        - "{{ fmw_response_file_path }}"
        - "{{ fmw_stage_dir }}"
      tags:
        - fmw_install

    # --- Task 7: RCU (Repository Creation Utility) Schema Creation ---
    - block:
        - name: Check if RCU executable exists
          ansible.builtin.stat:
            path: "{{ oracle_middleware_home }}/oracle_common/bin/rcu"
          register: rcu_exec_check
          tags:
            - rcu

        - name: Fail if RCU executable not found (FMW Infrastructure install issue)
          ansible.builtin.fail:
            msg: "RCU executable not found at {{ oracle_middleware_home }}/oracle_common/bin/rcu. FMW Infrastructure installation may have failed or installed to a different location."
          when: not rcu_exec_check.stat.exists
          tags:
            - rcu

        - name: Parse RCU DB host and port
          ansible.builtin.set_fact:
            rcu_db_host: "{{ rcu_connect_string | regex_replace('^([^:]+):.*', '\\\\1') }}"
            rcu_db_port: "{{ (rcu_connect_string | regex_replace('^[^:]+:([0-9]+).*', '\\\\1')) | int }}"
          tags:
            - rcu

        - name: Wait for RCU database listener
          ansible.builtin.wait_for:
            host: "{{ rcu_db_host }}"
            port: "{{ rcu_db_port }}"
            timeout: 30
          tags:
            - rcu

        - name: Install expect package
          ansible.builtin.package:
            name: expect
            state: present
          tags:
            - rcu

        - name: Transfer RCU response file to target
          ansible.builtin.template:
            src: templates/rcu.rsp.j2
            dest: "{{ rcu_response_file_path }}"
            owner: "{{ weblogic_user }}"
            group: "{{ weblogic_group }}"
            mode: '0644'
          tags:
            - rcu
          no_log: true

        - name: Create RCU password file
          ansible.builtin.template:
            src: templates/rcu_passwords.txt.j2
            dest: "/tmp/rcu_passwords.txt"
            owner: "{{ weblogic_user }}"
            group: "{{ weblogic_group }}"
            mode: '0600' # Important: Restrict permissions for password file
          tags:
            - rcu
          no_log: true

        - name: Create RCU expect script
          ansible.builtin.template:
            src: templates/run_rcu_expect.exp.j2
            dest: "/tmp/run_rcu_expect.exp"
            owner: "{{ weblogic_user }}"
            group: "{{ weblogic_group }}"
            mode: '0755' # Make it executable
          tags:
            - rcu
          no_log: true

        - name: Run RCU silent schema creation using expect script
          ansible.builtin.command: "/usr/bin/expect /tmp/run_rcu_expect.exp"
          args:
            # Idempotency: Assuming comps.xml in oraInventory indicates RCU has been run
            creates: "{{ oracle_base }}/oraInventory/ContentsXML/comps.xml"
          become: true
          become_user: "{{ weblogic_user }}"
          # Environment variables are now largely handled within the expect script itself
          tags:
            - rcu
          no_log: true

        - name: Clean up RCU response file, password file, and expect script
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - "{{ rcu_response_file_path }}"
            - "/tmp/rcu_passwords.txt" # Ensure password file is removed
            - "/tmp/run_rcu_expect.exp" # Ensure expect script is removed
          tags:
            - rcu
      when: rcu_enabled | bool

    # --- Task 8: WebLogic Domain Creation ---
    - name: Create WLST script for domain creation
      ansible.builtin.template:
        src: templates/create_domain.py.j2
        dest: "{{ scripts_dir }}/create_domain_{{ domain_name }}.py"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0700'
      tags:
        - domain_create
      no_log: true

    - name: Execute WLST script to create WebLogic domain
      ansible.builtin.command: "{{ weblogic_install_dir }}/common/bin/wlst.sh {{ scripts_dir }}/create_domain_{{ domain_name }}.py"
      args:
        creates: "{{ domain_home }}/config/config.xml" # Idempotency: only create if domain config doesn't exist
      become: true
      become_user: "{{ weblogic_user }}"
      environment:
        JAVA_HOME: "{{ java_home }}"
        PATH: "{{ java_home }}/bin:{{ ansible_env.PATH }}"
        CONFIG_JVM_ARGS: "-Dcom.oracle.cie.config.showProfile=true"
      tags:
        - domain_create

    - name: Create WLST scripts for additional domain creation
      ansible.builtin.template:
        src: templates/create_domain.py.j2
        dest: "{{ scripts_dir }}/create_domain_{{ item.domain_name }}.py"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0700'
      loop: "{{ additional_weblogic_domains | default([]) }}"
      vars:
        domain_name: "{{ item.domain_name }}"
        domain_home: "{{ item.domain_home }}"
        admin_port: "{{ item.admin_port }}"
        managed_servers: "{{ item.managed_servers | default([]) }}"
      tags:
        - domain_create
      no_log: true

    - name: Execute WLST scripts to create additional WebLogic domains
      ansible.builtin.command: "{{ weblogic_install_dir }}/common/bin/wlst.sh {{ scripts_dir }}/create_domain_{{ item.domain_name }}.py"
      args:
        creates: "{{ item.domain_home }}/config/config.xml"
      loop: "{{ additional_weblogic_domains | default([]) }}"
      become: true
      become_user: "{{ weblogic_user }}"
      environment:
        JAVA_HOME: "{{ java_home }}"
        PATH: "{{ java_home }}/bin:{{ ansible_env.PATH }}"
        CONFIG_JVM_ARGS: "-Dcom.oracle.cie.config.showProfile=true"
      tags:
        - domain_create

    - name: Detect additional domains with existing domain home (post-create)
      ansible.builtin.stat:
        path: "{{ item.domain_home }}/bin/startWebLogic.sh"
      loop: "{{ additional_weblogic_domains | default([]) }}"
      register: additional_domain_home_checks_post_create
      changed_when: false
      tags:
        - domain_create
        - systemd_service
        - crontab
        - summary

    - name: Build additional domain active/skip lists (post-create)
      ansible.builtin.set_fact:
        additional_weblogic_domains_active: "{{ additional_domain_home_checks_post_create.results | default([]) | selectattr('stat.exists', 'equalto', true) | map(attribute='item') | list }}"
        additional_weblogic_domains_skipped: "{{ additional_domain_home_checks_post_create.results | default([]) | rejectattr('stat.exists', 'equalto', true) | map(attribute='item') | list }}"
      tags:
        - domain_create
        - systemd_service
        - crontab
        - summary

    - name: Warn for additional domains skipped because domain_home is missing (post-create)
      ansible.builtin.debug:
        msg: "Skipping additional domain {{ item.domain_name }} (missing {{ item.domain_home }}/bin/startWebLogic.sh)."
      loop: "{{ additional_weblogic_domains_skipped | default([]) }}"
      when: (additional_weblogic_domains_skipped | default([]) | length) > 0
      tags:
        - summary

    - name: Check primary domain startWebLogic.sh presence
      ansible.builtin.stat:
        path: "{{ domain_home }}/bin/startWebLogic.sh"
      register: primary_domain_startweblogic
      changed_when: false
      tags:
        - domain_create
        - systemd_service

    - name: Ensure USER_MEM_ARGS is embedded in primary domain startWebLogic.sh
      ansible.builtin.blockinfile:
        path: "{{ domain_home }}/bin/startWebLogic.sh"
        marker: "# {mark} ANSIBLE USER_MEM_ARGS"
        insertbefore: "^umask 027"
        block: |
          USER_MEM_ARGS="{{ weblogic_user_mem_args }}"
          export USER_MEM_ARGS
      when: primary_domain_startweblogic.stat.exists
      tags:
        - domain_create
        - systemd_service

    - name: Ensure USER_MEM_ARGS is embedded in additional domain startWebLogic.sh
      ansible.builtin.blockinfile:
        path: "{{ item.domain_home }}/bin/startWebLogic.sh"
        marker: "# {mark} ANSIBLE USER_MEM_ARGS"
        insertbefore: "^umask 027"
        block: |
          USER_MEM_ARGS="{{ additional_domain_user_mem_args }}"
          export USER_MEM_ARGS
      loop: "{{ additional_weblogic_domains_active | default([]) }}"
      vars:
        additional_domain_gc_log_dir: "{{ item.weblogic_gc_log_dir | default(logs_base_dir + '/' + (item.domain_name | upper) + '_LOGS/gc') }}"
        additional_domain_gc_log_file: "{{ item.weblogic_gc_log_file | default(additional_domain_gc_log_dir + '/' + (item.domain_name | upper | regex_replace('[^A-Z0-9]', '') | lower) + '.log') }}"
        additional_domain_user_mem_args: "{{ item.weblogic_user_mem_args | default(weblogic_user_mem_args | replace(weblogic_primary_gc_log_file, additional_domain_gc_log_file)) }}"
      tags:
        - domain_create
        - systemd_service

    # --- Task 8b: Node Manager Configuration (optional) ---
    - name: Ensure Node Manager config directory exists
      ansible.builtin.file:
        path: "{{ domain_home }}/nodemanager"
        state: directory
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0750'
      when: nodemanager_enabled | bool
      tags:
        - nodemanager

    - name: Ensure Node Manager logs directory exists
      ansible.builtin.file:
        path: "{{ nodemanager_logs_dir }}"
        state: directory
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0775'
      when: nodemanager_enabled | bool
      tags:
        - nodemanager

    - name: Template Node Manager domains file
      ansible.builtin.template:
        src: templates/nodemanager.domains.j2
        dest: "{{ domain_home }}/nodemanager/nodemanager.domains"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0640'
      when: nodemanager_enabled | bool
      tags:
        - nodemanager

    - name: Check if Node Manager properties are already encrypted
      ansible.builtin.shell: "grep -q '{AES}' {{ domain_home }}/nodemanager/nodemanager.properties"
      register: nm_props_encrypted
      failed_when: false
      changed_when: false
      when: nodemanager_enabled | bool
      tags:
        - nodemanager

    - name: Template Node Manager properties
      ansible.builtin.template:
        src: templates/nodemanager.properties.j2
        dest: "{{ domain_home }}/nodemanager/nodemanager.properties"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0640'
      when:
        - nodemanager_enabled | bool
        - nm_props_encrypted.rc != 0
      tags:
        - nodemanager

    # --- Task 9: Systemd Service for WebLogic ---
    - name: Create WebLogic startup script
      ansible.builtin.template:
        src: templates/start_weblogic.sh.j2
        dest: "{{ scripts_dir }}/{{ start_script_name }}"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0755'
      tags:
        - systemd_service

    - name: Create WebLogic shutdown script
      ansible.builtin.template:
        src: templates/stop_weblogic.sh.j2
        dest: "{{ scripts_dir }}/{{ stop_script_name }}"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0755'
      tags:
        - systemd_service

    - name: Create Node Manager start script
      ansible.builtin.template:
        src: templates/start_nodemanager.sh.j2
        dest: "{{ scripts_dir }}/{{ nodemanager_start_script_name }}"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0755'
      when: nodemanager_enabled | bool
      tags:
        - nodemanager
        - systemd_service

    - name: Create Node Manager stop script
      ansible.builtin.template:
        src: templates/stop_nodemanager.sh.j2
        dest: "{{ scripts_dir }}/{{ nodemanager_stop_script_name }}"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0755'
      when: nodemanager_enabled | bool
      tags:
        - nodemanager
        - systemd_service

    - name: Create systemd service file for Node Manager
      ansible.builtin.template:
        src: templates/wls_service.service.j2
        dest: "/etc/systemd/system/{{ nodemanager_systemd_service_name }}"
        owner: root
        group: root
        mode: '0644'
      vars:
        service_description: "WebLogic Node Manager - {{ domain_name }}"
        service_exec_start: "{{ scripts_dir }}/{{ nodemanager_start_script_name }}"
        service_exec_stop: "{{ scripts_dir }}/{{ nodemanager_stop_script_name }}"
        service_working_dir: "{{ domain_home }}/bin"
        service_type: "simple"
        service_restart: "on-failure"
        service_restart_sec: 10
        service_remain_after_exit: false
      notify:
        - "reload systemd"
      when: nodemanager_enabled | bool
      tags:
        - nodemanager
        - systemd_service

    - name: Start and enable Node Manager service
      ansible.builtin.systemd:
        name: "{{ nodemanager_systemd_service_name }}"
        state: started
        enabled: true
      when: nodemanager_enabled | bool
      tags:
        - nodemanager
        - systemd_service

    - name: Create systemd service file for WebLogic domain
      ansible.builtin.template:
        src: templates/wls_service.service.j2
        dest: "/etc/systemd/system/{{ systemd_service_name }}"
        owner: root
        group: root
        mode: '0644'
      notify:
        - "reload systemd"
        - "start weblogic service" # Start the service immediately after creation/update
      tags:
        - systemd_service

    - name: Ensure AdminServer service is running before primary managed server setup
      ansible.builtin.systemd:
        name: "{{ systemd_service_name }}"
        state: started
        enabled: true
      when:
        - managed_server_enable | bool
        - (managed_servers | default([]) | length) > 0
      tags:
        - systemd_service

    - name: Wait for AdminServer listen port before primary managed server setup
      ansible.builtin.wait_for:
        host: "{{ ansible_host | default(inventory_hostname) }}"
        port: "{{ admin_port | int }}"
        state: started
        delay: 2
        timeout: 1800
      when:
        - managed_server_enable | bool
        - (managed_servers | default([]) | length) > 0
      tags:
        - systemd_service

    - name: Create WLST script to ensure primary managed servers exist
      ansible.builtin.template:
        src: templates/ensure_primary_managed_servers.py.j2
        dest: "{{ scripts_dir }}/ensure_primary_managed_servers.py"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0700'
      when:
        - managed_server_enable | bool
        - (managed_servers | default([]) | length) > 0
      tags:
        - domain_create
        - systemd_service
      no_log: true

    - name: Ensure primary managed servers exist in running domain
      ansible.builtin.command: "{{ weblogic_install_dir }}/common/bin/wlst.sh {{ scripts_dir }}/ensure_primary_managed_servers.py"
      become: true
      become_user: "{{ weblogic_user }}"
      environment:
        JAVA_HOME: "{{ java_home }}"
        PATH: "{{ java_home }}/bin:{{ ansible_env.PATH }}"
      register: primary_managed_servers_ensure
      changed_when: "'INFO: Managed server creation complete.' in (primary_managed_servers_ensure.stdout | default(''))"
      when:
        - managed_server_enable | bool
        - (managed_servers | default([]) | length) > 0
      tags:
        - domain_create
        - systemd_service
      no_log: true

    - name: Ensure security directories exist for primary managed servers
      ansible.builtin.file:
        path: "{{ domain_home }}/servers/{{ item.name }}/security"
        state: directory
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0700'
      loop: "{{ managed_servers | default([]) }}"
      when: managed_server_enable | bool
      tags:
        - domain_create
        - systemd_service

    - name: Check AdminServer boot.properties for primary domain
      ansible.builtin.stat:
        path: "{{ domain_home }}/servers/{{ admin_server_name }}/security/boot.properties"
      register: primary_admin_boot_prop_stat
      when: managed_server_enable | bool
      tags:
        - domain_create
        - systemd_service

    - name: Assert AdminServer boot.properties exists for primary domain
      ansible.builtin.assert:
        that:
          - primary_admin_boot_prop_stat.stat.exists | default(false)
        fail_msg: "Missing AdminServer boot.properties at {{ domain_home }}/servers/{{ admin_server_name }}/security/boot.properties; cannot seed managed server boot identities."
      when: managed_server_enable | bool
      tags:
        - domain_create
        - systemd_service

    - name: Sync boot.properties for primary managed servers from AdminServer
      ansible.builtin.copy:
        src: "{{ domain_home }}/servers/{{ admin_server_name }}/security/boot.properties"
        dest: "{{ domain_home }}/servers/{{ item.name }}/security/boot.properties"
        remote_src: true
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0600'
      loop: "{{ managed_servers | default([]) }}"
      when:
        - managed_server_enable | bool
      register: primary_managed_boot_prop_create_results
      tags:
        - domain_create
        - systemd_service
      no_log: true

    - name: Create managed server log directories for primary domain
      ansible.builtin.file:
        path: "{{ item.logs_dir | default(managed_logs_dir_base + '/' + item.name) }}"
        state: directory
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0775'
      loop: "{{ managed_servers | default([]) }}"
      when: managed_server_enable | bool
      tags:
        - directories
        - systemd_service

    - name: Create startup scripts for managed servers in primary domain
      ansible.builtin.template:
        src: templates/start_managed.sh.j2
        dest: "{{ scripts_dir }}/startManaged_{{ domain_service_key }}_{{ item.name | upper | regex_replace('[^A-Z0-9]', '') }}_{{ item.listen_port }}.sh"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0755'
      loop: "{{ managed_servers | default([]) }}"
      when: managed_server_enable | bool
      vars:
        managed_server_name: "{{ item.name }}"
        managed_server_logs_dir: "{{ item.logs_dir | default(managed_logs_dir_base + '/' + item.name) }}"
        admin_url: "{{ item.admin_url | default('t3://' + (ansible_host | default(inventory_hostname)) + ':' + (admin_port | string)) }}"
      tags:
        - systemd_service

    - name: Create shutdown scripts for managed servers in primary domain
      ansible.builtin.template:
        src: templates/stop_managed.sh.j2
        dest: "{{ scripts_dir }}/stopManaged_{{ domain_service_key }}_{{ item.name | upper | regex_replace('[^A-Z0-9]', '') }}_{{ item.listen_port }}.sh"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0755'
      loop: "{{ managed_servers | default([]) }}"
      when: managed_server_enable | bool
      vars:
        managed_server_name: "{{ item.name }}"
        managed_server_logs_dir: "{{ item.logs_dir | default(managed_logs_dir_base + '/' + item.name) }}"
        admin_url: "{{ item.admin_url | default('t3://' + (ansible_host | default(inventory_hostname)) + ':' + (admin_port | string)) }}"
      tags:
        - systemd_service

    - name: Create systemd service files for managed servers in primary domain
      ansible.builtin.template:
        src: templates/wls_service.service.j2
        dest: "/etc/systemd/system/wls{{ domain_service_key }}{{ item.listen_port }}.service"
        owner: root
        group: root
        mode: '0644'
      loop: "{{ managed_servers | default([]) }}"
      when: managed_server_enable | bool
      vars:
        service_description: "The {{ domain_name | upper | regex_replace('_', ' ') }} {{ item.name }} - {{ item.listen_port }} Weblogic Service"
        service_exec_start: "{{ scripts_dir }}/startManaged_{{ domain_service_key }}_{{ item.name | upper | regex_replace('[^A-Z0-9]', '') }}_{{ item.listen_port }}.sh"
        service_exec_stop: "{{ scripts_dir }}/stopManaged_{{ domain_service_key }}_{{ item.name | upper | regex_replace('[^A-Z0-9]', '') }}_{{ item.listen_port }}.sh"
        service_working_dir: "{{ domain_home }}/bin"
        service_after: "{{ systemd_service_name }}{% if nodemanager_enabled | bool %} {{ nodemanager_systemd_service_name }}{% endif %}"
        service_wants: "{{ systemd_service_name }}{% if nodemanager_enabled | bool %} {{ nodemanager_systemd_service_name }}{% endif %}"
      notify:
        - "reload systemd"
      tags:
        - systemd_service

    - name: Flush systemd handlers before starting managed server services for primary domain
      ansible.builtin.meta: flush_handlers
      when:
        - managed_server_enable | bool
        - (managed_servers | default([]) | length) > 0
      tags:
        - systemd_service

    - name: Start and enable managed server services for primary domain
      ansible.builtin.systemd:
        name: "wls{{ domain_service_key }}{{ item.listen_port }}.service"
        state: >-
          {{
            (
              (
                (primary_managed_boot_prop_create_results.results | default([]))
                | selectattr('changed', 'equalto', true)
                | list
                | length
              ) > 0
            )
            | ternary('restarted', 'started')
          }}
        enabled: true
      loop: "{{ managed_servers | default([]) }}"
      when: managed_server_enable | bool
      tags:
        - systemd_service

    - name: Wait for primary managed server listen ports
      ansible.builtin.wait_for:
        host: "127.0.0.1"
        port: "{{ item.listen_port | int }}"
        state: started
        delay: 2
        timeout: 1800
      loop: "{{ managed_servers | default([]) }}"
      when: managed_server_enable | bool
      tags:
        - systemd_service

    - name: Create log directories for additional domains
      ansible.builtin.file:
        path: "{{ item.domain_logs_dir | default(logs_base_dir + '/' + (item.domain_name | upper) + '_LOGS/' + (item.admin_port | string)) }}"
        state: directory
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0775'
      loop: "{{ additional_weblogic_domains_active | default([]) }}"
      tags:
        - directories
        - systemd_service

    - name: Ensure security directories exist for managed servers in additional domains
      ansible.builtin.file:
        path: "{{ item.0.domain_home }}/servers/{{ item.1.name }}/security"
        state: directory
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0700'
      loop: "{{ query('subelements', additional_weblogic_domains_active | default([]), 'managed_servers', {'skip_missing': True}) }}"
      when: managed_server_enable | bool
      tags:
        - domain_create
        - systemd_service

    - name: Check AdminServer boot.properties for additional domains
      ansible.builtin.stat:
        path: "{{ item.domain_home }}/servers/{{ item.admin_server_name | default('AdminServer') }}/security/boot.properties"
      loop: "{{ additional_weblogic_domains_active | default([]) }}"
      register: additional_admin_boot_prop_stats
      changed_when: false
      tags:
        - domain_create
        - systemd_service

    - name: Assert AdminServer boot.properties exists for additional domains with managed servers
      ansible.builtin.assert:
        that:
          - item.stat.exists | default(false)
        fail_msg: "Missing AdminServer boot.properties at {{ item.item.domain_home }}/servers/{{ item.item.admin_server_name | default('AdminServer') }}/security/boot.properties; cannot seed managed server boot identities."
      loop: "{{ additional_admin_boot_prop_stats.results | default([]) }}"
      when:
        - managed_server_enable | bool
        - (item.item.managed_servers | default([]) | length) > 0
      tags:
        - domain_create
        - systemd_service

    - name: Sync boot.properties for managed servers in additional domains from AdminServer
      ansible.builtin.copy:
        src: "{{ item.0.domain_home }}/servers/{{ item.0.admin_server_name | default('AdminServer') }}/security/boot.properties"
        dest: "{{ item.0.domain_home }}/servers/{{ item.1.name }}/security/boot.properties"
        remote_src: true
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0600'
      loop: "{{ query('subelements', additional_weblogic_domains_active | default([]), 'managed_servers', {'skip_missing': True}) }}"
      when:
        - managed_server_enable | bool
      register: additional_managed_boot_prop_create_results
      tags:
        - domain_create
        - systemd_service
      no_log: true

    - name: Create managed server log directories for additional domains
      ansible.builtin.file:
        path: "{{ item.1.logs_dir | default((item.0.managed_logs_dir_base | default(logs_base_dir + '/' + (item.0.domain_name | upper) + '_LOGS/managed')) + '/' + item.1.name) }}"
        state: directory
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0775'
      loop: "{{ query('subelements', additional_weblogic_domains_active | default([]), 'managed_servers', {'skip_missing': True}) }}"
      when: managed_server_enable | bool
      tags:
        - directories
        - systemd_service

    - name: Create GC log directories for additional domains
      ansible.builtin.file:
        path: "{{ item.weblogic_gc_log_dir | default(logs_base_dir + '/' + (item.domain_name | upper) + '_LOGS/gc') }}"
        state: directory
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0775'
      loop: "{{ additional_weblogic_domains_active | default([]) }}"
      tags:
        - directories
        - systemd_service

    - name: Ensure GC log files exist for additional domains
      ansible.builtin.file:
        path: "{{ item.weblogic_gc_log_file | default((item.weblogic_gc_log_dir | default(logs_base_dir + '/' + (item.domain_name | upper) + '_LOGS/gc')) + '/' + (item.domain_name | upper | regex_replace('[^A-Z0-9]', '') | lower) + '.log') }}"
        state: touch
        access_time: preserve
        modification_time: preserve
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0664'
      loop: "{{ additional_weblogic_domains_active | default([]) }}"
      tags:
        - directories
        - systemd_service

    - name: Create startup scripts for additional domains
      ansible.builtin.template:
        src: templates/start_weblogic.sh.j2
        dest: "{{ scripts_dir }}/startWeblogic_{{ item.domain_name | upper | regex_replace('[^A-Z0-9]', '') }}_{{ item.admin_port }}.sh"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0755'
      loop: "{{ additional_weblogic_domains_active | default([]) }}"
      vars:
        domain_name: "{{ item.domain_name }}"
        domain_home: "{{ item.domain_home }}"
        admin_port: "{{ item.admin_port }}"
        domain_logs_dir: "{{ item.domain_logs_dir | default(logs_base_dir + '/' + (item.domain_name | upper) + '_LOGS/' + (item.admin_port | string)) }}"
        weblogic_admin_user_effective: "{{ item.weblogic_admin_user | default(weblogic_admin_user) }}"
        additional_domain_gc_log_dir: "{{ item.weblogic_gc_log_dir | default(logs_base_dir + '/' + (item.domain_name | upper) + '_LOGS/gc') }}"
        additional_domain_gc_log_file: "{{ item.weblogic_gc_log_file | default(additional_domain_gc_log_dir + '/' + (item.domain_name | upper | regex_replace('[^A-Z0-9]', '') | lower) + '.log') }}"
        weblogic_gc_log_file: "{{ additional_domain_gc_log_file }}"
        weblogic_user_mem_args_effective: "{{ item.weblogic_user_mem_args | default(weblogic_user_mem_args | replace(weblogic_primary_gc_log_file, additional_domain_gc_log_file)) }}"
      tags:
        - systemd_service

    - name: Create shutdown scripts for additional domains
      ansible.builtin.template:
        src: templates/stop_weblogic.sh.j2
        dest: "{{ scripts_dir }}/stopWeblogic_{{ item.domain_name | upper | regex_replace('[^A-Z0-9]', '') }}_{{ item.admin_port }}.sh"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0755'
      loop: "{{ additional_weblogic_domains_active | default([]) }}"
      vars:
        domain_name: "{{ item.domain_name }}"
        domain_home: "{{ item.domain_home }}"
        admin_port: "{{ item.admin_port }}"
        domain_logs_dir: "{{ item.domain_logs_dir | default(logs_base_dir + '/' + (item.domain_name | upper) + '_LOGS/' + (item.admin_port | string)) }}"
        weblogic_admin_user_effective: "{{ item.weblogic_admin_user | default(weblogic_admin_user) }}"
      tags:
        - systemd_service

    - name: Create startup scripts for managed servers in additional domains
      ansible.builtin.template:
        src: templates/start_managed.sh.j2
        dest: "{{ scripts_dir }}/startManaged_{{ item.0.domain_name | upper | regex_replace('[^A-Z0-9]', '') }}_{{ item.1.name | upper | regex_replace('[^A-Z0-9]', '') }}_{{ item.1.listen_port }}.sh"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0755'
      loop: "{{ query('subelements', additional_weblogic_domains_active | default([]), 'managed_servers', {'skip_missing': True}) }}"
      when: managed_server_enable | bool
      vars:
        domain_name: "{{ item.0.domain_name }}"
        domain_home: "{{ item.0.domain_home }}"
        managed_server_name: "{{ item.1.name }}"
        managed_server_logs_dir: "{{ item.1.logs_dir | default((item.0.managed_logs_dir_base | default(logs_base_dir + '/' + (item.0.domain_name | upper) + '_LOGS/managed')) + '/' + item.1.name) }}"
        admin_url: "{{ item.0.admin_url | default('t3://' + (item.0.admin_listen_address | default(ansible_host | default(inventory_hostname), true)) + ':' + (item.0.admin_port | string)) }}"
        additional_domain_gc_log_dir: "{{ item.0.weblogic_gc_log_dir | default(logs_base_dir + '/' + (item.0.domain_name | upper) + '_LOGS/gc') }}"
        additional_domain_gc_log_file: "{{ item.0.weblogic_gc_log_file | default(additional_domain_gc_log_dir + '/' + (item.0.domain_name | upper | regex_replace('[^A-Z0-9]', '') | lower) + '.log') }}"
        weblogic_gc_log_file: "{{ additional_domain_gc_log_file }}"
        weblogic_user_mem_args_effective: "{{ item.0.weblogic_user_mem_args | default(weblogic_user_mem_args | replace(weblogic_primary_gc_log_file, additional_domain_gc_log_file)) }}"
      tags:
        - systemd_service

    - name: Create shutdown scripts for managed servers in additional domains
      ansible.builtin.template:
        src: templates/stop_managed.sh.j2
        dest: "{{ scripts_dir }}/stopManaged_{{ item.0.domain_name | upper | regex_replace('[^A-Z0-9]', '') }}_{{ item.1.name | upper | regex_replace('[^A-Z0-9]', '') }}_{{ item.1.listen_port }}.sh"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: '0755'
      loop: "{{ query('subelements', additional_weblogic_domains_active | default([]), 'managed_servers', {'skip_missing': True}) }}"
      when: managed_server_enable | bool
      vars:
        domain_name: "{{ item.0.domain_name }}"
        domain_home: "{{ item.0.domain_home }}"
        managed_server_name: "{{ item.1.name }}"
        managed_server_logs_dir: "{{ item.1.logs_dir | default((item.0.managed_logs_dir_base | default(logs_base_dir + '/' + (item.0.domain_name | upper) + '_LOGS/managed')) + '/' + item.1.name) }}"
        admin_url: "{{ item.0.admin_url | default('t3://' + (item.0.admin_listen_address | default(ansible_host | default(inventory_hostname), true)) + ':' + (item.0.admin_port | string)) }}"
        weblogic_admin_user_effective: "{{ item.0.weblogic_admin_user | default(weblogic_admin_user) }}"
      tags:
        - systemd_service

    - name: Create systemd service files for additional domains
      ansible.builtin.template:
        src: templates/wls_service.service.j2
        dest: "/etc/systemd/system/wls{{ item.domain_name | upper | regex_replace('[^A-Z0-9]', '') }}{{ item.admin_port }}.service"
        owner: root
        group: root
        mode: '0644'
      loop: "{{ additional_weblogic_domains_active | default([]) }}"
      vars:
        service_description: "The {{ item.domain_name | upper | regex_replace('_', ' ') }} - {{ item.admin_port }} Weblogic Service"
        service_exec_start: "{{ scripts_dir }}/startWeblogic_{{ item.domain_name | upper | regex_replace('[^A-Z0-9]', '') }}_{{ item.admin_port }}.sh"
        service_exec_stop: "{{ scripts_dir }}/stopWeblogic_{{ item.domain_name | upper | regex_replace('[^A-Z0-9]', '') }}_{{ item.admin_port }}.sh"
        service_working_dir: "{{ item.domain_home }}/bin"
      notify:
        - "reload systemd"
      tags:
        - systemd_service

    - name: Start and enable services for additional domains
      ansible.builtin.systemd:
        name: "wls{{ item.domain_name | upper | regex_replace('[^A-Z0-9]', '') }}{{ item.admin_port }}.service"
        state: started
        enabled: true
      loop: "{{ additional_weblogic_domains_active | default([]) }}"
      tags:
        - systemd_service

    - name: Create systemd service files for managed servers in additional domains
      ansible.builtin.template:
        src: templates/wls_service.service.j2
        dest: "/etc/systemd/system/wls{{ item.0.domain_name | upper | regex_replace('[^A-Z0-9]', '') }}{{ item.1.listen_port }}.service"
        owner: root
        group: root
        mode: '0644'
      loop: "{{ query('subelements', additional_weblogic_domains_active | default([]), 'managed_servers', {'skip_missing': True}) }}"
      when: managed_server_enable | bool
      vars:
        _additional_admin_service: "wls{{ item.0.domain_name | upper | regex_replace('[^A-Z0-9]', '') }}{{ item.0.admin_port }}.service"
        service_description: "The {{ item.0.domain_name | upper | regex_replace('_', ' ') }} {{ item.1.name }} - {{ item.1.listen_port }} Weblogic Service"
        service_exec_start: "{{ scripts_dir }}/startManaged_{{ item.0.domain_name | upper | regex_replace('[^A-Z0-9]', '') }}_{{ item.1.name | upper | regex_replace('[^A-Z0-9]', '') }}_{{ item.1.listen_port }}.sh"
        service_exec_stop: "{{ scripts_dir }}/stopManaged_{{ item.0.domain_name | upper | regex_replace('[^A-Z0-9]', '') }}_{{ item.1.name | upper | regex_replace('[^A-Z0-9]', '') }}_{{ item.1.listen_port }}.sh"
        service_working_dir: "{{ item.0.domain_home }}/bin"
        service_after: "{{ _additional_admin_service }}{% if nodemanager_enabled | bool %} {{ nodemanager_systemd_service_name }}{% endif %}"
        service_wants: "{{ _additional_admin_service }}{% if nodemanager_enabled | bool %} {{ nodemanager_systemd_service_name }}{% endif %}"
      notify:
        - "reload systemd"
      tags:
        - systemd_service

    - name: Flush systemd handlers before starting managed server services for additional domains
      ansible.builtin.meta: flush_handlers
      when:
        - managed_server_enable | bool
        - (query('subelements', additional_weblogic_domains_active | default([]), 'managed_servers', {'skip_missing': True}) | length) > 0
      tags:
        - systemd_service

    - name: Wait for additional domain AdminServer listen ports before managed server startup
      ansible.builtin.wait_for:
        host: "127.0.0.1"
        port: "{{ item.admin_port | int }}"
        state: started
        delay: 2
        timeout: 1800
      loop: "{{ additional_weblogic_domains_active | default([]) }}"
      when:
        - managed_server_enable | bool
        - (item.managed_servers | default([]) | length) > 0
      tags:
        - systemd_service

    - name: Start and enable managed server services for additional domains
      ansible.builtin.systemd:
        name: "wls{{ item.0.domain_name | upper | regex_replace('[^A-Z0-9]', '') }}{{ item.1.listen_port }}.service"
        state: >-
          {{
            (
              (
                (additional_managed_boot_prop_create_results.results | default([]))
                | selectattr('changed', 'equalto', true)
                | list
                | length
              ) > 0
            )
            | ternary('restarted', 'started')
          }}
        enabled: true
      loop: "{{ query('subelements', additional_weblogic_domains_active | default([]), 'managed_servers', {'skip_missing': True}) }}"
      when: managed_server_enable | bool
      tags:
        - systemd_service

    - name: Wait for additional domain managed server listen ports
      ansible.builtin.wait_for:
        host: "127.0.0.1"
        port: "{{ item.1.listen_port | int }}"
        state: started
        delay: 2
        timeout: 1800
      loop: "{{ query('subelements', additional_weblogic_domains_active | default([]), 'managed_servers', {'skip_missing': True}) }}"
      when: managed_server_enable | bool
      tags:
        - systemd_service

    # --- Task 10: Crontab Management ---
    - name: Add crontab entries for WebLogic daily stop
      ansible.builtin.cron:
        name: "Stop {{ domain_name | upper }} WebLogic Admin Server"
        user: root # Crontab entries for systemctl commands should typically be root
        minute: "{{ crontab_stop_minute }}"
        hour: "{{ crontab_stop_hour }}"
        job: "/usr/bin/systemctl stop {{ systemd_service_name }}"
        state: present
      tags:
        - crontab
      when: crontab_enabled | bool

    - name: Add crontab entries for additional domain daily stop
      ansible.builtin.cron:
        name: "Stop {{ item.domain_name | upper }} WebLogic Admin Server"
        user: root
        minute: "{{ item.cron_stop_minute | default(crontab_stop_minute) }}"
        hour: "{{ item.cron_stop_hour | default(crontab_stop_hour) }}"
        job: "/usr/bin/systemctl stop wls{{ item.domain_name | upper | regex_replace('[^A-Z0-9]', '') }}{{ item.admin_port }}.service"
        state: present
      loop: "{{ additional_weblogic_domains_active | default([]) }}"
      tags:
        - crontab
      when: crontab_enabled | bool

    - name: Add crontab entries for WebLogic daily start
      ansible.builtin.cron:
        name: "Start {{ domain_name | upper }} WebLogic Admin Server"
        user: root
        minute: "{{ crontab_start_minute }}"
        hour: "{{ crontab_start_hour }}"
        job: "/usr/bin/systemctl start {{ systemd_service_name }}"
        state: present
      tags:
        - crontab
      when: crontab_enabled | bool

    - name: Add crontab entries for additional domain daily start
      ansible.builtin.cron:
        name: "Start {{ item.domain_name | upper }} WebLogic Admin Server"
        user: root
        minute: "{{ item.cron_start_minute | default(crontab_start_minute) }}"
        hour: "{{ item.cron_start_hour | default(crontab_start_hour) }}"
        job: "/usr/bin/systemctl start wls{{ item.domain_name | upper | regex_replace('[^A-Z0-9]', '') }}{{ item.admin_port }}.service"
        state: present
      loop: "{{ additional_weblogic_domains_active | default([]) }}"
      tags:
        - crontab
      when: crontab_enabled | bool

    - name: Ensure pkill java entry is present (if desired, use with caution)
      ansible.builtin.cron:
        name: "Kill all java processes (caution: affects all java apps!)"
        user: root
        minute: "{{ crontab_pkill_minute }}"
        hour: "{{ crontab_pkill_hour }}"
        job: "/usr/bin/pkill -9 java"
        state: present
      # This task is included as per your example, but be cautious with `pkill -9 java`
      # as it will kill ALL Java processes, not just WebLogic.
      # Consider more specific stop mechanisms or omit this if not desired.
      tags:
        - crontab
      when:
        - crontab_enabled | bool
        - dangerous_pkill_enabled | bool

    # ---- Task 14: Storage Cleanup ----
    # Deploy cleanup scripts, logrotate configs, disk monitoring, and journald settings.
    # Runs during the nightly restart window (00:00) when WebLogic is stopped.

    - name: "CLEANUP | Build domain homes list (includes additional domains)"
      ansible.builtin.set_fact:
        cleanup_weblogic_domain_homes: >-
          {{ cleanup_weblogic_domain_homes +
             (additional_weblogic_domains | default([]) | map(attribute='domain_home') | list) }}
      when: cleanup_enabled | default(true) | bool
      tags: [cleanup]

    - name: "CLEANUP | Extend cleanup log dirs with additional domains"
      ansible.builtin.set_fact:
        cleanup_weblogic_log_dirs: >-
          {{ cleanup_weblogic_log_dirs +
             (additional_weblogic_domains | default([]) | map(attribute='startup_log_dir') | select('defined') | list) }}
        cleanup_weblogic_tmp_dirs: >-
          {{ cleanup_weblogic_tmp_dirs +
             (additional_weblogic_domains | default([]) |
              map(attribute='domain_home') |
              map('regex_replace', '$', '/servers/AdminServer/tmp/_WL_user') | list) }}
        cleanup_weblogic_cache_dirs: >-
          {{ cleanup_weblogic_cache_dirs +
             (additional_weblogic_domains | default([]) |
              map(attribute='domain_home') |
              map('regex_replace', '$', '/servers/AdminServer/cache') | list) }}
        cleanup_weblogic_server_log_dirs: >-
          {{ cleanup_weblogic_server_log_dirs +
             (additional_weblogic_domains | default([]) |
              map(attribute='domain_home') |
              map('regex_replace', '$', '/servers/AdminServer/logs') | list) }}
      when: cleanup_enabled | default(true) | bool
      tags: [cleanup]

    - name: "CLEANUP | Ensure cleanup log directory exists"
      ansible.builtin.file:
        path: "{{ cleanup_log_dir }}"
        state: directory
        owner: "{{ cleanup_file_owner }}"
        group: "{{ cleanup_file_group }}"
        mode: "0755"
      when: cleanup_enabled | default(true) | bool
      tags: [cleanup]

    - name: "CLEANUP | Deploy WebLogic cleanup script"
      ansible.builtin.template:
        src: templates/cleanup_weblogic.sh.j2
        dest: "{{ cleanup_script_dir }}/cleanup_weblogic.sh"
        owner: "{{ cleanup_file_owner }}"
        group: "{{ cleanup_file_group }}"
        mode: "0755"
      when: cleanup_enabled | default(true) | bool
      tags: [cleanup]

    - name: "CLEANUP | Deploy logrotate config for WebLogic stdout logs"
      ansible.builtin.template:
        src: templates/logrotate_weblogic.j2
        dest: /etc/logrotate.d/weblogic
        owner: root
        group: root
        mode: "0644"
      when: cleanup_enabled | default(true) | bool
      tags: [cleanup, logrotate]

    - name: "CLEANUP | Deploy disk space monitoring script"
      ansible.builtin.template:
        src: templates/check_disk.sh.j2
        dest: "{{ cleanup_script_dir }}/check_disk.sh"
        owner: "{{ cleanup_file_owner }}"
        group: "{{ cleanup_file_group }}"
        mode: "0755"
      when: cleanup_enabled | default(true) | bool
      tags: [cleanup, monitoring]

    - name: "CLEANUP | Add WebLogic cleanup cron job (oracle user)"
      ansible.builtin.cron:
        name: "Storage cleanup — WebLogic"
        user: "{{ cleanup_file_owner }}"
        minute: "{{ cleanup_wls_cron_minute }}"
        hour: "{{ cleanup_wls_cron_hour }}"
        job: "{{ cleanup_script_dir }}/cleanup_weblogic.sh 2>&1"
      when: cleanup_enabled | default(true) | bool
      tags: [cleanup, crontab]

    - name: "CLEANUP | Add disk check cron job (oracle user)"
      ansible.builtin.cron:
        name: "Storage cleanup — disk check"
        user: "{{ cleanup_file_owner }}"
        minute: "{{ cleanup_disk_cron_minute }}"
        hour: "{{ cleanup_disk_cron_hour }}"
        job: "{{ cleanup_script_dir }}/check_disk.sh 2>&1"
      when: cleanup_enabled | default(true) | bool
      tags: [cleanup, crontab, monitoring]

    - name: "CLEANUP | Configure journald SystemMaxUse"
      ansible.builtin.lineinfile:
        path: /etc/systemd/journald.conf
        regexp: "^#?SystemMaxUse="
        line: "SystemMaxUse={{ cleanup_journald_max_use }}"
        backup: true
      when: cleanup_enabled | default(true) | bool
      tags: [cleanup, journald]

    - name: "CLEANUP | Configure journald MaxRetentionSec"
      ansible.builtin.lineinfile:
        path: /etc/systemd/journald.conf
        regexp: "^#?MaxRetentionSec="
        line: "MaxRetentionSec={{ cleanup_journald_max_retention }}"
      when: cleanup_enabled | default(true) | bool
      tags: [cleanup, journald]

    # --- Final Task: Deployment Summary ---
    - name: Display WebLogic Deployment Summary
      ansible.builtin.debug:
        msg: |
          =======================================================
          WebLogic 12c Deployment Summary
          =======================================================
          Host: {{ ansible_hostname | default(inventory_hostname) }} ({{ ansible_default_ipv4.address | default(ansible_host | default(inventory_hostname)) }})
          Oracle User: {{ weblogic_user }} (UID: {{ weblogic_user_uid | default('auto') }})
          Oracle Group: {{ weblogic_group }} (GID: {{ weblogic_group_gid | default('auto') }})
          JDK Home: {{ java_home }}
          Middleware Home: {{ oracle_middleware_home }}
          WebLogic Domain Name: {{ domain_name }}
          WebLogic Domain Home: {{ domain_home }}
          Admin Server Port: {{ admin_port }}
          Systemd Service Name: {{ systemd_service_name }}
          {% if nodemanager_enabled | bool %}Node Manager Service Name: {{ nodemanager_systemd_service_name }} ({{ nodemanager_listen_address | default('0.0.0.0', true) }}:{{ nodemanager_listen_port }}){% endif %}
          Managed Server Services Enabled: {{ managed_server_enable }}
          Managed Servers (Primary Domain): {{ (managed_server_enable | bool) | ternary((managed_servers | default([]) | map(attribute='name') | list | join(', ')), 'none') }}
          USER_MEM_ARGS Applied: {{ weblogic_user_mem_args }}
          Firewall Allowlist Ports: {{ firewall_allowlist_ports | default([]) | map('string') | join(', ') if (firewall_allowlist_ports | default([]) | length) > 0 else 'none' }}
          Cron Enabled: {{ crontab_enabled }} (stop: {{ crontab_stop_hour }}:{{ crontab_stop_minute }}, start: {{ crontab_start_hour }}:{{ crontab_start_minute }}, pkill: {{ crontab_pkill_hour }}:{{ crontab_pkill_minute }}, pkill_java: {{ dangerous_pkill_enabled }})
          {% if (additional_weblogic_domains_active | default([]) | length) > 0 %}
          Additional Domains Active: {{ additional_weblogic_domains_active | map(attribute='domain_name') | list | join(', ') }}
          {% endif %}
          {% if (additional_weblogic_domains_skipped | default([]) | length) > 0 %}
          Additional Domains Skipped (missing home): {{ additional_weblogic_domains_skipped | map(attribute='domain_name') | list | join(', ') }}
          {% endif %}
          {% if (additional_weblogic_domains_active | default([]) | length) > 0 %}
          Additional Domain Admin Services: {% for d in additional_weblogic_domains_active %}wls{{ d.domain_name | upper | regex_replace('[^A-Z0-9]', '') }}{{ d.admin_port }}.service{% if not loop.last %}, {% endif %}{% endfor %}
          {% endif %}
          WebLogic Status: Check `systemctl status {{ systemd_service_name }}`
          Admin Console URL: http://{{ ansible_default_ipv4.address | default(ansible_host | default(inventory_hostname)) }}:{{ admin_port }}/console
          =======================================================
          Please verify the service status and access the console.
      tags:
        - summary
