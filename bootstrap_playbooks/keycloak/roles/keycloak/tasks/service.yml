---
- name: Ensure keycloak systemd environment directory exists
  ansible.builtin.file:
    path: /etc/keycloak
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Render Keycloak runtime environment file
  ansible.builtin.template:
    src: keycloak.env.j2
    dest: /etc/keycloak/keycloak.env
    owner: root
    group: root
    mode: "0600"
  notify: restart keycloak
  no_log: true

- name: Install Keycloak systemd service
  ansible.builtin.template:
    src: keycloak.service.j2
    dest: /etc/systemd/system/keycloak.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart keycloak

- name: Flush handlers before starting service
  ansible.builtin.meta: flush_handlers

- name: Ensure keycloak service is enabled and running
  ansible.builtin.systemd:
    name: keycloak
    enabled: true
    state: started

- name: Ensure firewalld is running
  ansible.builtin.systemd:
    name: firewalld
    enabled: true
    state: started
  when: keycloak_manage_firewall | bool

- name: Open Keycloak firewall ports
  ansible.posix.firewalld:
    port: "{{ item }}/tcp"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - "{{ keycloak_http_port }}"
    - "{{ keycloak_health_port }}"
  when: keycloak_manage_firewall | bool
