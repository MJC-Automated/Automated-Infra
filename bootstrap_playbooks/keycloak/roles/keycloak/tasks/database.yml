---
- name: Build PostgreSQL admin execution user
  ansible.builtin.set_fact:
    keycloak_db_admin_become_user: "{{ keycloak_db_endpoint_is_local | ternary('postgres', 'root') }}"
  changed_when: false

- name: Build PostgreSQL admin connection environment
  ansible.builtin.set_fact:
    keycloak_db_admin_environment: >-
      {{
        {}
        | combine(
            (not keycloak_db_endpoint_is_local)
            | ternary({'PGHOST': keycloak_db_host}, {})
          )
        | combine(
            (keycloak_db_port | int != 5432)
            | ternary({'PGPORT': keycloak_db_port | string}, {})
          )
        | combine(
            (not keycloak_db_endpoint_is_local)
            | ternary({'PGUSER': keycloak_db_admin_user}, {})
          )
        | combine(
            (not keycloak_db_endpoint_is_local)
            | ternary({'PGDATABASE': keycloak_db_admin_database}, {})
          )
        | combine(
            (
              (not keycloak_db_endpoint_is_local) and
              (keycloak_db_admin_password | default('') | string | length > 0)
            )
            | ternary({'PGPASSWORD': keycloak_db_admin_password}, {})
          )
      }}
  changed_when: false

- name: Check whether Keycloak DB role exists
  ansible.builtin.shell: |
    set -euo pipefail
    psql \
      -tA \
      -v ON_ERROR_STOP=1 \
      --set=keycloak_db_user="$KEYCLOAK_DB_USER" <<'SQL'
    SELECT 1 FROM pg_roles WHERE rolname = :'keycloak_db_user';
    SQL
  args:
    executable: /bin/bash
  environment: "{{ {'KEYCLOAK_DB_USER': keycloak_db_user} | combine(keycloak_db_admin_environment) }}"
  become_user: "{{ keycloak_db_admin_become_user }}"
  register: keycloak_role_exists
  changed_when: false

- name: Create Keycloak DB role
  ansible.builtin.shell: |
    set -euo pipefail
    psql \
      -v ON_ERROR_STOP=1 \
      --set=keycloak_db_user="$KEYCLOAK_DB_USER" \
      --set=keycloak_db_password="$KEYCLOAK_DB_PASSWORD" <<'SQL'
    SELECT format(
      'CREATE USER %I WITH ENCRYPTED PASSWORD %L',
      :'keycloak_db_user',
      :'keycloak_db_password'
    )
    WHERE NOT EXISTS (
      SELECT 1 FROM pg_roles WHERE rolname = :'keycloak_db_user'
    );
    \gexec
    SQL
  args:
    executable: /bin/bash
  environment: "{{ {'KEYCLOAK_DB_USER': keycloak_db_user, 'KEYCLOAK_DB_PASSWORD': keycloak_db_password} | combine(keycloak_db_admin_environment) }}"
  become_user: "{{ keycloak_db_admin_become_user }}"
  when: keycloak_role_exists.stdout | trim != "1"
  no_log: true

- name: Ensure Keycloak DB role password is up to date
  ansible.builtin.shell: |
    set -euo pipefail
    psql \
      -v ON_ERROR_STOP=1 \
      --set=keycloak_db_user="$KEYCLOAK_DB_USER" \
      --set=keycloak_db_password="$KEYCLOAK_DB_PASSWORD" <<'SQL'
    SELECT format(
      'ALTER USER %I WITH ENCRYPTED PASSWORD %L',
      :'keycloak_db_user',
      :'keycloak_db_password'
    );
    \gexec
    SQL
  args:
    executable: /bin/bash
  environment: "{{ {'KEYCLOAK_DB_USER': keycloak_db_user, 'KEYCLOAK_DB_PASSWORD': keycloak_db_password} | combine(keycloak_db_admin_environment) }}"
  become_user: "{{ keycloak_db_admin_become_user }}"
  changed_when: false
  no_log: true

- name: Check whether Keycloak database exists
  ansible.builtin.shell: |
    set -euo pipefail
    psql \
      -tA \
      -v ON_ERROR_STOP=1 \
      --set=keycloak_db_name="$KEYCLOAK_DB_NAME" <<'SQL'
    SELECT 1 FROM pg_database WHERE datname = :'keycloak_db_name';
    SQL
  args:
    executable: /bin/bash
  environment: "{{ {'KEYCLOAK_DB_NAME': keycloak_db_name} | combine(keycloak_db_admin_environment) }}"
  become_user: "{{ keycloak_db_admin_become_user }}"
  register: keycloak_db_exists
  changed_when: false

- name: Create Keycloak database
  ansible.builtin.shell: |
    set -euo pipefail
    createdb --owner="$KEYCLOAK_DB_USER" -- "$KEYCLOAK_DB_NAME"
  args:
    executable: /bin/bash
  environment: "{{ {'KEYCLOAK_DB_USER': keycloak_db_user, 'KEYCLOAK_DB_NAME': keycloak_db_name} | combine(keycloak_db_admin_environment) }}"
  become_user: "{{ keycloak_db_admin_become_user }}"
  when: keycloak_db_exists.stdout | trim != "1"

- name: Ensure Keycloak DB privileges
  ansible.builtin.shell: |
    set -euo pipefail
    psql \
      -v ON_ERROR_STOP=1 \
      --set=keycloak_db_name="$KEYCLOAK_DB_NAME" \
      --set=keycloak_db_user="$KEYCLOAK_DB_USER" <<'SQL'
    SELECT format(
      'GRANT ALL PRIVILEGES ON DATABASE %I TO %I',
      :'keycloak_db_name',
      :'keycloak_db_user'
    );
    \gexec
    SQL
  args:
    executable: /bin/bash
  environment: "{{ {'KEYCLOAK_DB_NAME': keycloak_db_name, 'KEYCLOAK_DB_USER': keycloak_db_user} | combine(keycloak_db_admin_environment) }}"
  become_user: "{{ keycloak_db_admin_become_user }}"
  changed_when: false
