[defaults]
# Centralized inventory per environment (absolute path avoids symlink ambiguity)
# Switch env by changing the path (e.g., inventories/testing or inventories/prod)
# Include aliases.ini to map app-specific groups (oracle_servers, weblogic_servers).
inventory = inventories/example/inventory.ini,inventories/aliases.ini

# Safe defaults for homelab automation
host_key_checking = True
stdout_callback = default
callbacks_enabled = profile_tasks

# Long-running playbooks (e.g., DB installs)
timeout = 36000

# Avoid local tmp permission issues
local_tmp = /tmp/ansible-${USER}
remote_tmp = /tmp
