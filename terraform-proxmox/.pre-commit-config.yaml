---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.108.0
    hooks:
      - id: terraform_fmt
      - id: terraform_docs
      - id: terraform_tflint
      - id: terraform_tfsec
        args:
          # tfsec does not yet parse Terraform ephemeral blocks. This matches
          # the Makefile scan while Terraform validate covers HCL correctness.
          - --args=--ignore-hcl-errors

  - repo: https://github.com/ansible/ansible-lint
    rev: v26.6.0
    hooks:
      - id: ansible-lint
        language_version: python3.13
        files: \.(yaml|yml)$
        args:
          - --profile
          - production
          - ansible/
          - inventories/
