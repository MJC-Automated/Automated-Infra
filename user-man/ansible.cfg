[defaults]
# Use centralized repo inventories from this playbook directory.
inventory = ../inventories/example/inventory.ini,../inventories/aliases.ini

host_key_checking = True
stdout_callback = default
callbacks_enabled = profile_tasks
timeout = 36000
local_tmp = /tmp/ansible-${USER}
remote_tmp = /tmp

# Optional: create ../.vault_password and keep it untracked
# vault_password_file = ../.vault_password
