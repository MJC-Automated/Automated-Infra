# ===========================================
# main.yml
# ===========================================
---
- name: Linux User Management - CRUD Operations [create, read, update and delete]
  # Use Terraform-managed workload hosts only; excludes aliases like ansible-control-node.
  hosts: all_nodes
  become: true
  gather_facts: true

  pre_tasks:
    - name: Assert Ansible Core version is supported
      ansible.builtin.assert:
        that:
          - ansible_version.full is version('2.17.0', '>=')
        fail_msg: "user-man requires ansible-core >= 2.17.0."

    - name: Ensure we have current system facts.
      ansible.builtin.setup:

    - name: Assert Python 3.9+ on managed hosts
      ansible.builtin.assert:
        that:
          - ansible_facts['python'] is defined
          - ansible_facts['python']['version'] is defined
          - ansible_facts['python']['version']['major'] | int >= 3
          - ansible_facts['python']['version']['major'] | int > 3 or ansible_facts['python']['version']['minor'] | int >= 9
        fail_msg: >-
          Python 3.9+ is required on managed hosts. Install/upgrade Python or
          set ansible_python_interpreter to a Python 3.9+ path.

  roles:
    - user_management

  post_tasks:
    - name: Display user operations summary
      ansible.builtin.debug:
        msg: |
          User: {{ item.name }}
          State: {{ item.state }}
          UID: {{ item.uid | default('auto') }}
          Groups: {{ item.groups | default(['users']) | join(',') }}
      loop: "{{ users }}"
      loop_control:
        label: "{{ item.name }}"
