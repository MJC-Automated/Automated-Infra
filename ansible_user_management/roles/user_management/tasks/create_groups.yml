# ===========================================
# roles/user_management/tasks/create_groups.yml (Corrected for Ansible 2.9)
# ===========================================
---
# FIX: Replaced all 'ansible.builtin.*' modules with their short names for 2.9 compatibility.

- name: Determine OS-specific admin group
  set_fact:
    admin_group: "{{ 'sudo' if ansible_os_family == 'Debian' else 'wheel' }}"
  tags:
    - groups
    - create_groups

- name: Set OS-specific groups to create
  set_fact:
    os_specific_groups: >-
      {{
        groups_to_create |
        map('regex_replace', '^(sudo|wheel)$', admin_group) |
        list | unique
      }}
  tags:
    - groups
    - create_groups

- name: Ensure required system groups exist
  group:
    name: "{{ item }}"
    state: present
  loop: "{{ os_specific_groups }}"
  when: os_specific_groups is defined
  tags:
    - groups
    - create_groups

- name: Ensure user-specific groups exist (if different from username)
  group:
    name: "{{ item.group }}"
    state: present
  loop: "{{ users | selectattr('state', 'equalto', 'present') | list }}"
  when:
    - item.group is defined
    - item.group != item.name
    - item.group not in (os_specific_groups | default([]))
  loop_control:
    # Use default_user_settings.group if item.group is not defined for the label
    label: "{{ item.name }} -> {{ item.group | default(default_user_settings.group) }}"
  tags:
    - groups
    - create_groups

- name: Collect all additional groups from user definitions
  set_fact:
    all_additional_groups: >-
      {{
        users |
        selectattr('state', 'equalto', 'present') |
        selectattr('groups', 'defined') |
        map(attribute='groups') |
        flatten |
        map('regex_replace', '^(sudo|wheel)$', admin_group) |
        list | unique
      }}
  tags:
    - groups
    - create_groups

- name: Create additional groups specified in user definitions
  group:
    name: "{{ item }}"
    state: present
  loop: "{{ all_additional_groups | default([]) }}"
  when:
    - all_additional_groups is defined
    - all_additional_groups | length > 0
    - item not in (os_specific_groups | default([]))
  tags:
    - groups
    - create_groups
