# ===========================================
# roles/user_management/tasks/manage_users.yml
# ===========================================
---
- name: Determine OS family for sudo groups
  set_fact:
    sudo_group: "{{ 'sudo' if ansible_os_family == 'Debian' else 'wheel' }}"
  tags:
    - users
    - groups

- name: Process user groups to use correct sudo group
  set_fact:
    processed_users: >-
      {{
        users | map('combine', {
          'groups': (item.groups | default([]) |
                     map('regex_replace', '^(sudo|wheel)$', sudo_group) |
                     list) if item.groups is defined else []
        }) | list
      }}
  vars:
    item: "{{ users[0] }}"  # This is just for the map function, actual processing happens in the map
  when: users | length > 0
  tags:
    - users
    - groups

- name: Set processed_users to empty list if no users
  set_fact:
    processed_users: []
  when: users | length == 0
  tags:
    - users
    - groups

- name: Create/Update user accounts
  user:
    name: "{{ item.name }}"
    state: "{{ item.state | default(default_user_settings.state) }}"
    uid: "{{ item.uid | default(omit) }}"
    group: "{{ item.group | default(default_user_settings.group) }}"
    groups: "{{ item.groups | default([]) | map('regex_replace', '^(sudo|wheel)$', sudo_group) | list | join(',') if item.groups is defined and item.groups | length > 0 else omit }}"
    append: "{{ item.append | default(default_user_settings.append) }}"
    shell: "{{ item.shell | default(default_user_settings.shell) }}"
    home: "{{ item.home | default('/home/' + item.name) }}"
    create_home: "{{ item.create_home | default(default_user_settings.create_home) }}"
    move_home: "{{ item.move_home | default(default_user_settings.move_home) }}"
    system: "{{ item.system | default(default_user_settings.system) }}"
    comment: "{{ item.comment | default(omit) }}"
    password: "{{ item.password | default(omit) }}"
    update_password: "{{ item.update_password | default(default_user_settings.update_password) }}"
    expires: "{{ item.expires | default(omit) }}"
    password_lock: "{{ item.password_lock | default(default_user_settings.password_lock) }}"
  loop: "{{ users | selectattr('state', 'equalto', 'present') | list }}"
  loop_control:
    label: "{{ item.name }}"
  tags:
    - users
    - create_users

- name: Generate SSH key pairs for users if requested
  user:
    name: "{{ item.name }}"
    generate_ssh_key: "{{ item.generate_ssh_key | default(false) }}"
    ssh_key_bits: "{{ item.ssh_key_bits | default(default_user_settings.ssh_key_bits) }}"
    ssh_key_type: "{{ item.ssh_key_type | default(default_user_settings.ssh_key_type) }}"
    ssh_key_file: "{{ item.ssh_key_file | default('.ssh/id_' + (item.ssh_key_type | default('rsa'))) }}"
    ssh_key_comment: "{{ item.ssh_key_comment | default(item.name + '@' + ansible_hostname) }}"
    ssh_key_passphrase: "{{ item.ssh_key_passphrase | default(omit) }}"
  loop: "{{ users | selectattr('state', 'equalto', 'present') | list }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.generate_ssh_key | default(false)
  register: ssh_key_generation
  tags:
    - users
    - ssh_keys

- name: Display generated SSH public keys
  debug:
    msg: |
      User: {{ item.item.name }}
      SSH Public Key Path: {{ item.ssh_public_key | default('Not generated') }}
      SSH Public Key: {{ lookup('file', item.ssh_public_key, errors='ignore') if item.ssh_public_key is defined else 'Not available' }}
  loop: "{{ ssh_key_generation.results }}"
  when:
    - ssh_key_generation is defined
    - item.ssh_public_key is defined
  loop_control:
    label: "{{ item.item.name }}"
  tags:
    - users
    - ssh_keys

- name: Ensure .ssh directory exists for users
  file:
    path: "{{ item.home | default('/home/' + item.name) }}/.ssh"
    state: directory
    owner: "{{ item.name }}"
    group: "{{ item.group | default(default_user_settings.group) }}"
    mode: '0700'
  loop: "{{ users | selectattr('state', 'equalto', 'present') | list }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - item.ssh_keys is defined
    - item.ssh_keys | length > 0
  tags:
    - users
    - ssh_keys

- name: Add authorized SSH keys for users (from ssh_keys list)
  authorized_key:
    user: "{{ item.name }}"
    state: present
    key: "{{ item.ssh_keys | join('\\n') }}"
    manage_dir: true
    exclusive: false
  loop: "{{ users | selectattr('state', 'equalto', 'present') | list }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - item.ssh_keys is defined
    - item.ssh_keys | length > 0
    - item.ssh_keys | select('match', '^ssh-') | list | length > 0
  tags:
    - users
    - ssh_keys

- name: Add authorized SSH keys for users (legacy key field support)
  authorized_key:
    user: "{{ item.name }}"
    state: present
    key: "{{ item.key | join('\\n') }}"
    manage_dir: true
    exclusive: false
  loop: "{{ users | selectattr('state', 'equalto', 'present') | list }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - item.key is defined
    - item.key | length > 0
    - item.key | select('match', '^ssh-') | list | length > 0
    - item.ssh_keys is not defined  # Only use legacy field if new field doesn't exist
  tags:
    - users
    - ssh_keys

- name: Set password expiration policies
  command: >
    chage
    -M {{ item.password_expire_max | default(default_user_settings.password_expire_max) }}
    -m {{ item.password_expire_min | default(default_user_settings.password_expire_min) }}
    -W {{ item.password_expire_warn | default(default_user_settings.password_expire_warn) }}
    -I {{ item.password_expire_account_disable | default(default_user_settings.password_expire_account_disable) }}
    {{ item.name }}
  loop: "{{ users | selectattr('state', 'equalto', 'present') | list }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - item.password is defined
    - item.password != "!!"
    - item.password != ""
  changed_when: true
  tags:
    - users
    - password_policy
