# ===========================================
# roles/user_management/tasks/enforce_password_history.yml
# ===========================================
---
- name: Build PAM password-history target file list
  ansible.builtin.set_fact:
    password_history_target_files: "{{ password_history_pam_paths[ansible_os_family] | default([]) }}"
  changed_when: false
  when: password_history_enforcement_enabled | bool
  tags:
    - users
    - security
    - password_policy

- name: Assert password-history target files are known for this OS family
  ansible.builtin.assert:
    that:
      - (password_history_target_files | default([])) | length > 0
    fail_msg: >-
      No password_history_pam_paths configured for ansible_os_family={{ ansible_os_family }}.
      Define password_history_pam_paths for this platform or disable password_history_enforcement_enabled.
  when: password_history_enforcement_enabled | bool
  tags:
    - users
    - security
    - password_policy

- name: Build PAM password-history module line
  ansible.builtin.set_fact:
    password_history_pam_line: >-
      password requisite pam_pwhistory.so use_authtok remember={{ password_history_remember }}
      {% if password_history_enforce_for_root | bool %} enforce_for_root{% endif %}
      {% if (password_history_retry | int) > 0 %} retry={{ password_history_retry | int }}{% endif %}
  changed_when: false
  when: password_history_enforcement_enabled | bool
  tags:
    - users
    - security
    - password_policy

- name: Check existence of PAM files for password history enforcement
  ansible.builtin.stat:
    path: "{{ item }}"
  loop: "{{ password_history_target_files | default([]) }}"
  register: password_history_target_stats
  when: password_history_enforcement_enabled | bool
  tags:
    - users
    - security
    - password_policy

- name: Enforce PAM password history policy
  ansible.builtin.lineinfile:
    path: "{{ (item.stat.lnk_source if (item.stat.islnk | default(false)) else item.item) }}"
    regexp: '^\s*password\s+(\[[^]]+\]|\S+)\s+pam_pwhistory\.so\b.*$'
    line: "{{ password_history_pam_line | trim }}"
    insertbefore: '^\s*password\s+(\[[^]]+\]|\S+)\s+pam_unix\.so\b'
    backup: "{{ password_history_backup_pam_files | bool }}"
  loop: "{{ password_history_target_stats.results | default([]) }}"
  when:
    - password_history_enforcement_enabled | bool
    - item.stat.exists | default(false)
  tags:
    - users
    - security
    - password_policy
