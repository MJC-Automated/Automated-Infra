# ===========================================
# main.yml
# ===========================================
---
- name: Linux User Management - CRUD Operations [create, read, update and delete]
  hosts: all
  become: yes
  gather_facts: yes

  vars_files:
    - group_vars/secret_vars.yml

  pre_tasks:
    - name: Ensure we have current system facts.
      ansible.builtin.setup:

  roles:
    - user_management

  post_tasks:
    - name: Display user operations summary
      debug:
        msg: |
          User: {{ item.name }}
          State: {{ item.state }}
          UID: {{ item.uid | default('auto') }}
          Groups: {{ item.groups | default(['users']) | join(',') }}
      loop: "{{ users }}"
      loop_control:
        label: "{{ item.name }}"
