---
- name: Wait for Zabbix API endpoint
  ansible.builtin.uri:
    url: "http://127.0.0.1/zabbix/api_jsonrpc.php"
    method: POST
    body_format: json
    body:
      jsonrpc: "2.0"
      method: apiinfo.version
      params: {}
      id: 1
    status_code: 200
  register: zabbix_api_info
  until: zabbix_api_info.status == 200 and zabbix_api_info.json.result is defined
  retries: 30
  delay: 5
  changed_when: false

- name: Test desired Zabbix API credential
  ansible.builtin.uri:
    url: "http://127.0.0.1/zabbix/api_jsonrpc.php"
    method: POST
    body_format: json
    body:
      jsonrpc: "2.0"
      method: user.login
      params:
        username: "{{ zabbix_api_user }}"
        password: "{{ zabbix_api_password }}"
      id: 1
    status_code: 200
  register: zabbix_desired_login
  failed_when: false
  changed_when: false
  no_log: true

- name: Authenticate with vendor bootstrap Zabbix credential
  ansible.builtin.uri:
    url: "http://127.0.0.1/zabbix/api_jsonrpc.php"
    method: POST
    body_format: json
    body:
      jsonrpc: "2.0"
      method: user.login
      params:
        username: "{{ zabbix_api_user }}"
        password: "{{ zabbix_api_bootstrap_password }}"
      id: 1
    status_code: 200
  register: zabbix_bootstrap_login
  when: zabbix_desired_login.json.result is not defined
  failed_when:
    - zabbix_bootstrap_login.status != 200
      or zabbix_bootstrap_login.json.result is not defined
  changed_when: false
  no_log: true

- name: Resolve Zabbix administrator user ID
  ansible.builtin.uri:
    url: "http://127.0.0.1/zabbix/api_jsonrpc.php"
    method: POST
    body_format: json
    body:
      jsonrpc: "2.0"
      method: user.get
      params:
        output:
          - userid
        filter:
          username:
            - "{{ zabbix_api_user }}"
      auth: "{{ zabbix_bootstrap_login.json.result }}"
      id: 1
    status_code: 200
  register: zabbix_admin_lookup
  when: zabbix_desired_login.json.result is not defined
  failed_when:
    - zabbix_admin_lookup.status != 200
      or zabbix_admin_lookup.json.result | default([]) | length != 1
  changed_when: false
  no_log: true

- name: Replace vendor bootstrap Zabbix credential
  ansible.builtin.uri:
    url: "http://127.0.0.1/zabbix/api_jsonrpc.php"
    method: POST
    body_format: json
    body:
      jsonrpc: "2.0"
      method: user.update
      params:
        userid: "{{ zabbix_admin_lookup.json.result[0].userid }}"
        current_passwd: "{{ zabbix_api_bootstrap_password }}"
        passwd: "{{ zabbix_api_password }}"
      auth: "{{ zabbix_bootstrap_login.json.result }}"
      id: 1
    status_code: 200
  register: zabbix_password_update
  when: zabbix_desired_login.json.result is not defined
  failed_when:
    - zabbix_password_update.status != 200
      or zabbix_password_update.json.result.userids | default([]) | length != 1
      or zabbix_admin_lookup.json.result[0].userid not in zabbix_password_update.json.result.userids | default([])
  changed_when: true
  no_log: true

- name: Verify desired Zabbix API credential
  ansible.builtin.uri:
    url: "http://127.0.0.1/zabbix/api_jsonrpc.php"
    method: POST
    body_format: json
    body:
      jsonrpc: "2.0"
      method: user.login
      params:
        username: "{{ zabbix_api_user }}"
        password: "{{ zabbix_api_password }}"
      id: 1
    status_code: 200
  register: zabbix_reconciled_login
  failed_when:
    - zabbix_reconciled_login.status != 200
      or zabbix_reconciled_login.json.result is not defined
  changed_when: false
  no_log: true
