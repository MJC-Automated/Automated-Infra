      loop:
        - "{{ scripts_dir }}/startWeblogic_wls14capp2_8001.sh"
        - "{{ scripts_dir }}/stopWeblogic_wls14capp2_8001.sh"
        - "/etc/systemd/system/wlsWLS14CAPP28001.service"
      tags: [systemd_service]

    - name: Create admin server start scripts for additional domains
      ansible.builtin.template:
        src: templates/start_weblogic.sh.j2
        dest: "{{ scripts_dir }}/startWeblogic_{{ item.domain_name | lower | regex_replace('[^a-z0-9]', '') }}_{{ item.admin_port }}.sh"
