---
# main.yml
# WebLogic Server 14c (14.1.2) end-to-end automation

- name: Configure Oracle WebLogic Server 14c
  hosts: weblogic14c
  become: true
  gather_facts: false

  pre_tasks:
    - name: Read .env file from controller (optional)
      ansible.builtin.set_fact:
        env_content_lines: "{{ (lookup('ansible.builtin.file', playbook_dir ~ '/.env', errors='ignore') | default('', true)).splitlines() }}"
      changed_when: false
      tags: [always]

    - name: Parse and set .env variables
      ansible.builtin.set_fact:
        "{{ item.split('=', 1)[0] }}": "{{ item.split('=', 1)[1] | regex_replace('^[\"\\x27]|[\"\\x27]$', '') }}"
      loop: "{{ env_content_lines | default([]) }}"
      when:
        - (item | trim | length) > 0
        - not (item | trim | regex_search('^#'))
        - "'=' in item"
      no_log: true
      tags: [always]

    - name: Load WebLogic baseline defaults
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/vars/weblogic_vars.yml"
      tags: [always]

    - name: Load WebLogic environment overrides from group_vars
      ansible.builtin.include_vars:
        file: "{{ item }}"
      loop: "{{ query('fileglob', inventory_dir + '/group_vars/weblogic14c.yml') }}"
      tags: [always]

    - name: Validate required WebLogic admin password input
      ansible.builtin.assert:
        that:
          - weblogic_password | string | trim | length >= 12
        fail_msg: >-
          Set WLS_ADMIN_PASSWORD in .env/environment (or vault_weblogic_password)
          with at least 12 characters.
      no_log: true
      tags: [always]

    - name: Validate RCU password inputs when RCU is enabled
      ansible.builtin.assert:
        that:
          - rcu_schema_password | string | trim | length >= 12
          - rcu_db_password | string | trim | length >= 12
        fail_msg: >-
          rcu_enabled=true requires strong RCU_SCHEMA_PASSWORD and RCU_DB_PASSWORD
          from .env/environment or vaulted vars.
      when: rcu_enabled | bool
      no_log: true
      tags: [always]

    - name: Bootstrap python3 on target host (if missing)
      ansible.builtin.raw: |
        if command -v python3 >/dev/null 2>&1; then
          exit 0
        fi
        if command -v dnf >/dev/null 2>&1; then
          dnf install -y python3 python3-dnf
        elif command -v yum >/dev/null 2>&1; then
          yum install -y python3
        elif command -v apt-get >/dev/null 2>&1; then
          apt-get update -y && apt-get install -y python3 python3-apt
        else
          echo "No supported package manager found. Install python3 manually." >&2
          exit 1
        fi
      changed_when: false
      when: bootstrap_python | bool

    - name: Gather facts
      ansible.builtin.setup:
      tags: [always]

    - name: Validate JDK selection
      ansible.builtin.assert:
        that:
          - jdk_choice | string in jdk_catalog.keys()
        fail_msg: "jdk_choice must be one of {{ jdk_catalog.keys() | list | join(', ') }}."

    - name: Enforce WebLogic/JDK compatibility (can be overridden)
      ansible.builtin.fail:
        msg: "WebLogic {{ wls_version }} requires JDK 17 or 21. Set allow_unsupported_jdk=true to override."
      when:
        - wls_version == "14.1.2"
        - (jdk_choice | int) not in [17, 21]
        - not allow_unsupported_jdk | bool

    - name: Check JDK archive exists on control node
      ansible.builtin.stat:
        path: "{{ jdk_installer_src }}"
      register: jdk_src_stat
      delegate_to: localhost
      run_once: true

    - name: Fail if JDK archive is missing on control node
      ansible.builtin.fail:
        msg: "JDK archive not found at {{ jdk_installer_src }} on control node."
      when:
        - jdk_src_stat.stat is defined
        - not jdk_src_stat.stat.exists

    - name: Check FMW installer exists on control node
      ansible.builtin.stat:
        path: "{{ fmw_installer_src }}"
      register: fmw_src_stat
      delegate_to: localhost
      run_once: true

    - name: Fail if FMW installer is missing on control node
      ansible.builtin.fail:
        msg: "FMW installer not found at {{ fmw_installer_src }} on control node."
      when:
        - fmw_src_stat.stat is defined
        - not fmw_src_stat.stat.exists

    - name: PRECHECK | Define required mountpoints
      ansible.builtin.set_fact:
        required_mounts:
          - { path: "/u01", min_gb: "{{ min_free_gb_u01 }}" }
          - { path: "/u02", min_gb: "{{ min_free_gb_domains }}" }
          - { path: "/Applications", min_gb: "{{ min_free_gb_apps }}" }
          - { path: "/Logs", min_gb: "{{ min_free_gb_logs }}" }
      when: precheck_mounts_enabled | bool

    - name: PRECHECK | Check mountpoints are present
      ansible.builtin.command: "mountpoint -q {{ item.path }}"
      loop: "{{ required_mounts }}"
      register: mountpoint_checks
      changed_when: false
      failed_when: false
      check_mode: false
      when: precheck_mounts_enabled | bool

    - name: PRECHECK | Assert required mountpoints are mounted
      ansible.builtin.assert:
        that:
          - item.rc == 0
        fail_msg: "Expected mountpoint {{ item.item.path }} is not mounted."
      loop: "{{ mountpoint_checks.results }}"
      when: precheck_mounts_enabled | bool

    - name: PRECHECK | Check free space on required mountpoints
      ansible.builtin.shell: "set -o pipefail && df -P {{ item.path }} | awk 'NR==2 {print $4}'"
      loop: "{{ required_mounts }}"
      register: free_space_checks
      changed_when: false
      check_mode: false
      when: precheck_mounts_enabled | bool

    - name: PRECHECK | Assert minimum free space on mountpoints
      ansible.builtin.assert:
        that:
          - (item.stdout | int) * 1024 >= (item.item.min_gb | int) * 1024 * 1024 * 1024
        fail_msg: "Insufficient free space on {{ item.item.path }}. Required {{ item.item.min_gb }}GB."
      loop: "{{ free_space_checks.results }}"
      when:
        - precheck_mounts_enabled | bool
        - (item.item.min_gb | int) > 0

    - name: Set admin host and URL for managed server operations
      ansible.builtin.set_fact:
        admin_host: "{{ admin_listen_address | default(ansible_host | default(inventory_hostname), true) }}"
        admin_url: "http://{{ admin_listen_address | default(ansible_host | default(inventory_hostname), true) }}:{{ admin_port }}"
      tags: [systemd_service, firewalld, summary]

    - name: Determine FMW payload type
      ansible.builtin.set_fact:
        fmw_is_archive: "{{ (fmw_installer_src | regex_search('\\.tar\\.gz$')) is not none }}"
        fmw_is_jar: "{{ (fmw_installer_src | regex_search('\\.jar$')) is not none }}"
        fmw_payload_dest: >-
          {{
            ((fmw_installer_src | regex_search('\\.jar$')) is not none)
            | ternary(fmw_installer_dest, '/tmp/' + (fmw_installer_src | basename))
          }}
        fmw_stage_dir: "/tmp/fmw_stage_{{ domain_name | lower }}"

    - name: Set FMW installer jar path
      ansible.builtin.set_fact:
        fmw_installer_jar_path: >-
          {{
            fmw_is_jar
            | ternary(fmw_installer_dest, fmw_stage_dir + '/' + fmw_installer_jar_name)
          }}

    - name: Detect existing JDK home
      ansible.builtin.stat:
        path: "{{ java_home }}"
      register: jdk_home_stat
      tags: [jdk_install]

    - name: Detect existing FMW installation marker
      ansible.builtin.stat:
        path: "{{ oracle_middleware_home }}/oracle_common/bin/rcu"
      register: fmw_install_marker
      tags: [fmw_install]

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
      listen: "reload systemd"

  tasks:
    # --- Task 1: WebLogic User and Group ---
    - name: Create WebLogic group '{{ weblogic_group }}'
      ansible.builtin.group:
        name: "{{ weblogic_group }}"
        gid: "{{ weblogic_group_gid | default(omit) }}"
        state: present

    - name: Create WebLogic user '{{ weblogic_user }}'
      ansible.builtin.user:
        name: "{{ weblogic_user }}"
        uid: "{{ weblogic_user_uid | default(omit) }}"
        group: "{{ weblogic_group }}"
        state: present
        create_home: true
        shell: /bin/bash

    # --- Task 2: Directory Structure ---
    - name: Ensure base mount exists
      ansible.builtin.file:
        path: "{{ oracle_base_root }}"
        state: directory
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0775"
      tags: [directories]

    - name: Create Oracle/WebLogic directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0775"
      loop:
        - "{{ oracle_base }}"
        - "{{ domain_base }}"
        - "{{ applications_base }}"
        - "{{ scripts_dir }}"
        - "{{ logs_base_dir }}"
      tags: [directories]

    - name: Ensure oraInventory directory exists
      ansible.builtin.file:
        path: "{{ oracle_inventory_dir }}"
        state: directory
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0770"
      tags: [directories]

    - name: Set log directories
      ansible.builtin.set_fact:
        admin_logs_dir: "{{ logs_base_dir }}/{{ domain_name }}/admin"
        managed_logs_dir_base: "{{ logs_base_dir }}/{{ domain_name }}/managed"
        nodemanager_logs_dir: "{{ logs_base_dir }}/{{ domain_name }}/nodemanager"
      tags: [directories, systemd_service]

    - name: Create admin logs directory
      ansible.builtin.file:
        path: "{{ admin_logs_dir }}"
        state: directory
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0775"
      tags: [directories, systemd_service]

    - name: Create managed server logs directories
      ansible.builtin.file:
        path: "{{ managed_logs_dir_base }}/{{ item.name }}"
        state: directory
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0775"
      loop: "{{ managed_servers }}"
      when: managed_server_enable | bool
      tags: [directories, systemd_service]

    - name: Create Node Manager logs directory
      ansible.builtin.file:
        path: "{{ nodemanager_logs_dir }}"
        state: directory
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0775"
      when: nodemanager_enabled | bool
      tags: [directories, systemd_service]

    - name: Create GC logs directory
      ansible.builtin.file:
        path: "{{ weblogic_gc_log_dir }}"
        state: directory
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0775"
      tags: [directories, systemd_service]

    - name: Ensure GC log file exists
      ansible.builtin.copy:
        content: ""
        dest: "{{ weblogic_gc_log_file }}"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0664"
        force: false
      tags: [directories, systemd_service]

    # --- Task 3: OS Prerequisite Packages ---
    - name: Install OS prerequisite packages (Oracle Linux / RHEL)
      ansible.builtin.command: "dnf install -y {{ wls_os_packages_redhat | join(' ') }}"
      register: dnf_prereqs_install
      changed_when: "'Nothing to do' not in dnf_prereqs_install.stdout"
      when:
        - os_prereqs_enabled | bool
        - ansible_facts.os_family == "RedHat"
      tags: [os_prereqs]

    - name: Warn when OS prereqs are skipped
      ansible.builtin.debug:
        msg: "OS prerequisite installation is skipped for {{ ansible_facts.os_family }}. Update package list per Oracle docs."
      when:
        - os_prereqs_enabled | bool
        - ansible_facts.os_family != "RedHat"
      tags: [os_prereqs]

    # --- Task 4: OS Kernel Parameter Tuning ---
    - name: Configure kernel parameters for WebLogic
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        sysctl_set: true
        reload: true
      loop:
        - { key: "fs.file-max", value: "{{ fs_file_max }}" }
        - { key: "vm.max_map_count", value: "{{ vm_max_map_count }}" }
        - { key: "net.ipv4.tcp_tw_reuse", value: "{{ net_ipv4_tcp_tw_reuse }}" }
        - { key: "net.ipv4.ip_local_port_range", value: "{{ net_ipv4_ip_local_port_range }}" }
        - { key: "net.core.rmem_default", value: "{{ net_core_rmem_default }}" }
        - { key: "net.core.wmem_default", value: "{{ net_core_wmem_default }}" }
        - { key: "net.core.rmem_max", value: "{{ net_core_rmem_max }}" }
        - { key: "net.core.wmem_max", value: "{{ net_core_wmem_max }}" }
      when: os_tuning_enabled | bool
      tags: [os_tune]

    - name: Set ulimits for the WebLogic user
      ansible.builtin.blockinfile:
        path: "/etc/security/limits.conf"
        block: |
          {{ weblogic_user }} soft nofile 65536
          {{ weblogic_user }} hard nofile 65536
          {{ weblogic_user }} soft nproc 16384
          {{ weblogic_user }} hard nproc 16384
          {{ weblogic_user }} soft stack 10240
          {{ weblogic_user }} hard stack 32768
        marker: "# {mark} ANSIBLE MANAGED BLOCK - WebLogic Ulimits for {{ weblogic_user }}"
        create: true
        mode: "0644"
      when: os_tuning_enabled | bool
      tags: [os_tune]

    - name: Ensure nproc limit in /etc/security/limits.d/90-nproc.conf
      ansible.builtin.lineinfile:
        path: "/etc/security/limits.d/90-nproc.conf"
        regexp: "^(\\*|\\%)?\\s+soft\\s+nproc\\s+.*$"
        line: "* - nproc 16384"
        state: present
        create: true
        owner: root
        group: root
        mode: "0644"
      when: os_tuning_enabled | bool
      tags: [os_tune]

    # --- Task 5: JDK Installation ---
    - name: Transfer JDK archive to target
      ansible.builtin.copy:
        src: "{{ jdk_installer_src }}"
        dest: "{{ jdk_dest_dir }}/{{ jdk_archive }}"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0644"
      when:
        - jdk_install_method == 'tarball'
        - not (jdk_home_stat.stat.exists | default(false))
      tags: [jdk_install]

    - name: Extract JDK archive
      ansible.builtin.unarchive:
        src: "{{ jdk_dest_dir }}/{{ jdk_archive }}"
        dest: "{{ jdk_dest_dir }}"
        remote_src: true
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        creates: "{{ java_home }}"
      when:
        - jdk_install_method == 'tarball'
        - not (jdk_home_stat.stat.exists | default(false))
      tags: [jdk_install]

    - name: Remove JDK archive after extraction
      ansible.builtin.file:
        path: "{{ jdk_dest_dir }}/{{ jdk_archive }}"
        state: absent
      when:
        - jdk_install_method == 'tarball'
        - not (jdk_home_stat.stat.exists | default(false))
      tags: [jdk_install]

    - name: Check JAVA binary execute permissions
      ansible.builtin.stat:
        path: "{{ java_home }}/bin/java"
      register: jdk_java_bin_stat
      tags: [jdk_install]

    - name: Ensure JDK launchers are executable
      ansible.builtin.shell: |
        set -euo pipefail
        for dir in "{{ java_home }}/bin" "{{ java_home }}/jre/bin"; do
          if [ -d "${dir}" ]; then
            find "${dir}" -type d -exec chmod 0755 {} +
            find "${dir}" -type f -exec chmod 0755 {} +
          fi
        done
      args:
        executable: /bin/bash
      changed_when: true
      when:
        - jdk_java_bin_stat.stat.exists | default(false)
        - not (jdk_java_bin_stat.stat.executable | default(false))
      tags: [jdk_install]

    - name: Set JAVA_HOME in /etc/profile.d
      ansible.builtin.template:
        src: templates/java.sh.j2
        dest: /etc/profile.d/java.sh
        owner: root
        group: root
        mode: "0644"
      tags: [jdk_install]

    - name: Configure WebLogic user environment
      ansible.builtin.template:
        src: templates/oracle_bash_profile.j2
        dest: "/home/{{ weblogic_user }}/.bash_profile"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0644"
        backup: true
      tags: [bash_profile]

    # --- Task 6: FMW (WebLogic Server) Installation ---
    - name: Create oraInst.loc file
      ansible.builtin.template:
        src: templates/oraInst.loc.j2
        dest: "{{ oracle_base }}/oraInst.loc"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0644"
      tags: [fmw_install]

    - name: Transfer FMW installer payload to target
      ansible.builtin.copy:
        src: "{{ fmw_installer_src }}"
        dest: "{{ fmw_payload_dest }}"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0644"
      when: not (fmw_install_marker.stat.exists | default(false))
      tags: [fmw_install]

    - name: Create FMW staging directory (archive payload)
      ansible.builtin.file:
        path: "{{ fmw_stage_dir }}"
        state: directory
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0775"
      when:
        - fmw_is_archive | bool
        - not (fmw_install_marker.stat.exists | default(false))
      tags: [fmw_install]

    - name: Extract FMW installer archive
      ansible.builtin.unarchive:
        src: "{{ fmw_payload_dest }}"
        dest: "{{ fmw_stage_dir }}"
        remote_src: true
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        creates: "{{ fmw_stage_dir }}/.unpacked"
      when:
        - fmw_is_archive | bool
        - not (fmw_install_marker.stat.exists | default(false))
      tags: [fmw_install]

    - name: Mark FMW archive extracted
      ansible.builtin.file:
        path: "{{ fmw_stage_dir }}/.unpacked"
        state: touch
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0644"
      when:
        - fmw_is_archive | bool
        - not (fmw_install_marker.stat.exists | default(false))
      tags: [fmw_install]

    - name: Locate FMW installer jar in archive
      ansible.builtin.find:
        paths: "{{ fmw_stage_dir }}"
        patterns: "{{ fmw_installer_jar_name }}"
        recurse: true
      register: fmw_jar_find
      when:
        - fmw_is_archive | bool
        - not (fmw_install_marker.stat.exists | default(false))
      tags: [fmw_install]

    - name: Fail if FMW installer jar is not found in archive
      ansible.builtin.fail:
        msg: "Unable to locate {{ fmw_installer_jar_name }} under {{ fmw_stage_dir }}."
      when:
        - fmw_is_archive | bool
        - not (fmw_install_marker.stat.exists | default(false))
        - fmw_jar_find.matched | int == 0
      tags: [fmw_install]

    - name: Set FMW installer jar path from archive
      ansible.builtin.set_fact:
        fmw_installer_jar_path: "{{ fmw_jar_find.files[0].path }}"
      when:
        - fmw_is_archive | bool
        - not (fmw_install_marker.stat.exists | default(false))
      tags: [fmw_install]

    - name: Create FMW silent installation response file
      ansible.builtin.template:
        src: templates/wls_install.rsp.j2
        dest: "{{ fmw_response_file_path }}"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0644"
      when: not (fmw_install_marker.stat.exists | default(false))
      tags: [fmw_install]

    - name: Run FMW silent installation
      ansible.builtin.command: >-
        {{ java_home }}/bin/java -jar {{ fmw_installer_jar_path }}
        -silent -responseFile {{ fmw_response_file_path }}
        -invPtrLoc {{ oracle_base }}/oraInst.loc
      args:
        creates: "{{ oracle_middleware_home }}/oracle_common/bin/rcu"
      become: true
      become_user: "{{ weblogic_user }}"
      environment:
        JAVA_HOME: "{{ java_home }}"
        PATH: "{{ java_home }}/bin:{{ ansible_facts.env.PATH }}"
      when: not (fmw_install_marker.stat.exists | default(false))
      tags: [fmw_install]

    - name: Remove FMW payload and response file after installation
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ fmw_payload_dest }}"
        - "{{ fmw_response_file_path }}"
      tags: [fmw_install]

    - name: Remove FMW staging directory after installation
      ansible.builtin.file:
        path: "{{ fmw_stage_dir }}"
        state: absent
      when: fmw_is_archive | bool
      tags: [fmw_install]

    # --- Task 7: RCU (Optional) ---
    - name: Check if RCU executable exists
      ansible.builtin.stat:
        path: "{{ oracle_middleware_home }}/oracle_common/bin/rcu"
      register: rcu_exec_check
      when: rcu_enabled | bool
      tags: [rcu]

    - name: Fail if RCU executable not found
      ansible.builtin.fail:
        msg: "RCU executable not found at {{ oracle_middleware_home }}/oracle_common/bin/rcu."
      when:
        - rcu_enabled | bool
        - not rcu_exec_check.stat.exists
      tags: [rcu]

    - name: Parse RCU DB host and port
      ansible.builtin.set_fact:
        rcu_db_host: "{{ rcu_connect_string | regex_replace('^([^:]+):.*', '\\\\1') }}"
        rcu_db_port: "{{ (rcu_connect_string | regex_replace('^[^:]+:([0-9]+).*', '\\\\1')) | int }}"
      when: rcu_enabled | bool
      tags: [rcu]

    - name: Wait for RCU database listener
      ansible.builtin.wait_for:
        host: "{{ rcu_db_host }}"
        port: "{{ rcu_db_port }}"
        timeout: 30
      when: rcu_enabled | bool
      tags: [rcu]

    - name: Install expect package
      ansible.builtin.command: dnf install -y expect
      register: dnf_expect_install
      changed_when: "'Nothing to do' not in dnf_expect_install.stdout"
      when: rcu_enabled | bool
      tags: [rcu]

    - name: Transfer RCU response file to target
      ansible.builtin.template:
        src: templates/rcu.rsp.j2
        dest: "{{ rcu_response_file_path }}"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0644"
      when: rcu_enabled | bool
      tags: [rcu]
      no_log: true

    - name: Create RCU password file
      ansible.builtin.template:
        src: templates/rcu_passwords.txt.j2
        dest: "/tmp/rcu_passwords.txt"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0600"
      when: rcu_enabled | bool
      tags: [rcu]
      no_log: true

    - name: Create RCU expect script
      ansible.builtin.template:
        src: templates/run_rcu_expect.exp.j2
        dest: "/tmp/run_rcu_expect.exp"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0755"
      when: rcu_enabled | bool
      tags: [rcu]
      no_log: true

    - name: Run RCU silent schema creation using expect script
      ansible.builtin.command: "/usr/bin/expect /tmp/run_rcu_expect.exp"
      args:
        creates: "{{ oracle_inventory_dir }}/ContentsXML/comps.xml"
      become: true
      become_user: "{{ weblogic_user }}"
      when: rcu_enabled | bool
      tags: [rcu]
      no_log: true

    - name: Clean up RCU files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ rcu_response_file_path }}"
        - "/tmp/rcu_passwords.txt"
        - "/tmp/run_rcu_expect.exp"
      when: rcu_enabled | bool
      tags: [rcu]

    # --- Task 8: WebLogic Domain Creation ---
    - name: "Create WebLogic domains with temporary WLST scripts"
      tags: [domain_create]
      block:
        - name: Create WLST script for domain creation
          ansible.builtin.template:
            src: templates/create_domain.py.j2
            dest: "{{ scripts_dir }}/create_domain_{{ domain_name }}.py"
            owner: "{{ weblogic_user }}"
            group: "{{ weblogic_group }}"
            mode: "0700"
          changed_when: false
          tags: [domain_create]
          no_log: true

        - name: Ensure WLST temp/cache directories exist
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            owner: "{{ weblogic_user }}"
            group: "{{ weblogic_group }}"
            mode: "0775"
          loop:
            - "{{ wlst_cache_dir }}"
            - "{{ wlst_cache_dir }}/WLSTTemp{{ weblogic_user }}"
            - "{{ wlst_cache_dir }}/WLSTTemp{{ weblogic_user }}/packages"
            - "{{ wlst_tmp_dir }}"
            - "{{ wlst_tmp_dir }}/WLSTTemp{{ weblogic_user }}"
            - "{{ wlst_tmp_dir }}/WLSTTemp{{ weblogic_user }}/packages"
          tags: [domain_create]

        - name: Execute WLST script to create WebLogic domain
          ansible.builtin.command: "{{ oracle_middleware_home }}/oracle_common/common/bin/wlst.sh {{ scripts_dir }}/create_domain_{{ domain_name }}.py"
          args:
            creates: "{{ domain_home }}/config/config.xml"
            chdir: "/home/{{ weblogic_user }}"
          become: true
          become_user: "{{ weblogic_user }}"
          environment:
            JAVA_HOME: "{{ java_home }}"
            PATH: "{{ java_home }}/bin:{{ ansible_facts.env.PATH }}"
            HOME: "/home/{{ weblogic_user }}"
            USER: "{{ weblogic_user }}"
            CIE_LOGDIR: "{{ wlst_tmp_dir }}"
            TMPDIR: "{{ wlst_tmp_dir }}"
            TEMP: "{{ wlst_tmp_dir }}"
            TMP: "{{ wlst_tmp_dir }}"
            JAVA_TOOL_OPTIONS: "-Djava.io.tmpdir={{ wlst_tmp_dir }}/ -Dpython.cachedir={{ wlst_cache_dir }}/"
            CONFIG_JVM_ARGS: "-Dcom.oracle.cie.config.showProfile=true"
          tags: [domain_create]

        - name: Create WLST scripts for additional domain creation
          ansible.builtin.template:
            src: templates/create_domain.py.j2
            dest: "{{ scripts_dir }}/create_domain_{{ item.domain_name }}.py"
            owner: "{{ weblogic_user }}"
            group: "{{ weblogic_group }}"
            mode: "0700"
          loop: "{{ additional_weblogic_domains | default([]) }}"
          vars:
            wlst_domain_name: "{{ item.domain_name }}"
            wlst_domain_home: "{{ item.domain_home }}"
            wlst_admin_port: "{{ item.admin_port }}"
            wlst_admin_server_name: "{{ item.admin_server_name | default('AdminServer') }}"
            wlst_managed_servers: "{{ item.managed_servers | default([]) }}"
            wlst_app_dir: "{{ applications_base }}/{{ item.domain_name }}"
            wlst_coherence_port: "{{ item.coherence_port | default(7574) }}"
          changed_when: false
          tags: [domain_create]
          no_log: true

        - name: Execute WLST scripts to create additional WebLogic domains
          ansible.builtin.command: "{{ oracle_middleware_home }}/oracle_common/common/bin/wlst.sh {{ scripts_dir }}/create_domain_{{ item.domain_name }}.py"
          args:
            creates: "{{ item.domain_home }}/config/config.xml"
            chdir: "/home/{{ weblogic_user }}"
          loop: "{{ additional_weblogic_domains | default([]) }}"
          become: true
          become_user: "{{ weblogic_user }}"
          environment:
            JAVA_HOME: "{{ java_home }}"
            PATH: "{{ java_home }}/bin:{{ ansible_facts.env.PATH }}"
            HOME: "/home/{{ weblogic_user }}"
            USER: "{{ weblogic_user }}"
            CIE_LOGDIR: "{{ wlst_tmp_dir }}"
            TMPDIR: "{{ wlst_tmp_dir }}"
            TEMP: "{{ wlst_tmp_dir }}"
            TMP: "{{ wlst_tmp_dir }}"
            JAVA_TOOL_OPTIONS: "-Djava.io.tmpdir={{ wlst_tmp_dir }}/ -Dpython.cachedir={{ wlst_cache_dir }}/"
            CONFIG_JVM_ARGS: "-Dcom.oracle.cie.config.showProfile=true"
          tags: [domain_create]
      always:
        - name: Always remove rendered WebLogic domain creation scripts
          ansible.builtin.file:
            path: "{{ scripts_dir }}/create_domain_{{ item }}.py"
            state: absent
          loop: "{{ [domain_name] + (additional_weblogic_domains | default([]) | map(attribute='domain_name') | list) }}"
          changed_when: false

    - name: Check primary domain startWebLogic.sh presence
      ansible.builtin.stat:
        path: "{{ domain_home }}/bin/startWebLogic.sh"
      register: primary_domain_startweblogic
      changed_when: false
      tags: [domain_create, systemd_service]

    - name: Ensure USER_MEM_ARGS is embedded in primary domain startWebLogic.sh
      ansible.builtin.blockinfile:
        path: "{{ domain_home }}/bin/startWebLogic.sh"
        marker: "# {mark} ANSIBLE USER_MEM_ARGS"
        insertbefore: "^umask 027"
        block: |
          USER_MEM_ARGS="{{ weblogic_user_mem_args }}"
          export USER_MEM_ARGS
      when: primary_domain_startweblogic.stat.exists
      tags: [domain_create, systemd_service]

    # --- Task 8b: Node Manager Configuration ---
    - name: Ensure Node Manager config directory exists
      ansible.builtin.file:
        path: "{{ domain_home }}/nodemanager"
        state: directory
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0750"
      when: nodemanager_enabled | bool
      tags: [nodemanager]

    - name: Template Node Manager domains file
      ansible.builtin.template:
        src: templates/nodemanager.domains.j2
        dest: "{{ domain_home }}/nodemanager/nodemanager.domains"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0640"
      when: nodemanager_enabled | bool
      tags: [nodemanager]

    - name: Check if Node Manager properties are already encrypted
      ansible.builtin.shell: "grep -Eq '^[^#[:space:]][^=]*=\\{' {{ domain_home }}/nodemanager/nodemanager.properties"
      register: nm_props_encrypted
      failed_when: false
      changed_when: false
      when: nodemanager_enabled | bool
      tags: [nodemanager]

    - name: Read current Node Manager properties
      ansible.builtin.slurp:
        path: "{{ domain_home }}/nodemanager/nodemanager.properties"
      register: nm_props_current
      failed_when: false
      changed_when: false
      when:
        - nodemanager_enabled | bool
        - nm_props_encrypted.rc != 0
      tags: [nodemanager]

    - name: Build normalized Node Manager property lines
      ansible.builtin.set_fact:
        nm_props_desired_lines: >-
          {{
            lookup('template', 'templates/nodemanager.properties.j2')
            | regex_replace('\r', '')
            | split('\n')
            | map('trim')
            | reject('equalto', '')
            | reject('match', '^#')
            | list
          }}
        nm_props_existing_lines: >-
          {{
            (
              (nm_props_current.content | default('') | b64decode)
              if (
                nm_props_current is defined and
                not (nm_props_current.failed | default(false)) and
                (nm_props_current.content is defined)
              )
              else ''
            )
            | regex_replace('\r', '')
            | split('\n')
            | map('trim')
            | reject('equalto', '')
            | reject('match', '^#')
            | list
          }}
      changed_when: false
      when:
        - nodemanager_enabled | bool
        - nm_props_encrypted.rc != 0
      tags: [nodemanager]

    - name: Determine whether Node Manager properties need templating
      ansible.builtin.set_fact:
        nm_props_missing_desired_lines: "{{ nm_props_desired_lines | difference(nm_props_existing_lines) }}"
      changed_when: false
      when:
        - nodemanager_enabled | bool
        - nm_props_encrypted.rc != 0
      tags: [nodemanager]

    - name: Template Node Manager properties
      ansible.builtin.template:
        src: templates/nodemanager.properties.j2
        dest: "{{ domain_home }}/nodemanager/nodemanager.properties"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0640"
      when:
        - nodemanager_enabled | bool
        - nm_props_encrypted.rc != 0
        - (nm_props_missing_desired_lines | default([]) | length) > 0
      tags: [nodemanager]

    - name: Ensure Node Manager Java Home script uses selected JDK
      ansible.builtin.template:
        src: templates/setNMJavaHome.sh.j2
        dest: "{{ domain_home }}/bin/setNMJavaHome.sh"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0750"
      when: nodemanager_enabled | bool
      tags: [nodemanager]

    # --- Task 9: Boot Properties (for unattended starts) ---
    - name: Ensure admin server security directory exists
      ansible.builtin.file:
        path: "{{ domain_home }}/servers/{{ admin_server_name }}/security"
        state: directory
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0700"
      when: create_boot_properties | bool
      tags: [boot_properties]

    - name: Check if boot.properties exists for admin server
      ansible.builtin.stat:
        path: "{{ domain_home }}/servers/{{ admin_server_name }}/security/boot.properties"
      register: admin_boot_prop_stat
      when: create_boot_properties | bool
      tags: [boot_properties]

    - name: Check if admin boot.properties is already encrypted
      ansible.builtin.shell: "grep -q '=[{]' {{ domain_home }}/servers/{{ admin_server_name }}/security/boot.properties"
      register: admin_boot_prop_encrypted
      failed_when: false
      changed_when: false
      when: create_boot_properties | bool
      tags: [boot_properties]

    - name: Create boot.properties for admin server
      ansible.builtin.template:
        src: templates/boot.properties.j2
        dest: "{{ domain_home }}/servers/{{ admin_server_name }}/security/boot.properties"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0600"
      when:
        - create_boot_properties | bool
        - not admin_boot_prop_stat.stat.exists or admin_boot_prop_encrypted.rc != 0
      tags: [boot_properties]
      no_log: true

    - name: Ensure managed server security directories exist
      ansible.builtin.file:
        path: "{{ domain_home }}/servers/{{ item.name }}/security"
        state: directory
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0700"
      loop: "{{ managed_servers }}"
      when:
        - create_boot_properties | bool
        - managed_server_enable | bool
      tags: [boot_properties]

    - name: Sync boot.properties for managed servers from admin server
      ansible.builtin.copy:
        src: "{{ domain_home }}/servers/{{ admin_server_name }}/security/boot.properties"
        dest: "{{ domain_home }}/servers/{{ item.name }}/security/boot.properties"
        remote_src: true
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0600"
      loop: "{{ managed_servers }}"
      when:
        - create_boot_properties | bool
        - managed_server_enable | bool
      tags: [boot_properties]
      no_log: true

    # --- Task 10: Start/Stop Scripts ---
    - name: Create admin server start script
      ansible.builtin.template:
        src: templates/start_weblogic.sh.j2
        dest: "{{ scripts_dir }}/{{ admin_start_script_name }}"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0755"
      tags: [systemd_service]

    - name: Create admin server stop script
      ansible.builtin.template:
        src: templates/stop_weblogic.sh.j2
        dest: "{{ scripts_dir }}/{{ admin_stop_script_name }}"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0700"
      tags: [systemd_service]

    - name: Create Node Manager start script
      ansible.builtin.template:
        src: templates/start_nodemanager.sh.j2
        dest: "{{ scripts_dir }}/{{ nodemanager_start_script_name }}"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0755"
      when: nodemanager_enabled | bool
      tags: [systemd_service]

    - name: Create Node Manager stop script
      ansible.builtin.template:
        src: templates/stop_nodemanager.sh.j2
        dest: "{{ scripts_dir }}/{{ nodemanager_stop_script_name }}"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0755"
      when: nodemanager_enabled | bool
      tags: [systemd_service]

    - name: Create managed server start scripts
      ansible.builtin.template:
        src: templates/start_managed.sh.j2
        dest: "{{ scripts_dir }}/startManaged_{{ domain_script_key }}_{{ item.name | lower }}_{{ item.listen_port }}.sh"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0755"
      loop: "{{ managed_servers }}"
      vars:
        managed_server_name: "{{ item.name }}"
        managed_server_logs_dir: "{{ managed_logs_dir_base }}/{{ item.name }}"
      when: managed_server_enable | bool
      tags: [systemd_service]

    - name: Create managed server stop scripts
      ansible.builtin.template:
        src: templates/stop_managed.sh.j2
        dest: "{{ scripts_dir }}/stopManaged_{{ domain_script_key }}_{{ item.name | lower }}_{{ item.listen_port }}.sh"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0700"
      loop: "{{ managed_servers }}"
      vars:
        managed_server_name: "{{ item.name }}"
        managed_server_logs_dir: "{{ managed_logs_dir_base }}/{{ item.name }}"
      when: managed_server_enable | bool
      tags: [systemd_service]

    # --- Task 11: Systemd Services ---
    - name: Create systemd service for Node Manager
      ansible.builtin.template:
        src: templates/wls_service.service.j2
        dest: "/etc/systemd/system/{{ nodemanager_systemd_service_name }}"
        owner: root
        group: root
        mode: "0644"
      when: nodemanager_enabled | bool
      vars:
        service_description: "WebLogic Node Manager - {{ domain_name }}"
        service_exec_start: "{{ scripts_dir }}/{{ nodemanager_start_script_name }}"
        service_exec_stop: "{{ scripts_dir }}/{{ nodemanager_stop_script_name }}"
        service_working_dir: "{{ domain_home }}/bin"
        service_type: "simple"
        service_restart: "on-failure"
        service_restart_sec: 10
        service_remain_after_exit: false
      notify: "reload systemd"
      tags: [systemd_service]

    - name: Start and enable Node Manager service
      ansible.builtin.systemd:
        name: "{{ nodemanager_systemd_service_name }}"
        state: started
        enabled: true
      when: nodemanager_enabled | bool
      tags: [systemd_service]

    - name: Create systemd service for admin server
      ansible.builtin.template:
        src: templates/wls_service.service.j2
        dest: "/etc/systemd/system/{{ admin_systemd_service_name }}"
        owner: root
        group: root
        mode: "0644"
      when: manage_admin_systemd | bool
      vars:
        service_description: "The {{ domain_name | upper | regex_replace('_', ' ') }} - {{ admin_port }} Weblogic Service"
        service_exec_start: "{{ scripts_dir }}/{{ admin_start_script_name }}"
        service_exec_stop: "{{ scripts_dir }}/{{ admin_stop_script_name }}"
        service_working_dir: "{{ domain_home }}/bin"
        service_type: "simple"
        service_remain_after_exit: false
      notify: "reload systemd"
      tags: [systemd_service]

    - name: Start and enable admin server service
      ansible.builtin.systemd:
        name: "{{ admin_systemd_service_name }}"
        state: started
        enabled: true
      when:
        - manage_admin_systemd | bool
        - auto_start_admin | bool
      tags: [systemd_service]

    - name: Wait for admin server listen port before managed server startup
      ansible.builtin.wait_for:
        host: "127.0.0.1"
        port: "{{ admin_port | int }}"
        state: started
        delay: 2
        timeout: 1800
      when:
        - managed_server_enable | bool
        - manage_managed_systemd | bool
        - auto_start_managed | bool
      tags: [systemd_service]

    - name: "Reconcile primary managed servers with a temporary WLST script"
      when:
        - managed_server_enable | bool
        - (managed_servers | default([]) | length) > 0
      tags: [domain_create, systemd_service]
      block:
        - name: Create WLST script to ensure primary managed servers exist
          ansible.builtin.template:
            src: templates/ensure_primary_managed_servers.py.j2
            dest: "{{ scripts_dir }}/ensure_primary_managed_servers.py"
            owner: "{{ weblogic_user }}"
            group: "{{ weblogic_group }}"
            mode: "0700"
          changed_when: false
          tags: [domain_create, systemd_service]
          no_log: true

        - name: Ensure primary managed servers exist in running domain
          ansible.builtin.command: "{{ oracle_middleware_home }}/oracle_common/common/bin/wlst.sh {{ scripts_dir }}/ensure_primary_managed_servers.py"
          become: true
          become_user: "{{ weblogic_user }}"
          environment:
            JAVA_HOME: "{{ java_home }}"
            PATH: "{{ java_home }}/bin:{{ ansible_facts.env.PATH }}"
            HOME: "/home/{{ weblogic_user }}"
            USER: "{{ weblogic_user }}"
            TMPDIR: "{{ wlst_tmp_dir }}"
            JAVA_TOOL_OPTIONS: "-Djava.io.tmpdir={{ wlst_tmp_dir }}/"
          register: primary_managed_servers_ensure
          changed_when: "'INFO: Managed server creation complete.' in (primary_managed_servers_ensure.stdout | default(''))"
          when: not ansible_check_mode
          tags: [domain_create, systemd_service]
          no_log: true
      always:
        - name: Always remove primary managed-server reconciliation script
          ansible.builtin.file:
            path: "{{ scripts_dir }}/ensure_primary_managed_servers.py"
            state: absent
          changed_when: false

    - name: Create systemd services for managed servers
      ansible.builtin.template:
        src: templates/wls_service.service.j2
        dest: "/etc/systemd/system/{{ managed_systemd_service_prefix }}{{ item.listen_port }}.service"
        owner: root
        group: root
        mode: "0644"
      loop: "{{ managed_servers }}"
      when:
        - managed_server_enable | bool
        - manage_managed_systemd | bool
      vars:
        service_description: "The {{ domain_name | upper | regex_replace('_', ' ') }} {{ item.name }} - {{ item.listen_port }} Weblogic Service"
        service_exec_start: "{{ scripts_dir }}/startManaged_{{ domain_script_key }}_{{ item.name | lower }}_{{ item.listen_port }}.sh"
        service_exec_stop: "{{ scripts_dir }}/stopManaged_{{ domain_script_key }}_{{ item.name | lower }}_{{ item.listen_port }}.sh"
        service_working_dir: "{{ domain_home }}/bin"
        service_after: "{{ admin_systemd_service_name }}{% if nodemanager_enabled | bool %} {{ nodemanager_systemd_service_name }}{% endif %}"
        service_wants: "{{ admin_systemd_service_name }}{% if nodemanager_enabled | bool %} {{ nodemanager_systemd_service_name }}{% endif %}"
        service_type: "simple"
        service_remain_after_exit: false
      notify: "reload systemd"
      tags: [systemd_service]

    - name: Flush systemd handlers before starting managed servers
      ansible.builtin.meta: flush_handlers
      when:
        - managed_server_enable | bool
        - manage_managed_systemd | bool
        - auto_start_managed | bool
      tags: [systemd_service]

    - name: Start and enable managed server services
      ansible.builtin.systemd:
        name: "{{ managed_systemd_service_prefix }}{{ item.listen_port }}.service"
        state: started
        enabled: true
      loop: "{{ managed_servers }}"
      when:
        - managed_server_enable | bool
        - manage_managed_systemd | bool
        - auto_start_managed | bool
      tags: [systemd_service]

    - name: Wait for managed server listen ports
      ansible.builtin.wait_for:
        host: "127.0.0.1"
        port: "{{ item.listen_port | int }}"
        state: started
        delay: 2
        timeout: 1800
      loop: "{{ managed_servers }}"
      when:
        - managed_server_enable | bool
        - manage_managed_systemd | bool
        - auto_start_managed | bool
      tags: [systemd_service]

    - name: Detect additional domains with existing domain home
      ansible.builtin.stat:
        path: "{{ item.domain_home }}/bin/startWebLogic.sh"
      loop: "{{ additional_weblogic_domains | default([]) }}"
      register: additional_domain_home_checks
      changed_when: false
      tags: [directories, systemd_service, firewalld, crontab, summary]

    - name: Build additional domain active/skip lists
      ansible.builtin.set_fact:
        additional_weblogic_domains_active: "{{ additional_domain_home_checks.results | default([]) | selectattr('stat.exists', 'equalto', true) | map(attribute='item')
          | list }}"
        additional_weblogic_domains_skipped: "{{ additional_domain_home_checks.results | default([]) | rejectattr('stat.exists', 'equalto', true) | map(attribute='item')
          | list }}"
      tags: [directories, systemd_service, firewalld, crontab, summary]

    - name: Warn for additional domains skipped because domain_home is missing
      ansible.builtin.debug:
        msg: "Skipping additional domain {{ item.domain_name }} (missing {{ item.domain_home }}/bin/startWebLogic.sh)."
      loop: "{{ additional_weblogic_domains_skipped | default([]) }}"
      when: (additional_weblogic_domains_skipped | default([]) | length) > 0
      tags: [summary]

    - name: Ensure USER_MEM_ARGS is embedded in additional domain startWebLogic.sh
      ansible.builtin.blockinfile:
        path: "{{ item.domain_home }}/bin/startWebLogic.sh"
        marker: "# {mark} ANSIBLE USER_MEM_ARGS"
        insertbefore: "^umask 027"
        block: |
          USER_MEM_ARGS="{{ additional_domain_user_mem_args }}"
          export USER_MEM_ARGS
      loop: "{{ additional_weblogic_domains_active | default([]) }}"
      vars:
        additional_domain_gc_log_dir: "{{ item.weblogic_gc_log_dir | default(logs_base_dir + '/' + item.domain_name + '/gc') }}"
        additional_domain_gc_log_file: "{{ item.weblogic_gc_log_file | default(additional_domain_gc_log_dir + '/' + (item.domain_name | lower) + '.log') }}"
        additional_domain_user_mem_args: "{{ item.weblogic_user_mem_args | default(weblogic_user_mem_args | replace(weblogic_primary_gc_log_file, additional_domain_gc_log_file))
          }}"
      tags: [systemd_service]

    - name: Ensure AdminServer security directories exist for additional domains
      ansible.builtin.file:
        path: "{{ item.domain_home }}/servers/{{ item.admin_server_name | default('AdminServer') }}/security"
        state: directory
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0700"
      loop: "{{ additional_weblogic_domains_active | default([]) }}"
      when:
        - create_boot_properties | bool
        - managed_server_enable | bool
      tags: [boot_properties, systemd_service]

    - name: Check additional AdminServer boot.properties files
      ansible.builtin.stat:
        path: "{{ item.domain_home }}/servers/{{ item.admin_server_name | default('AdminServer') }}/security/boot.properties"
      loop: "{{ additional_weblogic_domains_active | default([]) }}"
      register: additional_admin_boot_prop_pre_stats
      changed_when: false
      when:
        - create_boot_properties | bool
        - managed_server_enable | bool
      tags: [boot_properties, systemd_service]

    - name: Check whether additional AdminServer boot.properties files are encrypted
      ansible.builtin.shell: >-
        grep -q '=[{]'
        {{ additional_admin_boot_properties_path | quote }}
      loop: "{{ additional_weblogic_domains_active | default([]) }}"
      loop_control:
        index_var: additional_domain_index
      vars:
        additional_admin_boot_properties_path: "{{ item.domain_home }}/servers/{{ item.admin_server_name | default('AdminServer') }}/security/boot.properties"
      register: additional_admin_boot_prop_encryption
      failed_when: additional_admin_boot_prop_encryption.rc not in [0, 1]
      changed_when: false
      check_mode: false
      when:
        - create_boot_properties | bool
        - managed_server_enable | bool
        - additional_admin_boot_prop_pre_stats.results[additional_domain_index].stat.exists | default(false)
      tags: [boot_properties, systemd_service]

    - name: Create AdminServer boot.properties for additional domains
      ansible.builtin.template:
        src: templates/boot.properties.j2
        dest: "{{ item.domain_home }}/servers/{{ item.admin_server_name | default('AdminServer') }}/security/boot.properties"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0600"
      loop: "{{ additional_weblogic_domains_active | default([]) }}"
      loop_control:
        index_var: additional_domain_index
      vars:
        wlst_admin_user: "{{ item.weblogic_admin_user | default(weblogic_admin_user) }}"
      when:
        - create_boot_properties | bool
        - managed_server_enable | bool
        - >-
          (not (additional_admin_boot_prop_pre_stats.results[additional_domain_index].stat.exists | default(false)))
          or ((additional_admin_boot_prop_encryption.results[additional_domain_index].rc | default(-1)) == 1)
      no_log: true
      tags: [boot_properties, systemd_service]

    - name: Normalize AdminServer boot.properties permissions for additional domains
      ansible.builtin.file:
        path: "{{ item.domain_home }}/servers/{{ item.admin_server_name | default('AdminServer') }}/security/boot.properties"
        state: file
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0600"
      loop: "{{ additional_weblogic_domains_active | default([]) }}"
      loop_control:
        index_var: additional_domain_index
      when:
        - create_boot_properties | bool
        - managed_server_enable | bool
        - >-
          (additional_admin_boot_prop_pre_stats.results[additional_domain_index].stat.exists | default(false))
          or not ansible_check_mode
      tags: [boot_properties, systemd_service]

    - name: Ensure managed server security directories exist for additional domains
      ansible.builtin.file:
        path: "{{ item.0.domain_home }}/servers/{{ item.1.name }}/security"
        state: directory
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0700"
      loop: "{{ query('subelements', additional_weblogic_domains_active | default([]), 'managed_servers', {'skip_missing': True}) }}"
      when:
        - create_boot_properties | bool
        - managed_server_enable | bool
      tags: [boot_properties, systemd_service]

    - name: Check AdminServer boot.properties for additional domains
      ansible.builtin.stat:
        path: "{{ item.domain_home }}/servers/{{ item.admin_server_name | default('AdminServer') }}/security/boot.properties"
      loop: "{{ additional_weblogic_domains_active | default([]) }}"
      register: additional_admin_boot_prop_stats
      changed_when: false
      when:
        - create_boot_properties | bool
        - managed_server_enable | bool
      tags: [boot_properties, systemd_service]

    - name: Assert AdminServer boot.properties exists for additional domains with managed servers
      ansible.builtin.assert:
        that:
          - item.stat.exists | default(false)
        fail_msg: "Missing AdminServer boot.properties at {{ item.item.domain_home }}/servers/{{ item.item.admin_server_name | default('AdminServer') }}/security/boot.properties;
          cannot seed managed server boot identities."
      loop: "{{ additional_admin_boot_prop_stats.results | default([]) }}"
      when:
        - create_boot_properties | bool
        - managed_server_enable | bool
        - (item.item.managed_servers | default([]) | length) > 0
        - not ansible_check_mode
      tags: [boot_properties, systemd_service]

    - name: Sync boot.properties for managed servers in additional domains from admin server
      ansible.builtin.copy:
        src: "{{ item.0.domain_home }}/servers/{{ item.0.admin_server_name | default('AdminServer') }}/security/boot.properties"
        dest: "{{ item.0.domain_home }}/servers/{{ item.1.name }}/security/boot.properties"
        remote_src: true
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0600"
      loop: "{{ query('subelements', additional_weblogic_domains_active | default([]), 'managed_servers', {'skip_missing': True}) }}"
      when:
        - create_boot_properties | bool
        - managed_server_enable | bool
        - not ansible_check_mode
      tags: [boot_properties, systemd_service]
      no_log: true

    - name: Create admin logs directories for additional domains
