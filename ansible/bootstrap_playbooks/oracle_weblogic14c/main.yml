      loop: "{{ additional_weblogic_domains_active | default([]) }}"
      tags: [directories, systemd_service]

    - name: Create managed server logs directories for additional domains
      ansible.builtin.file:
        path: "{{ (item.0.managed_logs_dir_base | default(logs_base_dir + '/' + item.0.domain_name + '/managed')) + '/' + item.1.name }}"
