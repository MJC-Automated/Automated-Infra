        wlst_coherence_port: "{{ item.0.coherence_port | default(7574) }}"
      tags: [systemd_service]

    - name: Create managed server stop scripts for additional domains
      ansible.builtin.template:
        src: templates/stop_managed.sh.j2
        dest: "{{ scripts_dir }}/stopManaged_{{ item.0.domain_name | lower | regex_replace('[^a-z0-9]', '') }}_{{ item.1.name | lower }}_{{ item.1.listen_port }}.sh"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0700"
      loop: "{{ query('subelements', additional_weblogic_domains_active | default([]), 'managed_servers', {'skip_missing': True}) }}"
      when: managed_server_enable | bool
      vars:
        wlst_domain_name: "{{ item.0.domain_name }}"
        wlst_domain_home: "{{ item.0.domain_home }}"
        managed_server_name: "{{ item.1.name }}"
        managed_server_logs_dir: "{{ (item.0.managed_logs_dir_base | default(logs_base_dir + '/' + item.0.domain_name + '/managed')) + '/' + item.1.name }}"
        wlst_admin_url: "{{ item.0.admin_url | default('t3://' + (item.0.admin_listen_address | default(ansible_host | default(inventory_hostname), true)) + ':' +
          (item.0.admin_port | string)) }}"
        wlst_admin_user: "{{ item.0.weblogic_admin_user | default(weblogic_admin_user) }}"
      tags: [systemd_service]

    - name: Create admin systemd services for additional domains
      ansible.builtin.template:
        src: templates/wls_service.service.j2
        dest: "/etc/systemd/system/wls{{ item.domain_name | upper | regex_replace('[^A-Z0-9]', '') }}{{ item.admin_port }}.service"
        owner: root
        group: root
        mode: "0644"
      loop: "{{ additional_weblogic_domains_active | default([]) }}"
      when: manage_admin_systemd | bool
      vars:
        service_description: "The {{ item.domain_name | upper | regex_replace('_', ' ') }} - {{ item.admin_port }} Weblogic Service"
        service_exec_start: "{{ scripts_dir }}/startWeblogic_{{ item.domain_name | lower | regex_replace('[^a-z0-9]', '') }}_{{ item.admin_port }}.sh"
        service_exec_stop: "{{ scripts_dir }}/stopWeblogic_{{ item.domain_name | lower | regex_replace('[^a-z0-9]', '') }}_{{ item.admin_port }}.sh"
        service_working_dir: "{{ item.domain_home }}/bin"
        wlst_domain_home: "{{ item.domain_home }}"
        service_type: "simple"
        service_remain_after_exit: false
      notify: "reload systemd"
      tags: [systemd_service]

    - name: Start and enable admin services for additional domains
      ansible.builtin.systemd:
        name: "wls{{ item.domain_name | upper | regex_replace('[^A-Z0-9]', '') }}{{ item.admin_port }}.service"
        state: started
        enabled: true
      loop: "{{ additional_weblogic_domains_active | default([]) }}"
      when:
        - manage_admin_systemd | bool
        - auto_start_admin | bool
      tags: [systemd_service]

    - name: Wait for additional domain admin listen ports to be ready
      ansible.builtin.wait_for:
        host: "127.0.0.1"
        port: "{{ item.admin_port | int }}"
        state: started
        delay: 2
        timeout: 1800
      loop: "{{ additional_weblogic_domains_active | default([]) }}"
      when:
        - manage_admin_systemd | bool
        - auto_start_admin | bool
      tags: [systemd_service]

    - name: Create managed systemd services for additional domains
      ansible.builtin.template:
        src: templates/wls_service.service.j2
        dest: "/etc/systemd/system/wls{{ item.0.domain_name | upper | regex_replace('[^A-Z0-9]', '') }}{{ item.1.listen_port }}.service"
        owner: root
        group: root
        mode: "0644"
      loop: "{{ query('subelements', additional_weblogic_domains_active | default([]), 'managed_servers', {'skip_missing': True}) }}"
      when:
        - managed_server_enable | bool
        - manage_managed_systemd | bool
      vars:
        _extra_admin_service: "wls{{ item.0.domain_name | upper | regex_replace('[^A-Z0-9]', '') }}{{ item.0.admin_port }}.service"
        service_description: "The {{ item.0.domain_name | upper | regex_replace('_', ' ') }} {{ item.1.name }} - {{ item.1.listen_port }} Weblogic Service"
        service_exec_start: "{{ scripts_dir }}/startManaged_{{ item.0.domain_name | lower | regex_replace('[^a-z0-9]', '') }}_{{ item.1.name | lower }}_{{ item.1.listen_port
          }}.sh"
        service_exec_stop: "{{ scripts_dir }}/stopManaged_{{ item.0.domain_name | lower | regex_replace('[^a-z0-9]', '') }}_{{ item.1.name | lower }}_{{ item.1.listen_port
          }}.sh"
        service_working_dir: "{{ item.0.domain_home }}/bin"
        service_after: "{{ _extra_admin_service }}{% if nodemanager_enabled | bool %} {{ nodemanager_systemd_service_name }}{% endif %}"
        service_wants: "{{ _extra_admin_service }}{% if nodemanager_enabled | bool %} {{ nodemanager_systemd_service_name }}{% endif %}"
        wlst_domain_home: "{{ item.0.domain_home }}"
        service_type: "simple"
        service_remain_after_exit: false
      notify: "reload systemd"
      tags: [systemd_service]

    - name: Flush systemd handlers before starting additional managed services
      ansible.builtin.meta: flush_handlers
      when:
        - managed_server_enable | bool
        - manage_managed_systemd | bool
        - auto_start_managed | bool
      tags: [systemd_service]

    - name: Start and enable managed services for additional domains
      ansible.builtin.systemd:
        name: "wls{{ item.0.domain_name | upper | regex_replace('[^A-Z0-9]', '') }}{{ item.1.listen_port }}.service"
        state: started
        enabled: true
      loop: "{{ query('subelements', additional_weblogic_domains_active | default([]), 'managed_servers', {'skip_missing': True}) }}"
      when:
        - managed_server_enable | bool
        - manage_managed_systemd | bool
        - auto_start_managed | bool
      tags: [systemd_service]

    - name: Wait for additional domain managed server listen ports
      ansible.builtin.wait_for:
        host: "127.0.0.1"
        port: "{{ item.1.listen_port | int }}"
        state: started
        delay: 2
        timeout: 1800
      loop: "{{ query('subelements', additional_weblogic_domains_active | default([]), 'managed_servers', {'skip_missing': True}) }}"
      when:
        - managed_server_enable | bool
        - manage_managed_systemd | bool
        - auto_start_managed | bool
      tags: [systemd_service]

    # --- Task 12: Firewall Allowlist (firewalld) ---
    - name: Gather service facts for firewalld detection
      ansible.builtin.service_facts:
      tags: [firewalld]

    - name: Set firewalld present fact
      ansible.builtin.set_fact:
        firewalld_present: >-
          {{
            'firewalld.service' in ansible_facts.services
          }}
      tags: [firewalld]

    - name: Ensure firewalld is running (if present)
      ansible.builtin.systemd:
        name: firewalld
        state: started
        enabled: true
      when:
        - firewalld_present | bool
        - firewall_manage_enabled | bool
      tags: [firewalld]

    - name: Build firewall allowlist ports
      ansible.builtin.set_fact:
        firewall_allowlist_ports: >-
          {{
            (
              [admin_port]
              + (
                (managed_server_enable | bool)
                | ternary(
                  (
                    managed_servers
                    | default([])
                    | selectattr('listen_port', 'defined')
                    | map(attribute='listen_port')
                    | list
                  ),
                  []
                )
              )
              + (additional_weblogic_domains | default([]) | map(attribute='admin_port') | list)
              + (
                (managed_server_enable | bool)
                | ternary(
                  (
                    additional_weblogic_domains
                    | default([])
                    | map(attribute='managed_servers')
                    | map('default', [])
                    | list
                    | flatten
                    | selectattr('listen_port', 'defined')
                    | map(attribute='listen_port')
                    | list
                  ),
                  []
                )
              )
              + (
                additional_weblogic_domains
                | default([])
                | map(attribute='extra_ports')
                | map('default', [])
                | list
                | flatten
              )
              + (
                (
                  (nodemanager_enabled | bool)
                  and (nodemanager_firewall_expose | bool)
                )
                | ternary([nodemanager_listen_port], [])
              )
              + (firewall_extra_ports | default([])) + [zabbix_agent_port]
            )
            | map('int')
            | unique
            | list
          }}
      when:
        - firewalld_present | bool
        - firewall_manage_enabled | bool
      tags: [firewalld]

    - name: Allow WebLogic ports in firewalld
      ansible.posix.firewalld:
        port: "{{ item }}/tcp"
        permanent: true
        immediate: true
        state: enabled
      loop: "{{ firewall_allowlist_ports }}"
      when:
        - firewalld_present | bool
        - firewall_manage_enabled | bool
      tags: [firewalld]

    - name: Warn when firewalld is not installed
      ansible.builtin.debug:
        msg: "firewalld not installed; skipping firewall allowlist."
      when:
        - not firewalld_present | bool
        - firewall_manage_enabled | bool
      tags: [firewalld]

    # --- Task 13: Optional Crontab Management ---
    - name: Ensure pkill java entry is present (optional and dangerous)
      ansible.builtin.cron:
        name: "Kill all java processes (caution: affects all java apps!)"
        user: root
        minute: "{{ crontab_pkill_minute }}"
        hour: "{{ crontab_pkill_hour }}"
        job: "/usr/bin/pkill -9 java"
        state: present
      when:
        - crontab_enabled | bool
        - dangerous_pkill_enabled | bool
      tags: [crontab]

    - name: Add daily stop cron (optional)
      ansible.builtin.cron:
        name: "Stop WebLogic Admin Server nightly"
        user: root
        minute: "{{ crontab_stop_minute }}"
        hour: "{{ crontab_stop_hour }}"
        job: "/usr/bin/systemctl stop {{ admin_systemd_service_name }}"
        state: present
      when: crontab_enabled | bool
      tags: [crontab]

    - name: Add daily stop cron for additional domains (optional)
      ansible.builtin.cron:
        name: "Stop {{ item.domain_name | upper }} WebLogic Admin Server nightly"
        user: root
        minute: "{{ item.cron_stop_minute | default(crontab_stop_minute) }}"
        hour: "{{ item.cron_stop_hour | default(crontab_stop_hour) }}"
        job: "/usr/bin/systemctl stop wls{{ item.domain_name | upper | regex_replace('[^A-Z0-9]', '') }}{{ item.admin_port }}.service"
        state: present
      loop: "{{ additional_weblogic_domains_active | default([]) }}"
      when: crontab_enabled | bool
      tags: [crontab]

    - name: Add daily start cron (optional)
      ansible.builtin.cron:
        name: "Start WebLogic Admin Server nightly"
        user: root
        minute: "{{ crontab_start_minute }}"
        hour: "{{ crontab_start_hour }}"
        job: "/usr/bin/systemctl start {{ admin_systemd_service_name }}"
        state: present
      when: crontab_enabled | bool
      tags: [crontab]

    - name: Add daily start cron for additional domains (optional)
      ansible.builtin.cron:
        name: "Start {{ item.domain_name | upper }} WebLogic Admin Server nightly"
        user: root
        minute: "{{ item.cron_start_minute | default(crontab_start_minute) }}"
        hour: "{{ item.cron_start_hour | default(crontab_start_hour) }}"
        job: "/usr/bin/systemctl start wls{{ item.domain_name | upper | regex_replace('[^A-Z0-9]', '') }}{{ item.admin_port }}.service"
        state: present
      loop: "{{ additional_weblogic_domains_active | default([]) }}"
      when: crontab_enabled | bool
      tags: [crontab]

    # ---- Task 14: Storage Cleanup ----
    # Deploy cleanup scripts, logrotate configs, disk monitoring, and journald settings.
    # Runs during the nightly restart window (00:00) when WebLogic is stopped.

    - name: "CLEANUP | Build domain homes list (includes additional domains)"
      ansible.builtin.set_fact:
        cleanup_weblogic_domain_homes: >-
          {{ cleanup_weblogic_domain_homes +
             (additional_weblogic_domains | default([]) | map(attribute='domain_home') | list) }}
      when: cleanup_enabled | default(true) | bool
      tags: [cleanup]

    - name: "CLEANUP | Extend cleanup dirs with additional domains"
      ansible.builtin.set_fact:
        cleanup_weblogic_tmp_dirs: >-
          {{ cleanup_weblogic_tmp_dirs +
             (additional_weblogic_domains | default([]) |
              map(attribute='domain_home') |
              map('regex_replace', '$', '/servers/AdminServer/tmp/_WL_user') | list) }}
        cleanup_weblogic_cache_dirs: >-
          {{ cleanup_weblogic_cache_dirs +
             (additional_weblogic_domains | default([]) |
              map(attribute='domain_home') |
              map('regex_replace', '$', '/servers/AdminServer/cache') | list) }}
        cleanup_weblogic_server_log_dirs: >-
          {{ cleanup_weblogic_server_log_dirs +
             (additional_weblogic_domains | default([]) |
              map(attribute='domain_home') |
              map('regex_replace', '$', '/servers/AdminServer/logs') | list) }}
      when: cleanup_enabled | default(true) | bool
      tags: [cleanup]

    - name: "CLEANUP | Ensure cleanup log directory exists"
      ansible.builtin.file:
        path: "{{ cleanup_log_dir }}"
        state: directory
        owner: "{{ cleanup_file_owner }}"
        group: "{{ cleanup_file_group }}"
        mode: "0755"
      when: cleanup_enabled | default(true) | bool
      tags: [cleanup]

    - name: "CLEANUP | Deploy WebLogic cleanup script"
      ansible.builtin.template:
        src: templates/cleanup_weblogic.sh.j2
        dest: "{{ cleanup_script_dir }}/cleanup_weblogic.sh"
        owner: "{{ cleanup_file_owner }}"
        group: "{{ cleanup_file_group }}"
        mode: "0755"
      when: cleanup_enabled | default(true) | bool
      tags: [cleanup]

    - name: "CLEANUP | Deploy logrotate config for WebLogic stdout logs"
      ansible.builtin.template:
        src: templates/logrotate_weblogic.j2
        dest: /etc/logrotate.d/weblogic
        owner: root
        group: root
        mode: "0644"
      when: cleanup_enabled | default(true) | bool
      tags: [cleanup, logrotate]

    - name: "CLEANUP | Deploy disk space monitoring script"
      ansible.builtin.template:
        src: templates/check_disk.sh.j2
        dest: "{{ cleanup_script_dir }}/check_disk.sh"
        owner: "{{ cleanup_file_owner }}"
        group: "{{ cleanup_file_group }}"
        mode: "0755"
      when: cleanup_enabled | default(true) | bool
      tags: [cleanup, monitoring]

    - name: "CLEANUP | Add WebLogic cleanup cron job (oracle user)"
      ansible.builtin.cron:
        name: "Storage cleanup — WebLogic"
        user: "{{ cleanup_file_owner }}"
        minute: "{{ cleanup_wls_cron_minute }}"
        hour: "{{ cleanup_wls_cron_hour }}"
        job: "{{ cleanup_script_dir }}/cleanup_weblogic.sh 2>&1"
      when: cleanup_enabled | default(true) | bool
      tags: [cleanup, crontab]

    - name: "CLEANUP | Add disk check cron job (oracle user)"
      ansible.builtin.cron:
        name: "Storage cleanup — disk check"
        user: "{{ cleanup_file_owner }}"
        minute: "{{ cleanup_disk_cron_minute }}"
        hour: "{{ cleanup_disk_cron_hour }}"
        job: "{{ cleanup_script_dir }}/check_disk.sh 2>&1"
      when: cleanup_enabled | default(true) | bool
      tags: [cleanup, crontab, monitoring]

    - name: "CLEANUP | Configure journald SystemMaxUse"
      ansible.builtin.lineinfile:
        path: /etc/systemd/journald.conf
        regexp: "^#?SystemMaxUse="
        line: "SystemMaxUse={{ cleanup_journald_max_use }}"
        backup: true
      when: cleanup_enabled | default(true) | bool
      tags: [cleanup, journald]

    - name: "CLEANUP | Configure journald MaxRetentionSec"
      ansible.builtin.lineinfile:
        path: /etc/systemd/journald.conf
        regexp: "^#?MaxRetentionSec="
        line: "MaxRetentionSec={{ cleanup_journald_max_retention }}"
      when: cleanup_enabled | default(true) | bool
      tags: [cleanup, journald]

    - name: "DEPLOY | Target WebLogic JRF libraries transactionally"
      tags: [deploy, jrf_libraries, libraries]
      block:
        - name: "DEPLOY | Render WebLogic JRF targeting script"
          ansible.builtin.template:
            src: templates/target_jrf_libs.py.j2
            dest: "{{ scripts_dir }}/target_jrf_libs_{{ item.admin_port }}.py"
            owner: "{{ weblogic_user }}"
            group: "{{ weblogic_group }}"
            mode: "0600"
          loop: "{{ [{'domain_name': domain_name, 'admin_port': admin_port, 'domain_home': domain_home}] + (additional_weblogic_domains | default([])) }}"
          loop_control:
            label: "{{ item.domain_name }}"
          vars:
            wlst_domain_name: "{{ item.domain_name }}"
          changed_when: false
          no_log: true

        - name: "DEPLOY | Target JRF shared libraries to cluster and managed servers"
          ansible.builtin.command:
            cmd: "{{ oracle_middleware_home }}/oracle_common/common/bin/wlst.sh {{ scripts_dir }}/target_jrf_libs_{{ item.admin_port }}.py"
          become: true
          become_user: "{{ weblogic_user }}"
          environment:
            JAVA_HOME: "{{ java_home }}"
          changed_when: false
          no_log: true
          loop: "{{ [{'domain_name': domain_name, 'admin_port': admin_port, 'domain_home': domain_home}] + (additional_weblogic_domains | default([])) }}"
          loop_control:
            label: "{{ item.domain_name }} (port {{ item.admin_port }})"

        - name: "DEPLOY | Read WebLogic shared library target status"
          ansible.builtin.command: "cat /tmp/lib_status_{{ item.admin_port }}.txt"
          become: true
          become_user: "{{ weblogic_user }}"
          register: _lib_status
          changed_when: false
          loop: "{{ [{'domain_name': domain_name, 'admin_port': admin_port, 'domain_home': domain_home, 'managed_servers': managed_servers, 'cluster_enabled': cluster_enabled,
            'cluster_name': cluster_name, 'admin_server_name': admin_server_name}] + (additional_weblogic_domains | default([])) }}"
          loop_control:
            label: "{{ item.domain_name }} (port {{ item.admin_port }})"

        - name: "DEPLOY | Mark WebLogic shared library targeting change"
          ansible.builtin.debug:
            msg: "Shared libraries targeted for {{ item.domain_name }}"
          loop: "{{ [{'domain_name': domain_name, 'admin_port': admin_port, 'domain_home': domain_home, 'managed_servers': managed_servers, 'cluster_enabled': cluster_enabled,
            'cluster_name': cluster_name, 'admin_server_name': admin_server_name}] + (additional_weblogic_domains | default([])) }}"
          loop_control:
            label: "{{ item.domain_name }} (port {{ item.admin_port }})"
            index_var: my_idx
          changed_when: _lib_status.results[my_idx].stdout == 'CHANGED'
      always:
        - name: "DEPLOY | Always remove WebLogic JRF targeting artifacts"
          ansible.builtin.file:
            path: "{{ scripts_dir }}/target_jrf_libs_{{ item.admin_port }}.py"
            state: absent
          loop: "{{ [{'domain_name': domain_name, 'admin_port': admin_port, 'domain_home': domain_home}] + (additional_weblogic_domains | default([])) }}"
          loop_control:
            label: "{{ item.domain_name }}"
          changed_when: false

        - name: "DEPLOY | Always remove WebLogic JRF status files"
          ansible.builtin.file:
            path: "/tmp/lib_status_{{ item.admin_port }}.txt"
            state: absent
          loop: "{{ [{'domain_name': domain_name, 'admin_port': admin_port, 'domain_home': domain_home, 'managed_servers': managed_servers, 'cluster_enabled': cluster_enabled,
            'cluster_name': cluster_name, 'admin_server_name': admin_server_name}] + (additional_weblogic_domains | default([])) }}"
          loop_control:
            label: "{{ item.domain_name }} (port {{ item.admin_port }})"
          changed_when: false

    - name: "DEPLOY | Create plan directory for Remote Console"
      ansible.builtin.file:
        path: "{{ item.domain_home | default(domain_base + '/' + item.domain_name) }}/plan"
        state: directory
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0750"
      loop: "{{ [{'domain_name': domain_name, 'admin_port': admin_port, 'domain_home': domain_home}] + (additional_weblogic_domains | default([])) }}"
      loop_control:
        label: "{{ item.domain_name }}"
      tags: [deploy, remote_console]

    - name: "DEPLOY | Render WebLogic Remote Console deployment plans"
      ansible.builtin.template:
        src: templates/rconsole_plan.xml.j2
        dest: "{{ item.domain_home | default(domain_base + '/' + item.domain_name) }}/plan/plan.xml"
        owner: "{{ weblogic_user }}"
        group: "{{ weblogic_group }}"
        mode: "0640"
      loop: "{{ [{'domain_name': domain_name, 'admin_port': admin_port, 'domain_home': domain_home}] + (additional_weblogic_domains | default([])) }}"
      loop_control:
        label: "{{ item.domain_name }}"
      register: _rconsole_plan_rendered
      vars:
        wlst_domain_name: "{{ item.domain_name }}"
      tags: [deploy, remote_console]

    - name: "DEPLOY | Manage WebLogic Remote Console transactionally"
      tags: [deploy, remote_console]
      block:
        - name: "DEPLOY | Render WebLogic Remote Console check script"
          ansible.builtin.template:
            src: templates/check_rconsole.py.j2
            dest: "{{ scripts_dir }}/check_rconsole_{{ item.admin_port }}.py"
            owner: "{{ weblogic_user }}"
            group: "{{ weblogic_group }}"
            mode: "0600"
          loop: "{{ [{'domain_name': domain_name, 'admin_port': admin_port, 'domain_home': domain_home}] + (additional_weblogic_domains | default([])) }}"
          loop_control:
            label: "{{ item.domain_name }}"
          vars:
            wlst_domain_name: "{{ item.domain_name }}"
          changed_when: false
          no_log: true
          tags: [deploy, remote_console]

        - name: "DEPLOY | Check WebLogic Remote Console status"
          ansible.builtin.command:
            cmd: "{{ oracle_middleware_home }}/oracle_common/common/bin/wlst.sh {{ scripts_dir }}/check_rconsole_{{ item.admin_port }}.py"
          become: true
          become_user: "{{ weblogic_user }}"
          environment:
            JAVA_HOME: "{{ java_home }}"
          changed_when: false
          no_log: true
          loop: "{{ [{'domain_name': domain_name, 'admin_port': admin_port, 'domain_home': domain_home}] + (additional_weblogic_domains | default([])) }}"
          loop_control:
            label: "{{ item.domain_name }} (port {{ item.admin_port }})"
          tags: [deploy, remote_console]

        - name: "DEPLOY | Read WebLogic Remote Console status"
          ansible.builtin.command: "cat /tmp/rconsole_status_{{ item.admin_port }}.txt"
          become: true
          become_user: "{{ weblogic_user }}"
          register: _rconsole_status
          changed_when: false
          loop: "{{ [{'domain_name': domain_name, 'admin_port': admin_port, 'domain_home': domain_home}] + (additional_weblogic_domains | default([])) }}"
          loop_control:
            label: "{{ item.domain_name }} (port {{ item.admin_port }})"
          tags: [deploy, remote_console]

        - name: "DEPLOY | Render WebLogic Remote Console deploy script"
          ansible.builtin.template:
            src: templates/deploy_rconsole.py.j2
            dest: "{{ scripts_dir }}/deploy_rconsole_{{ item.admin_port }}.py"
            owner: "{{ weblogic_user }}"
            group: "{{ weblogic_group }}"
            mode: "0600"
          loop: "{{ [{'domain_name': domain_name, 'admin_port': admin_port, 'domain_home': domain_home}] + (additional_weblogic_domains | default([])) }}"
          loop_control:
            label: "{{ item.domain_name }}"
          vars:
            wlst_domain_name: "{{ item.domain_name }}"
          changed_when: false
          no_log: true
          tags: [deploy, remote_console]

        - name: "DEPLOY | Deploy WebLogic Remote Console (rconsole)"
          ansible.builtin.command:
            cmd: "{{ oracle_middleware_home }}/oracle_common/common/bin/wlst.sh {{ scripts_dir }}/deploy_rconsole_{{ item.admin_port }}.py"
          become: true
          become_user: "{{ weblogic_user }}"
          environment:
            JAVA_HOME: "{{ java_home }}"
          loop: "{{ [{'domain_name': domain_name, 'admin_port': admin_port, 'domain_home': domain_home}] + (additional_weblogic_domains | default([])) }}"
          loop_control:
            label: "{{ item.domain_name }} (port {{ item.admin_port }})"
            index_var: my_idx
          when: _rconsole_status.results[my_idx].stdout == 'CHANGED' or (_rconsole_plan_rendered.results[my_idx] is changed)
          changed_when: true
          no_log: true
          tags: [deploy, remote_console]
      always:
        - name: "DEPLOY | Always remove WebLogic Remote Console artifacts"
          ansible.builtin.file:
            path: "{{ scripts_dir }}/check_rconsole_{{ item.admin_port }}.py"
            state: absent
          loop: "{{ [{'domain_name': domain_name, 'admin_port': admin_port, 'domain_home': domain_home}] + (additional_weblogic_domains | default([])) }}"
          loop_control:
            label: "{{ item.domain_name }}"
          changed_when: false
          tags: [deploy, remote_console]

        - name: "DEPLOY | Always remove WebLogic Remote Console deploy scripts"
          ansible.builtin.file:
            path: "{{ scripts_dir }}/deploy_rconsole_{{ item.admin_port }}.py"
            state: absent
          loop: "{{ [{'domain_name': domain_name, 'admin_port': admin_port, 'domain_home': domain_home}] + (additional_weblogic_domains | default([])) }}"
          loop_control:
            label: "{{ item.domain_name }}"
          changed_when: false
          tags: [deploy, remote_console]

        - name: "DEPLOY | Always remove WebLogic Remote Console status files"
          ansible.builtin.file:
            path: "/tmp/rconsole_status_{{ item.admin_port }}.txt"
            state: absent
          loop: "{{ [{'domain_name': domain_name, 'admin_port': admin_port, 'domain_home': domain_home}] + (additional_weblogic_domains | default([])) }}"
          loop_control:
            label: "{{ item.domain_name }} (port {{ item.admin_port }})"
          changed_when: false
          tags: [deploy, remote_console]

    # --- Final Summary ---
    - name: Display WebLogic Deployment Summary
      ansible.builtin.debug:
        msg: |
          =======================================================
          WebLogic 14c Deployment Summary
          =======================================================
          Host: {{ ansible_facts.hostname | default(inventory_hostname) }} ({{ ansible_facts.default_ipv4.address | default(ansible_host | default(inventory_hostname)) }})
          Oracle User: {{ weblogic_user }}
          Oracle Group: {{ weblogic_group }}
          Java Home: {{ java_home }}
          Middleware Home: {{ oracle_middleware_home }}
          Domain Name: {{ domain_name }}
          Domain Home: {{ domain_home }}
          Admin Server: {{ admin_server_name }} ({{ admin_port }})
          Managed Servers Enabled: {{ managed_server_enable }}
          Managed Servers: {{ (managed_server_enable | bool) | ternary((managed_servers | map(attribute='name') | list | join(', ')), 'none') }}
          Admin Console: http://{{ admin_host }}:{{ admin_port }}/console
          Admin Service: {{ admin_systemd_service_name }}
          {% if nodemanager_enabled | bool %}Node Manager: {{ nodemanager_systemd_service_name }} ({{ nodemanager_listen_address | default('localhost', true) }}:{{ nodemanager_listen_port }}){% endif %}
          USER_MEM_ARGS Applied: {{ weblogic_user_mem_args }}
          Firewall Allowlist Ports: {{ firewall_allowlist_ports | default([]) | map('string') | join(', ') if (firewall_allowlist_ports | default([]) | length) > 0 else 'none' }}
          Cron Enabled: {{ crontab_enabled }} (stop: {{ crontab_stop_hour }}:{{ crontab_stop_minute }}, start: {{ crontab_start_hour }}:{{ crontab_start_minute }}, pkill_java: {{ dangerous_pkill_enabled }})
          {% if (additional_weblogic_domains_active | default([]) | length) > 0 %}Additional Domains Active: {{ additional_weblogic_domains_active | map(attribute='domain_name') | list | join(', ') }}{{ '%c' | format(10) }}{% endif %}
          {% if (additional_weblogic_domains_skipped | default([]) | length) > 0 %}Additional Domains Skipped (missing home): {{ additional_weblogic_domains_skipped | map(attribute='domain_name') | list | join(', ') }}{{ '%c' | format(10) }}{% endif %}
          {% if (additional_weblogic_domains_active | default([]) | length) > 0 %}Additional Domain Admin Services: {% for d in additional_weblogic_domains_active %}wls{{ d.domain_name | upper | regex_replace('[^A-Z0-9]', '') }}{{ d.admin_port }}.service{% if not loop.last %}, {% endif %}{% endfor %}{{ '%c' | format(10) }}{% endif %}
          =======================================================
      tags: [summary]
