        wlst_domain_name: "{{ item.0.domain_name }}"
        wlst_domain_home: "{{ item.0.domain_home }}"
        managed_server_name: "{{ item.1.name }}"
        managed_server_logs_dir: "{{ (item.0.managed_logs_dir_base | default(logs_base_dir + '/' + item.0.domain_name + '/managed')) + '/' + item.1.name }}"
        wlst_admin_url: "{{ item.0.admin_url | default('t3://' + (item.0.admin_listen_address | default(ansible_host | default(inventory_hostname), true)) + ':' +
          (item.0.admin_port | string)) }}"
        additional_domain_gc_log_dir: "{{ item.0.weblogic_gc_log_dir | default(logs_base_dir + '/' + item.0.domain_name + '/gc') }}"
        additional_domain_gc_log_file: "{{ item.0.weblogic_gc_log_file | default(additional_domain_gc_log_dir + '/' + (item.0.domain_name | lower) + '.log') }}"
        wlst_gc_log_file: "{{ additional_domain_gc_log_file }}"
        wlst_user_mem_args: "{{ item.0.weblogic_user_mem_args | default(weblogic_user_mem_args | replace(weblogic_primary_gc_log_file, additional_domain_gc_log_file))
