        group: "{{ weblogic_group }}"
        mode: "0775"
      loop: "{{ additional_weblogic_domains_active | default([]) }}"
      tags: [directories, systemd_service]

    - name: Ensure GC log files exist for additional domains
      ansible.builtin.copy:
        content: ""
        dest: "{{ item.weblogic_gc_log_file | default((item.weblogic_gc_log_dir | default(logs_base_dir + '/' + item.domain_name + '/gc')) + '/' + (item.domain_name
