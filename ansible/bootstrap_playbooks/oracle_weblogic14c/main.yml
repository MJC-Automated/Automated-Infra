        group: "{{ weblogic_group }}"
        mode: "0664"
        force: false
      loop: "{{ additional_weblogic_domains_active | default([]) }}"
      tags: [directories, systemd_service]

    - name: Remove obsolete WLS14C_APP2 admin scripts and service (F-004)
      ansible.builtin.file:
        path: "{{ item }}"
