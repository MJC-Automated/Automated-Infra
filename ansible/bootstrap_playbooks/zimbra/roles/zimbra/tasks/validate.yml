---
- name: Assert platform is Oracle Linux 9 class
  ansible.builtin.assert:
    that:
      - ansible_facts.os_family == "RedHat"
      - ansible_facts.distribution_major_version | int == 9
    fail_msg: >-
      This playbook supports Oracle Linux 9 style targets only.
      Detected: {{ ansible_facts.distribution }} {{ ansible_facts.distribution_version }}

- name: Check Zimbra artifact exists on controller
  ansible.builtin.stat:
    path: "{{ zimbra_artifact_path }}"
  delegate_to: localhost
  become: false
  register: zimbra_artifact_stat

- name: Assert Zimbra artifact is available
  ansible.builtin.assert:
    that:
      - zimbra_artifact_stat.stat.exists
      - zimbra_artifact_stat.stat.isreg
    fail_msg: >-
      Zimbra artifact was not found at {{ zimbra_artifact_path }}.
      Upload or adjust ZIMBRA_ARTIFACT_PATH in ansible/bootstrap_playbooks/zimbra/.env.

- name: Derive service IP from gathered facts
  ansible.builtin.set_fact:
    zimbra_service_ip: "{{ ansible_facts.default_ipv4.address | default((ansible_facts.all_ipv4_addresses | first), true) }}"

- name: Assert service IP could be resolved
  ansible.builtin.assert:
    that:
      - zimbra_service_ip | string | length > 0
    fail_msg: "Unable to resolve host IPv4 address for /etc/hosts + installer defaults."

- name: Validate LMTP host lookup mode
  ansible.builtin.assert:
    that:
      - zimbra_mta_lmtp_host_lookup in ['dns', 'native']
    fail_msg: "zimbra_mta_lmtp_host_lookup must be dns or native."

- name: Validate Zimbra credential values
  ansible.builtin.assert:
    that:
      - item | string | length >= zimbra_required_password_length
      - not (item | string is match('^<.*>$'))
    fail_msg: >-
      Every Zimbra credential must be a non-placeholder value with at least
      {{ zimbra_required_password_length }} characters.
  loop:
    - "{{ zimbra_admin_password }}"
    - "{{ zimbra_ldap_root_password }}"
    - "{{ zimbra_ldap_zimbra_password }}"
    - "{{ zimbra_ldap_postfix_password }}"
    - "{{ zimbra_ldap_replication_password }}"
    - "{{ zimbra_ldap_amavis_password }}"
    - "{{ zimbra_ldap_nginx_password }}"
  no_log: true

- name: Validate Zimbra credentials are distinct
  ansible.builtin.assert:
    that:
      - zimbra_credential_values | unique | length == zimbra_credential_values | length
    fail_msg: "Zimbra admin and LDAP credentials must be distinct."
  vars:
    zimbra_credential_values:
      - "{{ zimbra_admin_password }}"
      - "{{ zimbra_ldap_root_password }}"
      - "{{ zimbra_ldap_zimbra_password }}"
      - "{{ zimbra_ldap_postfix_password }}"
      - "{{ zimbra_ldap_replication_password }}"
      - "{{ zimbra_ldap_amavis_password }}"
      - "{{ zimbra_ldap_nginx_password }}"
  no_log: true

- name: Check whether Zimbra is already installed
  ansible.builtin.stat:
    path: /opt/zimbra/bin/zmcontrol
  register: zimbra_installed_bin
