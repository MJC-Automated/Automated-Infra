---
- name: Zimbra FOSS 10.x automation
  hosts: zimbra_servers
  become: true
  gather_facts: false

  vars:
    ansible_python_interpreter: /usr/bin/python3

  pre_tasks:
    - name: Bootstrap python3 on target host (if missing)
      ansible.builtin.raw: |
        if command -v python3 >/dev/null 2>&1; then
          exit 0
        fi
        if command -v dnf >/dev/null 2>&1; then
          dnf install -y python3 python3-dnf
        elif command -v yum >/dev/null 2>&1; then
          yum install -y python3
        elif command -v apt-get >/dev/null 2>&1; then
          apt-get update -y && apt-get install -y python3 python3-apt
        else
          echo "No supported package manager found. Install python3 manually." >&2
          exit 1
        fi
      changed_when: false
      tags: [always]

    - name: Gather facts
      ansible.builtin.setup:
      tags: [always]

    - name: Resolve .env path for Zimbra playbook
      ansible.builtin.set_fact:
        zimbra_dotenv_file: >-
          {{
            lookup(
              'ansible.builtin.first_found',
              {
                'files': ['.env', 'ansible/bootstrap_playbooks/zimbra/.env'],
                'paths': [playbook_dir]
              },
              errors='ignore'
            )
            | default('', true)
          }}
      tags: [always]

    - name: Initialize empty ZIMBRA_* override map
      ansible.builtin.set_fact:
        zimbra_dotenv: {}
      tags: [always]

    - name: Read resolved .env file lines
      ansible.builtin.set_fact:
        zimbra_dotenv_lines: "{{ lookup('ansible.builtin.file', zimbra_dotenv_file).splitlines() }}"
      when:
        - zimbra_dotenv_file | string | length > 0
      tags: [always]

    - name: Parse .env lines into ZIMBRA_* map
      ansible.builtin.set_fact:
        zimbra_dotenv: >-
          {{
            zimbra_dotenv
            | combine(
                {
                  (item.split('=', 1)[0] | trim): (
                    item.split('=', 1)[1]
                    | trim
                    | regex_replace('^\"(.*)\"$', '\\1')
                    | regex_replace("^'(.*)'$", '\\1')
                  )
                }
              )
          }}
      loop: "{{ zimbra_dotenv_lines | default([]) }}"
      when:
        - (item | trim | length) > 0
        - not (item | trim | regex_search('^#'))
        - "'=' in item"
      no_log: true
      tags: [always]

    - name: Apply ZIMBRA non-secret overrides from .env
      ansible.builtin.set_fact:
        zimbra_artifact_path: "{{ zimbra_dotenv.ZIMBRA_ARTIFACT_PATH | default(zimbra_artifact_path, true) }}"
        zimbra_install_base_dir: "{{ zimbra_dotenv.ZIMBRA_INSTALL_BASE_DIR | default(zimbra_install_base_dir, true) }}"
        zimbra_data_mount_path: "{{ zimbra_dotenv.ZIMBRA_DATA_MOUNT_PATH | default(zimbra_data_mount_path, true) }}"
        zimbra_data_root: "{{ zimbra_dotenv.ZIMBRA_DATA_ROOT | default(zimbra_data_root, true) }}"
        zimbra_mail_domain: "{{ zimbra_dotenv.ZIMBRA_MAIL_DOMAIN | default(zimbra_mail_domain, true) }}"
        zimbra_short_hostname: "{{ zimbra_dotenv.ZIMBRA_SHORT_HOSTNAME | default(zimbra_short_hostname, true) }}"
        zimbra_hostname: "{{ zimbra_dotenv.ZIMBRA_HOSTNAME | default(zimbra_hostname, true) }}"
        zimbra_admin_email: "{{ zimbra_dotenv.ZIMBRA_ADMIN_EMAIL | default(zimbra_admin_email, true) }}"
        zimbra_av_notify_email: "{{ zimbra_dotenv.ZIMBRA_AV_NOTIFY_EMAIL | default(zimbra_av_notify_email, true) }}"
        zimbra_smtp_source_email: "{{ zimbra_dotenv.ZIMBRA_SMTP_SOURCE_EMAIL | default(zimbra_smtp_source_email, true) }}"
        zimbra_smtp_dest_email: "{{ zimbra_dotenv.ZIMBRA_SMTP_DEST_EMAIL | default(zimbra_smtp_dest_email, true) }}"
        zimbra_service_mode: "{{ zimbra_dotenv.ZIMBRA_SERVICE_MODE | default(zimbra_service_mode, true) }}"
        zimbra_allow_self_signed: "{{ zimbra_dotenv.ZIMBRA_ALLOW_SELF_SIGNED | default(zimbra_allow_self_signed, true) }}"
        zimbra_start_servers: "{{ zimbra_dotenv.ZIMBRA_START_SERVERS | default(zimbra_start_servers, true) }}"
        zimbra_enable_av: "{{ zimbra_dotenv.ZIMBRA_ENABLE_AV | default(zimbra_enable_av, true) }}"
        zimbra_enable_sa: "{{ zimbra_dotenv.ZIMBRA_ENABLE_SA | default(zimbra_enable_sa, true) }}"
        zimbra_mta_lmtp_host_lookup: "{{ zimbra_dotenv.ZIMBRA_MTA_LMTP_HOST_LOOKUP | default(zimbra_mta_lmtp_host_lookup, true) }}"
        zimbra_use_zimbra_package_server: "{{ zimbra_dotenv.ZIMBRA_USE_ZIMBRA_PACKAGE_SERVER | default(zimbra_use_zimbra_package_server, true) }}"
        zimbra_package_server: "{{ zimbra_dotenv.ZIMBRA_PACKAGE_SERVER | default(zimbra_package_server, true) }}"
        zimbra_install_timeout: "{{ (zimbra_dotenv.ZIMBRA_INSTALL_TIMEOUT | default(zimbra_install_timeout | string, true)) | int }}"
        zimbra_verify_timeout: "{{ (zimbra_dotenv.ZIMBRA_VERIFY_TIMEOUT | default(zimbra_verify_timeout | string, true)) | int }}"
        zimbra_skip_space_check: "{{ (zimbra_dotenv.ZIMBRA_SKIP_SPACE_CHECK | default((zimbra_skip_space_check | string), true)) | bool }}"
        zimbra_platform_override: "{{ (zimbra_dotenv.ZIMBRA_PLATFORM_OVERRIDE | default((zimbra_platform_override | string), true)) | bool }}"
        zimbra_manage_hostname: "{{ (zimbra_dotenv.ZIMBRA_MANAGE_HOSTNAME | default((zimbra_manage_hostname | string), true)) | bool }}"
        zimbra_manage_hosts_file: "{{ (zimbra_dotenv.ZIMBRA_MANAGE_HOSTS_FILE | default((zimbra_manage_hosts_file | string), true)) | bool }}"
        zimbra_disable_selinux: "{{ (zimbra_dotenv.ZIMBRA_DISABLE_SELINUX | default((zimbra_disable_selinux | string), true)) | bool }}"
        zimbra_manage_postfix_conflicts: "{{ (zimbra_dotenv.ZIMBRA_MANAGE_POSTFIX_CONFLICTS | default((zimbra_manage_postfix_conflicts | string), true)) | bool }}"
        zimbra_install_oracle_epel: "{{ (zimbra_dotenv.ZIMBRA_INSTALL_ORACLE_EPEL | default((zimbra_install_oracle_epel | string), true)) | bool }}"
        zimbra_use_mounted_data_dir: "{{ (zimbra_dotenv.ZIMBRA_USE_MOUNTED_DATA_DIR | default((zimbra_use_mounted_data_dir | string), true)) | bool }}"
        zimbra_manage_firewall: "{{ (zimbra_dotenv.ZIMBRA_MANAGE_FIREWALL | default((zimbra_manage_firewall | string), true)) | bool }}"
        zimbra_disable_imapd_when_mailbox: "{{ (zimbra_dotenv.ZIMBRA_DISABLE_IMAPD_WHEN_MAILBOX | default((zimbra_disable_imapd_when_mailbox | string), true)) | bool
          }}"
        zimbra_imapd_auto_disable_on_failure: "{{ (zimbra_dotenv.ZIMBRA_IMAPD_AUTO_DISABLE_ON_FAILURE | default((zimbra_imapd_auto_disable_on_failure | string), true))
          | bool }}"
        zimbra_firewall_allowed_ports: >-
          {{
            (
              zimbra_dotenv.get('ZIMBRA_FIREWALL_ALLOWED_PORTS', '')
              | trim
              | length
            )
            | ternary(
                zimbra_dotenv.get('ZIMBRA_FIREWALL_ALLOWED_PORTS', '').split(',')
                | map('trim')
                | reject('equalto', '')
                | list,
                zimbra_firewall_allowed_ports
              )
          }}
        zimbra_required_packages: >-
          {{
            (
              zimbra_dotenv.get('ZIMBRA_REQUIRED_PACKAGES', '')
              | trim
              | length
            )
            | ternary(
                zimbra_dotenv.get('ZIMBRA_REQUIRED_PACKAGES', '').split(',')
                | map('trim')
                | reject('equalto', '')
                | list,
                zimbra_required_packages
              )
          }}
        zimbra_install_packages: >-
          {{
            (
              zimbra_dotenv.get('ZIMBRA_INSTALL_PACKAGES', '')
              | trim
              | length
            )
            | ternary(
                zimbra_dotenv.get('ZIMBRA_INSTALL_PACKAGES', '').split(',')
                | map('trim')
                | reject('equalto', '')
                | list,
                zimbra_install_packages
              )
          }}
        zimbra_webapps: >-
          {{
            (
              zimbra_dotenv.get('ZIMBRA_WEBAPPS', '')
              | trim
              | length
            )
            | ternary(
                zimbra_dotenv.get('ZIMBRA_WEBAPPS', '').split(',')
                | map('trim')
                | reject('equalto', '')
                | list,
                zimbra_webapps
              )
          }}
      tags: [always]

    - name: Determine whether a Zimbra password seed must be generated
      ansible.builtin.set_fact:
        zimbra_generate_password_seed: >-
          {{ zimbra_generate_local_password_seed | bool and zimbra_password_seed | length == 0 }}
      tags: [always]

    - name: Ensure Zimbra local secret directory exists
      delegate_to: localhost
      become: false
      run_once: true
      ansible.builtin.file:
        path: "{{ playbook_dir }}/files"
        state: directory
        owner: "{{ zimbra_local_secret_owner }}"
        group: "{{ zimbra_local_secret_group }}"
        mode: "0700"
      when: zimbra_generate_password_seed | bool
      tags: [always]

    - name: Resolve persistent Zimbra password seed
      ansible.builtin.set_fact:
        zimbra_password_seed: >-
          {{
            lookup('ansible.builtin.password', zimbra_password_seed_path ~ ' length=64 chars=hexdigits')
            if zimbra_generate_password_seed | bool
            else zimbra_password_seed
          }}
      no_log: true
      tags: [always]

    - name: Enforce Zimbra local secret ownership and permissions
      delegate_to: localhost
      become: false
      run_once: true
      ansible.builtin.file:
        path: "{{ zimbra_password_seed_path }}"
        state: file
        owner: "{{ zimbra_local_secret_owner }}"
        group: "{{ zimbra_local_secret_group }}"
        mode: "0600"
      when: zimbra_generate_password_seed | bool
      no_log: true
      tags: [always]

    - name: Apply ZIMBRA secret overrides from .env
      ansible.builtin.set_fact:
        zimbra_admin_password: "{{ zimbra_dotenv.ZIMBRA_ADMIN_PASSWORD | default(zimbra_admin_password, true) }}"
        zimbra_ldap_root_password: "{{ zimbra_dotenv.ZIMBRA_LDAP_ROOT_PASSWORD | default(zimbra_ldap_root_password, true) }}"
        zimbra_ldap_zimbra_password: "{{ zimbra_dotenv.ZIMBRA_LDAP_ZIMBRA_PASSWORD | default(zimbra_ldap_zimbra_password, true) }}"
        zimbra_ldap_postfix_password: "{{ zimbra_dotenv.ZIMBRA_LDAP_POSTFIX_PASSWORD | default(zimbra_ldap_postfix_password, true) }}"
        zimbra_ldap_replication_password: "{{ zimbra_dotenv.ZIMBRA_LDAP_REPLICATION_PASSWORD | default(zimbra_ldap_replication_password, true) }}"
        zimbra_ldap_amavis_password: "{{ zimbra_dotenv.ZIMBRA_LDAP_AMAVIS_PASSWORD | default(zimbra_ldap_amavis_password, true) }}"
        zimbra_ldap_nginx_password: "{{ zimbra_dotenv.ZIMBRA_LDAP_NGINX_PASSWORD | default(zimbra_ldap_nginx_password, true) }}"
      no_log: true
      tags: [always]

  roles:
    - role: zimbra
