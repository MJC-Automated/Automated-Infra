---
- name: Build required package list
  ansible.builtin.set_fact:
    freeipa_packages: "{{ freeipa_required_packages_common + (freeipa_setup_dns | bool | ternary(freeipa_required_packages_dns, [])) }}"

- name: Install FreeIPA packages
  ansible.builtin.dnf:
    name: "{{ freeipa_packages }}"
    state: present
  register: freeipa_package_install
  until: freeipa_package_install is succeeded
  retries: 3
  delay: 10
