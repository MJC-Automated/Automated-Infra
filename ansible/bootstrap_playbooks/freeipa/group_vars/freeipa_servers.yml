---
freeipa_domain: "example.internal"
freeipa_realm: "EXAMPLE.INTERNAL"
freeipa_setup_dns: true
freeipa_setup_kra: false
freeipa_no_ntp: true
freeipa_manage_firewall: true
freeipa_configure_hosts: true
freeipa_forwarders:
  - "198.51.100.23"
  - "198.51.100.27"
freeipa_required_password_length: 20
freeipa_server_fqdn: "{{ ansible_facts.fqdn | default(inventory_hostname) }}"
freeipa_server_ip: "{{ ansible_host | default(ansible_facts.default_ipv4.address | default('')) }}"

# Optional extra CLI flags for ipa-server-install.
freeipa_install_extra_args: []
