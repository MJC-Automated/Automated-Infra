---
- name: FreeIPA server automation
  hosts: freeipa_servers
  become: true
  gather_facts: false

  vars:
    ansible_python_interpreter: /usr/bin/python3

  pre_tasks:
    - name: Bootstrap python3 on target host (if missing)
      ansible.builtin.raw: |
        if command -v python3 >/dev/null 2>&1; then
          exit 0
        fi
        if command -v dnf >/dev/null 2>&1; then
          dnf install -y python3 python3-dnf
        elif command -v yum >/dev/null 2>&1; then
          yum install -y python3
        elif command -v apt-get >/dev/null 2>&1; then
          apt-get update -y && apt-get install -y python3 python3-apt
        else
          echo "No supported package manager found. Install python3 manually." >&2
          exit 1
        fi
      changed_when: false
      tags: [always]

    - name: Gather facts
      ansible.builtin.setup:
      tags: [always]

    - name: Read .env file from playbook directory (optional)
      ansible.builtin.set_fact:
        freeipa_env_content_lines: "{{ (lookup('ansible.builtin.file', playbook_dir ~ '/.env', errors='ignore') | default('', true)).splitlines() }}"
      changed_when: false
      tags: [always]

    - name: Parse FREEIPA_* values from .env
      ansible.builtin.set_fact:
        "{{ item.split('=', 1)[0] }}": "{{ item.split('=', 1)[1] | regex_replace('^[\"\\x27]|[\"\\x27]$', '') }}"
      loop: "{{ freeipa_env_content_lines | default([]) }}"
      when:
        - (item | trim | length) > 0
        - not (item | trim | regex_search('^#'))
        - "'=' in item"
      no_log: true
      tags: [always]

    - name: Apply FREEIPA overrides from .env
      ansible.builtin.set_fact:
        freeipa_domain: "{{ FREEIPA_DOMAIN | default(freeipa_domain, true) }}"
        freeipa_realm: "{{ FREEIPA_REALM | default(freeipa_realm, true) }}"
        freeipa_server_fqdn: >-
          {{
            (FREEIPA_SERVER_FQDN | default('', true) | trim)
            if ((FREEIPA_SERVER_FQDN | default('', true) | trim | length) > 0)
            else (
              inventory_hostname
              if (inventory_hostname | regex_search('\\.'))
              else (inventory_hostname ~ '.' ~ (FREEIPA_DOMAIN | default(freeipa_domain, true)))
            )
          }}
        freeipa_server_ip: "{{ FREEIPA_SERVER_IP | default(freeipa_server_ip, true) }}"
        freeipa_setup_dns: "{{ (FREEIPA_SETUP_DNS | default(freeipa_setup_dns | string)) | bool }}"
        freeipa_setup_kra: "{{ (FREEIPA_SETUP_KRA | default(freeipa_setup_kra | string)) | bool }}"
        freeipa_no_ntp: "{{ (FREEIPA_NO_NTP | default(freeipa_no_ntp | string)) | bool }}"
        freeipa_no_host_dns: "{{ (FREEIPA_NO_HOST_DNS | default(freeipa_no_host_dns | string)) | bool }}"
        freeipa_manage_firewall: "{{ (FREEIPA_MANAGE_FIREWALL | default(freeipa_manage_firewall | string)) | bool }}"
        freeipa_configure_hosts: "{{ (FREEIPA_CONFIGURE_HOSTS | default(freeipa_configure_hosts | string)) | bool }}"
        freeipa_forwarders: >-
          {{
            (
              FREEIPA_FORWARDERS | default('', true) | trim | length
            )
            | ternary(
                (FREEIPA_FORWARDERS | default('', true)).split(',') | map('trim') | reject('equalto', '') | list,
                freeipa_forwarders
              )
          }}
      tags: [always]

    - name: Apply FREEIPA secret overrides from .env
      ansible.builtin.set_fact:
        freeipa_ds_password: "{{ FREEIPA_DS_PASSWORD | default(freeipa_ds_password | default(''), true) }}"
        freeipa_admin_password: "{{ FREEIPA_ADMIN_PASSWORD | default(freeipa_admin_password | default(''), true) }}"
      no_log: true
      tags: [always]

    - name: Ensure FreeIPA local secret directory exists
      delegate_to: localhost
      become: false
      run_once: true
      ansible.builtin.file:
        path: "{{ playbook_dir }}/files"
        state: directory
        owner: "{{ freeipa_local_secret_owner }}"
        group: "{{ freeipa_local_secret_group }}"
        mode: "0700"
      when:
        - freeipa_generate_local_passwords | bool
        - (freeipa_ds_password | length == 0) or (freeipa_admin_password | length == 0)
      tags: [always]

    - name: Generate FreeIPA Directory Manager password when not supplied
      delegate_to: localhost
      become: false
      run_once: true
      ansible.builtin.shell: |
        set -eu
        if [ ! -s "{{ freeipa_ds_password_path }}" ]; then
          umask 077
          openssl rand -hex 12 > "{{ freeipa_ds_password_path }}"
        fi
      args:
        creates: "{{ freeipa_ds_password_path }}"
      when:
        - freeipa_generate_local_passwords | bool
        - freeipa_ds_password | length == 0
      no_log: true
      tags: [always]

    - name: Generate FreeIPA admin password when not supplied
      delegate_to: localhost
      become: false
      run_once: true
      ansible.builtin.shell: |
        set -eu
        if [ ! -s "{{ freeipa_admin_password_path }}" ]; then
          umask 077
          openssl rand -hex 12 > "{{ freeipa_admin_password_path }}"
        fi
      args:
        creates: "{{ freeipa_admin_password_path }}"
      when:
        - freeipa_generate_local_passwords | bool
        - freeipa_admin_password | length == 0
      no_log: true
      tags: [always]

    - name: Enforce FreeIPA local secret ownership and permissions
      delegate_to: localhost
      become: false
      run_once: true
      ansible.builtin.file:
        path: "{{ item }}"
        state: file
        owner: "{{ freeipa_local_secret_owner }}"
        group: "{{ freeipa_local_secret_group }}"
        mode: "0600"
      loop:
        - "{{ freeipa_ds_password_path }}"
        - "{{ freeipa_admin_password_path }}"
      when:
        - freeipa_generate_local_passwords | bool
        - (freeipa_ds_password | length == 0) or (freeipa_admin_password | length == 0)
      no_log: true
      tags: [always]

    - name: Read generated FreeIPA Directory Manager password
      delegate_to: localhost
      become: false
      run_once: true
      ansible.builtin.slurp:
        src: "{{ freeipa_ds_password_path }}"
      register: freeipa_generated_ds_password_b64
      when:
        - freeipa_generate_local_passwords | bool
        - freeipa_ds_password | length == 0
      no_log: true
      tags: [always]

    - name: Read generated FreeIPA admin password
      delegate_to: localhost
      become: false
      run_once: true
      ansible.builtin.slurp:
        src: "{{ freeipa_admin_password_path }}"
      register: freeipa_generated_admin_password_b64
      when:
        - freeipa_generate_local_passwords | bool
        - freeipa_admin_password | length == 0
      no_log: true
      tags: [always]

    - name: Use generated FreeIPA passwords
      ansible.builtin.set_fact:
        freeipa_ds_password: >-
          {{
            (freeipa_generated_ds_password_b64.content | b64decode | trim)
            if (freeipa_ds_password | length == 0)
            else freeipa_ds_password
          }}
        freeipa_admin_password: >-
          {{
            (freeipa_generated_admin_password_b64.content | b64decode | trim)
            if (freeipa_admin_password | length == 0)
            else freeipa_admin_password
          }}
      no_log: true
      tags: [always]

  roles:
    - role: freeipa
