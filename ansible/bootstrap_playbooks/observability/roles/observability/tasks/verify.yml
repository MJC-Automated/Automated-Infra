---
- name: Wait for Grafana HTTP endpoint
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 3000
    timeout: 180

- name: Wait for Prometheus HTTP endpoint
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 9090
    timeout: 180

- name: Wait for Loki HTTP endpoint
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 3100
    timeout: 180

- name: Wait for Tempo HTTP endpoint
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 3200
    timeout: 180

- name: Check Grafana API health
  ansible.builtin.uri:
    url: "http://127.0.0.1:3000/api/health"
    method: GET
    status_code:
      - 200
      - 503
  register: grafana_health
  until: grafana_health.status == 200
  retries: 24
  delay: 5

- name: Check Grafana admin login with desired credentials
  ansible.builtin.uri:
    url: "http://127.0.0.1:3000/api/user"
    method: GET
    force_basic_auth: true
    url_username: "{{ observability_grafana_admin_user }}"
    url_password: "{{ observability_grafana_admin_password }}"
    status_code:
      - 200
      - 401
  register: grafana_admin_login
  changed_when: false
  no_log: true

- name: Discover current persisted Grafana admin account
  ansible.builtin.shell: |
    set -euo pipefail
    python3 - <<'PY'
    import json
    import os
    import sqlite3

    desired_login = os.environ["OBS_GRAFANA_ADMIN_USER"]
    conn = sqlite3.connect("/var/lib/grafana/grafana.db")
    row = conn.execute(
        'SELECT id, login, COALESCE(name, ""), COALESCE(email, "") '
        'FROM "user" WHERE is_admin = 1 AND login = ? LIMIT 1',
        (desired_login,),
    ).fetchone()
    if row is None:
        admin_count = conn.execute(
            'SELECT COUNT(*) FROM "user" WHERE is_admin = 1'
        ).fetchone()[0]
        if admin_count == 1:
            row = conn.execute(
                'SELECT id, login, COALESCE(name, ""), COALESCE(email, "") '
                'FROM "user" WHERE is_admin = 1 ORDER BY id LIMIT 1'
            ).fetchone()
        elif admin_count == 0:
            raise SystemExit("No Grafana admin user found in grafana.db")
        else:
            raise SystemExit(
                f'Configured Grafana admin "{desired_login}" was not found, '
                "and multiple admin accounts exist"
            )
    print(json.dumps({
        "id": row[0],
        "login": row[1],
        "name": row[2],
        "email": row[3],
    }))
    PY
  args:
    executable: /bin/bash
  environment:
    OBS_GRAFANA_ADMIN_USER: "{{ observability_grafana_admin_user }}"
  register: grafana_current_admin_account
  changed_when: false
  failed_when: false
  when: grafana_admin_login.status != 200
  no_log: true

- name: Fail when Grafana admin recovery cannot identify the managed account
  ansible.builtin.fail:
    msg: >-
      Unable to recover Grafana admin {{ observability_grafana_admin_user }}:
      {{ grafana_current_admin_account.stderr | default('the configured login is absent and the playbook will not modify another admin account', true) }}
  when:
    - grafana_admin_login.status != 200
    - grafana_current_admin_account.rc != 0

- name: Parse current persisted Grafana admin account
  ansible.builtin.set_fact:
    grafana_current_admin_account_data: "{{ grafana_current_admin_account.stdout | from_json }}"
  when:
    - grafana_admin_login.status != 200
    - grafana_current_admin_account.rc == 0
  no_log: true

- name: Reset Grafana admin password when desired credentials are inactive
  ansible.builtin.shell: |
    set -euo pipefail
    docker exec grafana grafana cli --homepath /usr/share/grafana admin reset-admin-password --user-id "$OBS_GRAFANA_ADMIN_USER_ID" "$OBS_GRAFANA_ADMIN_PASSWORD"
  args:
    executable: /bin/bash
  environment:
    OBS_GRAFANA_ADMIN_USER_ID: "{{ grafana_current_admin_account_data.id | string }}"
    OBS_GRAFANA_ADMIN_PASSWORD: "{{ observability_grafana_admin_password }}"
  when: grafana_admin_login.status != 200
  changed_when: true
  no_log: true

- name: Read current Grafana admin record after password reset
  ansible.builtin.uri:
    url: "http://127.0.0.1:3000/api/users/{{ grafana_current_admin_account_data.id }}"
    method: GET
    force_basic_auth: true
    url_username: "{{ grafana_current_admin_account_data.login }}"
    url_password: "{{ observability_grafana_admin_password }}"
    status_code: 200
  register: grafana_current_admin_record
  when: grafana_admin_login.status != 200
  changed_when: false
  no_log: true

- name: Update Grafana admin login when desired username differs
  ansible.builtin.uri:
    url: "http://127.0.0.1:3000/api/users/{{ grafana_current_admin_account_data.id }}"
    method: PUT
    force_basic_auth: true
    url_username: "{{ grafana_current_admin_account_data.login }}"
    url_password: "{{ observability_grafana_admin_password }}"
    body_format: json
    body:
      email: "{{ grafana_current_admin_record.json.email | default('') }}"
      name: >-
        {{
          (
            grafana_current_admin_record.json.name
            | default('')
            | trim
          )
          if (
            grafana_current_admin_record.json.name
            | default('')
            | trim
            | length > 0
          )
          else observability_grafana_admin_user
        }}
      login: "{{ observability_grafana_admin_user }}"
      theme: "{{ grafana_current_admin_record.json.theme | default('light') }}"
    status_code: 200
  when:
    - grafana_admin_login.status != 200
    - grafana_current_admin_account_data.login != observability_grafana_admin_user
  no_log: true

- name: Verify Grafana admin login with desired credentials
  ansible.builtin.uri:
    url: "http://127.0.0.1:3000/api/user"
    method: GET
    force_basic_auth: true
    url_username: "{{ observability_grafana_admin_user }}"
    url_password: "{{ observability_grafana_admin_password }}"
    status_code: 200
  register: grafana_admin_login_verified
  until: grafana_admin_login_verified.status == 200
  retries: 12
  delay: 5
  changed_when: false
  no_log: true

- name: Check Prometheus readiness
  ansible.builtin.uri:
    url: "http://127.0.0.1:9090/-/ready"
    method: GET
    status_code:
      - 200
      - 503
  register: prometheus_ready
  until: prometheus_ready.status == 200
  retries: 24
  delay: 5

- name: Check Loki readiness
  ansible.builtin.uri:
    url: "http://127.0.0.1:3100/ready"
    method: GET
    status_code:
      - 200
      - 503
  register: loki_ready
  until: loki_ready.status == 200
  retries: 24
  delay: 5

- name: Check Tempo readiness
  ansible.builtin.uri:
    url: "http://127.0.0.1:3200/ready"
    method: GET
    status_code:
      - 200
      - 503
  register: tempo_ready
  until: tempo_ready.status == 200
  retries: 24
  delay: 5
