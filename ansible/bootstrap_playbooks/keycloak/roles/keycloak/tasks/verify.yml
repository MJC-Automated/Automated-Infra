---
- name: Wait for Keycloak HTTP port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ keycloak_http_port }}"
    timeout: 180

- name: Check Keycloak readiness endpoint
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ keycloak_health_port }}/health/ready"
    method: GET
    status_code: 200
  register: keycloak_ready
  retries: 20
  delay: 6
  until: keycloak_ready.status == 200
