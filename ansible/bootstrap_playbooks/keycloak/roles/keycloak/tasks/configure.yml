---
- name: Configure Keycloak runtime settings
  ansible.builtin.template:
    src: keycloak.conf.j2
    dest: "{{ keycloak_install_dir }}/conf/keycloak.conf"
    owner: "{{ keycloak_user }}"
    group: "{{ keycloak_group }}"
    mode: "0640"
  no_log: true
  notify: Restart keycloak

- name: Build optimized Keycloak distribution
  ansible.builtin.shell: |
    set -euo pipefail
    "{{ keycloak_install_dir }}/bin/kc.sh" build
    install -m 0640 /dev/null "{{ keycloak_install_dir }}/.built"
  args:
    creates: "{{ keycloak_install_dir }}/.built"
    executable: /bin/bash
  environment:
    KC_DB: postgres
    KC_DB_URL: "jdbc:postgresql://{{ keycloak_db_host }}:{{ keycloak_db_port }}/{{ keycloak_db_name }}"
    KC_DB_USERNAME: "{{ keycloak_db_user }}"
    KC_DB_PASSWORD: "{{ keycloak_db_password }}"
  become: true
  become_user: "{{ keycloak_user }}"
  no_log: true

- name: Bootstrap Keycloak admin user (first run only)
  ansible.builtin.shell: |
    set -euo pipefail
    "{{ keycloak_install_dir }}/bin/kc.sh" bootstrap-admin user \
      --no-prompt \
      --optimized \
      --username:env KEYCLOAK_BOOTSTRAP_ADMIN_USER \
      --password:env KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD
    install -m 0640 /dev/null /var/lib/keycloak/.admin_bootstrapped
  args:
    creates: /var/lib/keycloak/.admin_bootstrapped
    executable: /bin/bash
  environment:
    KC_DB: postgres
    KC_DB_URL: "jdbc:postgresql://{{ keycloak_db_host }}:{{ keycloak_db_port }}/{{ keycloak_db_name }}"
    KC_DB_USERNAME: "{{ keycloak_db_user }}"
    KC_DB_PASSWORD: "{{ keycloak_db_password }}"
    KEYCLOAK_BOOTSTRAP_ADMIN_USER: "{{ keycloak_admin_user }}"
    KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD: "{{ keycloak_admin_password }}"
  become: true
  become_user: "{{ keycloak_user }}"
  no_log: true
