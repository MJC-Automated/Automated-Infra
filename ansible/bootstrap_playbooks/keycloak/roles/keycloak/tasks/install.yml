---
- name: Ensure keycloak group exists
  ansible.builtin.group:
    name: "{{ keycloak_group }}"
    state: present

- name: Ensure keycloak user exists
  ansible.builtin.user:
    name: "{{ keycloak_user }}"
    group: "{{ keycloak_group }}"
    shell: /usr/sbin/nologin
    home: "{{ keycloak_install_base_dir }}"
    create_home: false
    system: true

- name: Check if Keycloak archive exists in local resources
  ansible.builtin.stat:
    path: "/resources/{{ keycloak_archive }}"
  delegate_to: localhost
  become: false
  register: keycloak_local_archive

- name: Copy Keycloak archive from local resources
  ansible.builtin.copy:
    src: "/resources/{{ keycloak_archive }}"
    dest: "/tmp/{{ keycloak_archive }}"
    mode: "0644"
  when: keycloak_local_archive.stat.exists | default(false)

- name: Download Keycloak archive
  ansible.builtin.get_url:
    url: "{{ keycloak_download_base_url }}/{{ keycloak_version }}/{{ keycloak_archive }}"
    dest: "/tmp/{{ keycloak_archive }}"
    mode: "0644"
  when: not (keycloak_local_archive.stat.exists | default(false))

- name: Extract Keycloak archive
  ansible.builtin.unarchive:
    src: "/tmp/{{ keycloak_archive }}"
    dest: "{{ keycloak_install_base_dir }}"
    remote_src: true
    creates: "{{ keycloak_extract_dir }}/bin/kc.sh"

- name: Check whether keycloak install path is a mountpoint
  ansible.builtin.command:
    argv:
      - mountpoint
      - -q
      - "{{ keycloak_install_dir }}"
  register: keycloak_install_dir_mountpoint
  changed_when: false
  failed_when: false

- name: Check current keycloak install path state
  ansible.builtin.stat:
    path: "{{ keycloak_install_dir }}"
    follow: false
  register: keycloak_install_dir_stat

- name: Check whether existing install directory contains Keycloak binaries
  ansible.builtin.stat:
    path: "{{ keycloak_install_dir }}/bin/kc.sh"
  register: keycloak_existing_kc_stat
  when:
    - keycloak_install_dir_stat.stat.isdir | default(false)
    - not keycloak_install_dir_stat.stat.islnk | default(false)

- name: Check mounted Keycloak version marker
  ansible.builtin.stat:
    path: "{{ keycloak_install_dir }}/.keycloak-version"
  register: keycloak_mount_version_marker_stat
  when: keycloak_install_dir_mountpoint.rc == 0

- name: Read mounted Keycloak version marker
  ansible.builtin.slurp:
    src: "{{ keycloak_install_dir }}/.keycloak-version"
  register: keycloak_mount_version_marker
  when:
    - keycloak_install_dir_mountpoint.rc == 0
    - keycloak_mount_version_marker_stat.stat.exists | default(false)

- name: Determine whether mounted Keycloak install needs refresh
  ansible.builtin.set_fact:
    keycloak_mount_install_needs_refresh: >-
      {{
        (not keycloak_existing_kc_stat.stat.exists | default(false)) or
        (
          (keycloak_mount_version_marker.content | default('') | b64decode | trim) !=
          keycloak_version
        )
      }}
  changed_when: false
  when: keycloak_install_dir_mountpoint.rc == 0

- name: Refresh mounted Keycloak install directory from selected version
  ansible.builtin.shell: |
    set -euo pipefail
    shopt -s dotglob nullglob
    rm -rf -- "{{ keycloak_install_dir }}"/*
    cp -a "{{ keycloak_extract_dir }}/." "{{ keycloak_install_dir }}/"
  args:
    executable: /bin/bash
  notify: Restart keycloak
  when:
    - keycloak_install_dir_mountpoint.rc == 0
    - keycloak_mount_install_needs_refresh | default(false)
  changed_when: true

- name: Record active mounted Keycloak version
  ansible.builtin.copy:
    content: "{{ keycloak_version }}\n"
    dest: "{{ keycloak_install_dir }}/.keycloak-version"
    owner: "{{ keycloak_user }}"
    group: "{{ keycloak_group }}"
    mode: "0640"
  when: keycloak_install_dir_mountpoint.rc == 0

- name: Remove conflicting keycloak install path when invalid
  ansible.builtin.file:
    path: "{{ keycloak_install_dir }}"
    state: absent
  when:
    - keycloak_install_dir_mountpoint.rc != 0
    - keycloak_install_dir_stat.stat.exists
    - not keycloak_install_dir_stat.stat.islnk | default(false)
    - >
      (not keycloak_install_dir_stat.stat.isdir | default(false)) or
      (not keycloak_existing_kc_stat.stat.exists | default(false))

- name: Ensure keycloak symlink points to selected version
  ansible.builtin.file:
    src: "{{ keycloak_extract_dir }}"
    dest: "{{ keycloak_install_dir }}"
    state: link
    owner: root
    group: root
  notify: Restart keycloak
  when:
    - keycloak_install_dir_mountpoint.rc != 0
    - >
      (not keycloak_install_dir_stat.stat.exists) or
      (keycloak_install_dir_stat.stat.islnk | default(false)) or
      (
        (keycloak_install_dir_stat.stat.isdir | default(false)) and
        (not keycloak_existing_kc_stat.stat.exists | default(false))
      )

- name: Ensure keycloak runtime directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ keycloak_user }}"
    group: "{{ keycloak_group }}"
    mode: "0750"
  loop:
    - /var/lib/keycloak
    - /var/log/keycloak

- name: Ensure keycloak installation ownership
  ansible.builtin.file:
    path: "{{ keycloak_extract_dir }}"
    state: directory
    recurse: true
    owner: "{{ keycloak_user }}"
    group: "{{ keycloak_group }}"

- name: Ensure active keycloak install directory ownership when mounted
  ansible.builtin.file:
    path: "{{ keycloak_install_dir }}"
    state: directory
    recurse: true
    owner: "{{ keycloak_user }}"
    group: "{{ keycloak_group }}"
  when: keycloak_install_dir_mountpoint.rc == 0
