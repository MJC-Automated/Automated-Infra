# ===========================================
# roles/user_management/tasks/main.yml
# ===========================================
---
- name: Include create groups tasks
  ansible.builtin.include_tasks: create_groups.yml
  tags:
    - groups
    - create_groups

- name: Include manage users tasks
  ansible.builtin.include_tasks: manage_users.yml
  tags:
    - users
    - create_users
    - ssh_keys
    - password_policy

- name: Include password history enforcement tasks
  ansible.builtin.include_tasks: enforce_password_history.yml
