    - users
    - security
    - automation_account

- name: Include cleanup users tasks
  ansible.builtin.include_tasks: cleanup_users.yml
  tags:
    - users
    - remove_users
    - cleanup

- name: Include account baseline enforcement tasks
  ansible.builtin.include_tasks: enforce_account_baseline.yml
  tags:
    - users
    - security
