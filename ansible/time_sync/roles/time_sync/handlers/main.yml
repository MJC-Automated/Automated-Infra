---
# Handlers for time_sync role

- name: Restart chrony service
  ansible.builtin.raw: "systemctl restart {{ chrony_service_name | default((ansible_facts.os_family == 'Debian') | ternary('chrony', 'chronyd')) }}"
  changed_when: true

- name: Reload chrony configuration
  ansible.builtin.raw: "systemctl reload {{ chrony_service_name | default((ansible_facts.os_family == 'Debian') | ternary('chrony', 'chronyd')) }}"
  changed_when: true
