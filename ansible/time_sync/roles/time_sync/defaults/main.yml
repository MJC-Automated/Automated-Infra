---
# Default variables for the time_sync role.

# --- General Settings ---
# Host role switch; server hosts provide NTP service to clients.
time_sync_is_server: false

# Optional explicit IP/FQDN clients should use for this NTP server host.
# Useful when ntp_servers is the Ansible control node with local connection.
time_sync_server_advertise_ip: ""

# Upstream servers used by NTP server hosts.
time_sync_public_servers:
  - "0.pool.ntp.org"
  - "1.pool.ntp.org"
  - "2.pool.ntp.org"
  - "3.pool.ntp.org"

# Explicit client sources. If set, this list is used as-is.
time_sync_client_ntp_servers: []
# Build client sources from the ntp_servers inventory group.
time_sync_client_use_internal_servers: true

# Add public/upstream sources to client config as fallback.
# Keep false for air-gapped environments.
time_sync_client_add_public_fallback: false

# Server behavior when upstream sources are unreachable.
time_sync_server_enable_local_fallback: true
time_sync_server_local_stratum: 10

# --- Firewall Settings ---
time_sync_manage_firewall: true

# --- Package and Service Settings ---
time_sync_chrony_package_state: present
time_sync_uninstall_legacy_ntp: true
time_sync_apt_lock_retry_attempts: 30
time_sync_apt_lock_retry_delay: 10

# --- Advanced Settings ---
# Force makestep on restart
time_sync_force_makestep: true

# Verification settings
time_sync_verify_sync: true
time_sync_verify_max_retries: 10
time_sync_verify_delay: 15
