---
# main.yml
# Time Synchronization (Chrony) automation for IaC-Homelab

- name: Configure Time Synchronization
  hosts: ntp_servers,ntp_clients
  become: true
  gather_facts: false # Manually gathered in pre_tasks

  # Force python3 globally for this play to avoid SyntaxError on hosts with python2 as default
  vars:
    ansible_python_interpreter: /usr/bin/python3

  pre_tasks:
    - name: Bootstrap python3 on target host (if missing)
      ansible.builtin.raw: |
        if command -v python3 >/dev/null 2>&1; then
          exit 0
        fi
        if command -v dnf >/dev/null 2>&1; then
          dnf install -y python3 python3-dnf
        elif command -v yum >/dev/null 2>&1; then
          yum install -y python3
        elif command -v apt-get >/dev/null 2>&1; then
          apt-get update -y && apt-get install -y python3 python3-apt
        else
          echo "No supported package manager found. Install python3 manually." >&2
          exit 1
        fi
      changed_when: false
      tags: [always]

    - name: Gather facts
      ansible.builtin.setup:
      tags: [always]

    - name: Detect if host is an NTP server
      ansible.builtin.set_fact:
        time_sync_is_server: "{{ inventory_hostname in groups['ntp_servers'] | default([]) }}"
      tags: [always]

    - name: Load TIME_SYNC_* overrides from playbook .env file
      ansible.builtin.set_fact:
        time_sync_dotenv: >-
          {{
            dict(
              (
                lookup('ansible.builtin.file', playbook_dir ~ '/.env', errors='ignore')
                .splitlines()
                | map('trim')
                | reject('equalto', '')
                | reject('match', '^#')
                | map('regex_replace', '^export\\s+', '')
                | select('match', '^[A-Za-z_][A-Za-z0-9_]*\\s*=')
                | map('regex_replace', '\\s*=\\s*', '=')
                | map('split', '=', 1)
              )
            )
          }}
      tags: [always]

    - name: Apply TIME_SYNC_* boolean overrides
      ansible.builtin.set_fact:
        time_sync_client_use_internal_servers: "{{ (time_sync_dotenv.TIME_SYNC_CLIENT_USE_INTERNAL_SERVERS | default((time_sync_client_use_internal_servers | default(true)) | string, true)) | bool }}"
        time_sync_client_add_public_fallback: "{{ (time_sync_dotenv.TIME_SYNC_CLIENT_ADD_PUBLIC_FALLBACK | default((time_sync_client_add_public_fallback | default(false)) | string, true)) | bool }}"
        time_sync_server_enable_local_fallback: "{{ (time_sync_dotenv.TIME_SYNC_SERVER_ENABLE_LOCAL_FALLBACK | default((time_sync_server_enable_local_fallback | default(true)) | string, true)) | bool }}"
        time_sync_manage_firewall: "{{ (time_sync_dotenv.TIME_SYNC_MANAGE_FIREWALL | default((time_sync_manage_firewall | default(true)) | string, true)) | bool }}"
        time_sync_verify_sync: "{{ (time_sync_dotenv.TIME_SYNC_VERIFY_SYNC | default((time_sync_verify_sync | default(true)) | string, true)) | bool }}"
      tags: [always]

    - name: Apply TIME_SYNC server network overrides
      ansible.builtin.set_fact:
        time_sync_server_advertise_ip: "{{ time_sync_dotenv.TIME_SYNC_SERVER_ADVERTISE_IP | default(time_sync_server_advertise_ip | default(''), true) }}"
        time_sync_allowed_subnet: "{{ time_sync_dotenv.TIME_SYNC_ALLOWED_SUBNET | default(time_sync_allowed_subnet | default(''), true) }}"
      tags: [always]

    - name: Apply TIME_SYNC_PUBLIC_SERVERS override
      ansible.builtin.set_fact:
        time_sync_public_servers: "{{ time_sync_dotenv.TIME_SYNC_PUBLIC_SERVERS.split(',') | map('trim') | reject('equalto', '') | list }}"
      when: (time_sync_dotenv.TIME_SYNC_PUBLIC_SERVERS | default('', true) | trim | length) > 0
      tags: [always]

    - name: Apply TIME_SYNC_CLIENT_NTP_SERVERS override
      ansible.builtin.set_fact:
        time_sync_client_ntp_servers: "{{ time_sync_dotenv.TIME_SYNC_CLIENT_NTP_SERVERS.split(',') | map('trim') | reject('equalto', '') | list }}"
      when: (time_sync_dotenv.TIME_SYNC_CLIENT_NTP_SERVERS | default('', true) | trim | length) > 0
      tags: [always]

  roles:
    - role: time_sync
