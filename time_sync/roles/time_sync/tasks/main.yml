---
# roles/time_sync/tasks/main.yml
# Main entry point for the time_sync role

- name: PRECHECK | Validate role variables
  include_tasks: validate-vars.yml
  tags: [always, precheck]

- name: PRECHECK | Pre-flight checks and variable setup
  include_tasks: setup-vars.yml
  tags: [always, precheck]

- name: SETUP | Disable conflicting time services
  include_tasks: setup-cleanup.yml
  tags: [cleanup]

- name: SETUP | Install and configure Chrony
  include_tasks: setup-chrony.yml
  tags: [configuration, chrony]

- name: VERIFY | Run verification tasks
  include_tasks: verify.yml
  tags: [verification]
