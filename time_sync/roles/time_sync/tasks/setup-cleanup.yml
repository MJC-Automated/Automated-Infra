---
# roles/time_sync/tasks/setup-cleanup.yml
# Disables conflicting time services.

- name: CLEANUP | Stop and disable systemd-timesyncd (raw)
  ansible.builtin.raw: |
    systemctl stop systemd-timesyncd || true
    systemctl disable systemd-timesyncd || true
  changed_when: false
  tags: [cleanup]

- name: CLEANUP | Stop and disable ntp/ntpd service (raw)
  ansible.builtin.raw: |
    service_name="{{ ntp_service_name }}"
    systemctl stop $service_name || true
    systemctl disable $service_name || true
  changed_when: false
  tags: [cleanup]

- name: CLEANUP | Uninstall the legacy ntp package (raw)
  ansible.builtin.raw: |
    if command -v dnf >/dev/null 2>&1; then
      dnf remove -y "{{ ntp_package_name }}"
    elif command -v yum >/dev/null 2>&1; then
      yum remove -y "{{ ntp_package_name }}"
    elif command -v apt-get >/dev/null 2>&1; then
      apt_with_lock_retry() {
        attempts="$1"
        delay="$2"
        shift 2
        while true; do
          apt_output="$("$@" 2>&1)"
          rc=$?
          if [ "$rc" -eq 0 ]; then
            if [ -n "$apt_output" ]; then
              printf '%s\n' "$apt_output"
            fi
            return 0
          fi
          case "$apt_output" in
            *"Could not get lock /var/lib/dpkg/lock"*|*"Could not get lock /var/lib/dpkg/lock-frontend"*|*"Unable to acquire the dpkg frontend lock"*|*"Could not get lock /var/lib/apt/lists/lock"*|*"Unable to lock directory /var/lib/apt/lists/"*)
              attempts=$((attempts - 1))
              if [ "$attempts" -le 0 ]; then
                printf '%s\n' "$apt_output" >&2
                return "$rc"
              fi
              sleep "$delay"
              ;;
            *)
              printf '%s\n' "$apt_output" >&2
              return "$rc"
              ;;
          esac
        done
      }

      export DEBIAN_FRONTEND=noninteractive
      apt_with_lock_retry "{{ time_sync_apt_lock_retry_attempts }}" "{{ time_sync_apt_lock_retry_delay }}" \
        apt-get remove -y "{{ ntp_package_name }}"
    fi
  when: time_sync_uninstall_legacy_ntp | bool
  changed_when: false
  tags: [cleanup]
