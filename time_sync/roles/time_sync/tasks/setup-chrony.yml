---
# roles/time_sync/tasks/setup-chrony.yml

- name: CHRONY | Ensure chrony package is installed (raw)
  ansible.builtin.raw: |
    if ! command -v chronyd >/dev/null 2>&1; then
      if command -v dnf >/dev/null 2>&1; then
        dnf install -y "{{ chrony_package_name }}"
      elif command -v yum >/dev/null 2>&1; then
        yum install -y "{{ chrony_package_name }}"
      elif command -v apt-get >/dev/null 2>&1; then
        apt_with_lock_retry() {
          attempts="$1"
          delay="$2"
          shift 2
          while true; do
            apt_output="$("$@" 2>&1)"
            rc=$?
            if [ "$rc" -eq 0 ]; then
              if [ -n "$apt_output" ]; then
                printf '%s\n' "$apt_output"
              fi
              return 0
            fi
            case "$apt_output" in
              *"Could not get lock /var/lib/dpkg/lock"*|*"Could not get lock /var/lib/dpkg/lock-frontend"*|*"Unable to acquire the dpkg frontend lock"*|*"Could not get lock /var/lib/apt/lists/lock"*|*"Unable to lock directory /var/lib/apt/lists/"*)
                attempts=$((attempts - 1))
                if [ "$attempts" -le 0 ]; then
                  printf '%s\n' "$apt_output" >&2
                  return "$rc"
                fi
                sleep "$delay"
                ;;
              *)
                printf '%s\n' "$apt_output" >&2
                return "$rc"
                ;;
            esac
          done
        }

        export DEBIAN_FRONTEND=noninteractive
        apt_with_lock_retry "{{ time_sync_apt_lock_retry_attempts }}" "{{ time_sync_apt_lock_retry_delay }}" \
          apt-get update -y
        apt_with_lock_retry "{{ time_sync_apt_lock_retry_attempts }}" "{{ time_sync_apt_lock_retry_delay }}" \
          apt-get install -y "{{ chrony_package_name }}"
      fi
    fi
  changed_when: false

- name: CHRONY | Ensure base configuration directory exists
  ansible.builtin.file:
    path: "{{ chrony_conf_dir }}"
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: CHRONY | Ensure configuration snippet directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop:
    - "{{ chrony_conf_dir }}/sources.d"
    - "{{ (ansible_os_family == 'Debian') | ternary('/etc/chrony/conf.d', '/etc/chrony.d') }}"

- name: CHRONY | Deploy main configuration file
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: "{{ chrony_conf_path }}"
    owner: root
    group: root
    mode: '0644'
  notify: Restart chrony service

- name: CHRONY | Ensure service is started and enabled (raw)
  ansible.builtin.raw: |
    systemctl start "{{ chrony_service_name }}"
    systemctl enable "{{ chrony_service_name }}"
  changed_when: false

- name: FIREWALL | Allow NTP traffic on server (raw)
  ansible.builtin.raw: |
    if command -v firewall-cmd >/dev/null 2>&1; then
      firewall-cmd --permanent --remove-service=ntp || true
      firewall-cmd --permanent --add-rich-rule='rule family=ipv4 source address={{ time_sync_allowed_subnet }} service name=ntp accept' || true
      firewall-cmd --reload || true
    fi
  when:
    - time_sync_is_server | bool
    - time_sync_manage_firewall | bool
  changed_when: false
