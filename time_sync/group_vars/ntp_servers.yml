---
# group_vars/ntp_servers.yml
# Variables for the NTP server hosts.
# These hosts sync upstream (when available) and serve time to internal clients.

time_sync_is_server: true

# Upstream sources for the internal NTP server.
# In fully isolated deployments, this list may be set to [].
time_sync_public_servers:
  - "0.pool.ntp.org"
  - "1.pool.ntp.org"
  - "2.pool.ntp.org"
  - "3.pool.ntp.org"

# Permit this subnet to query the NTP server.
# Override with TIME_SYNC_ALLOWED_SUBNET in time_sync/.env.
time_sync_allowed_subnet: "192.0.2.0/24"

# Optional explicit IP/FQDN that clients should use to reach this NTP server.
# Recommended when ntp_servers is the Ansible control node and multiple NICs exist.
time_sync_server_advertise_ip: ""

# If upstream is unavailable, server still serves local time to clients.
time_sync_server_enable_local_fallback: true
time_sync_server_local_stratum: 10

time_sync_manage_firewall: true
